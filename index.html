<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Circular','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased}
:root{
  --green:#1DB954;--green-hover:#1ED760;--green-dark:#169C46;
  --bg:#000;--bg-elev:#121212;--bg-elev2:#181818;--bg-elev3:#242424;--bg-hover:#2a2a2a;
  --text:#fff;--text-sub:#b3b3b3;--text-muted:#6a6a6a;
  --border:#2a2a2a;--card-bg:#181818;--surface:#121212;
  --gradient:linear-gradient(180deg,#1f1f1f 0%,#121212 100%);
  --danger:#f15e6c;--warning:#ffa42b;
}
.app{max-width:1280px;margin:0 auto;padding:16px;background:var(--gradient);min-height:100vh}
/* NAV */
.nav{display:flex;gap:8px;padding:6px;background:rgba(0,0,0,.5);backdrop-filter:blur(20px);border-radius:500px;margin-bottom:24px;overflow-x:auto;flex-wrap:wrap;border:1px solid var(--border)}
.nav-btn{padding:10px 20px;border:none;background:transparent;border-radius:500px;cursor:pointer;font-size:14px;color:var(--text-sub);white-space:nowrap;transition:all .2s;font-family:inherit;font-weight:600}
.nav-btn:hover{color:var(--text);transform:scale(1.04)}
.nav-btn.active{background:var(--text);color:#000}
/* CARDS */
.card{background:var(--card-bg);border-radius:8px;padding:20px;margin-bottom:16px;transition:background .2s}
.card:hover{background:var(--bg-elev2)}
.card-sm{padding:14px}
/* GRID */
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
/* METRIC */
.metric{background:var(--bg-elev2);border-radius:8px;padding:18px;text-align:center;transition:background .2s}
.metric:hover{background:var(--bg-elev3)}
.metric-label{font-size:11px;color:var(--text-sub);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;font-weight:700}
.metric-value{font-size:28px;font-weight:700;color:var(--green);letter-spacing:-.5px}
/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:500px;font-size:10px;font-weight:700;line-height:1.6;text-transform:uppercase;letter-spacing:.5px}
.badge-core{background:rgba(29,185,84,.15);color:var(--green)}
.badge-variation{background:rgba(255,164,43,.15);color:var(--warning)}
.badge-wildcard{background:rgba(186,113,255,.15);color:#ba71ff}
.badge-completed{background:rgba(29,185,84,.15);color:var(--green)}
.badge-planned{background:rgba(179,179,179,.15);color:var(--text-sub)}
.badge-inprogress{background:rgba(70,131,255,.18);color:#7eb0ff}
/* TYPOGRAPHY */
h1{font-size:32px;font-weight:900;margin-bottom:6px;letter-spacing:-1px}
h2{font-size:22px;font-weight:700;margin-bottom:12px;letter-spacing:-.5px}
h3{font-size:16px;font-weight:700;margin-bottom:8px}
.muted{color:var(--text-sub);font-size:14px}
/* BUTTONS */
.btn{padding:10px 22px;border-radius:500px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:14px;transition:all .2s;font-family:inherit;font-weight:700}
.btn:hover{border-color:var(--text);background:var(--bg-hover);transform:scale(1.04)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--green);color:#000;border-color:var(--green)}
.btn-primary:hover{background:var(--green-hover);border-color:var(--green-hover);transform:scale(1.04)}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:rgba(241,94,108,.1)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px}
/* FORMS */
input,select,textarea{padding:10px 14px;border-radius:4px;border:1px solid var(--border);font-size:14px;width:100%;font-family:inherit;background:var(--bg-elev3);color:var(--text)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--text);background:var(--bg-elev3)}
input::placeholder,textarea::placeholder{color:var(--text-muted)}
textarea{resize:vertical}
/* LAYOUT HELPERS */
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:8px}
/* ARTIST CARD */
.artist-card{border-radius:8px;padding:14px;margin-bottom:10px;background:var(--bg-elev2);transition:background .2s}
.artist-card:hover{background:var(--bg-elev3)}
.artist-card.listened{border-left:3px solid var(--green)}
/* TAGS */
.tag{background:var(--bg-elev3);color:var(--text-sub);padding:3px 10px;border-radius:500px;font-size:11px;display:inline-block;margin:2px;font-weight:500}
/* SECTION TITLE */
.section-title{font-size:11px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:1.2px;margin:20px 0 10px}
/* EMPTY STATE */
.empty-state{text-align:center;padding:56px 20px;color:var(--text-sub)}
.empty-state .icon{font-size:48px;margin-bottom:14px;opacity:.5}
/* RANK ITEM */
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:6px;background:var(--bg-elev2);margin-bottom:6px;transition:background .2s}
.rank-item:hover{background:var(--bg-elev3)}
.rank-num{width:28px;height:28px;border-radius:50%;background:rgba(29,185,84,.15);color:var(--green);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* DIVIDER */
.divider{height:1px;background:var(--border);margin:14px 0}
/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--bg-elev2);border-radius:8px;padding:24px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;border:1px solid var(--border)}
/* GENRE FAMILY LABEL */
.genre-family{font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:1px}
/* PROGRESS */
.progress-bar{height:4px;background:var(--bg-elev3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
/* CHECKBOX CIRCLE */
.check-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--text-sub);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:12px;color:#000}
.check-circle:hover{border-color:var(--text)}
.check-circle.checked{background:var(--green);border-color:var(--green)}
/* SONG CHIP */
.song-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:500px;font-size:12px;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--bg-elev2);color:var(--text-sub);user-select:none;font-weight:500}
.song-chip:hover{background:var(--bg-elev3);color:var(--text);border-color:var(--text-sub)}
.song-chip.heard{background:rgba(29,185,84,.15);border-color:var(--green);color:var(--green)}
.spotify-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:1px solid rgba(29,185,84,.45);background:rgba(29,185,84,.12);color:var(--green);font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;flex-shrink:0;text-decoration:none}
.spotify-btn:hover{background:var(--green);color:#000;border-color:var(--green);transform:scale(1.06)}
.spotify-btn:active{transform:scale(.96)}
.song-line{display:inline-flex;align-items:center;gap:5px;margin:2px 4px 2px 0}
/* HISTORY ROW */
.history-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:6px;background:var(--bg-elev2);margin-bottom:6px;flex-wrap:wrap;transition:background .2s}
.history-row:hover{background:var(--bg-elev3)}
/* SCORE INPUT */
.score-box{display:flex;flex-direction:column;align-items:center;gap:4px}
.score-box label{font-size:10px;color:var(--text-sub);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.score-box input{width:68px;text-align:center;padding:6px 4px}
/* SUB-NAV TABS */
.sub-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.sub-tab{padding:6px 14px;border-radius:500px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--text-sub);font-family:inherit;transition:all .2s;font-weight:600}
.sub-tab:hover{color:var(--text);border-color:var(--text-sub)}
.sub-tab.active{background:var(--text);color:#000;border-color:var(--text)}
/* HEADER */
.app-header{display:flex;align-items:center;gap:14px;padding:12px 4px;margin-bottom:18px}
.app-logo{width:48px;height:48px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;color:#000}
/* SCROLLBAR */
::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:6px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#4a4a4a}
</style>
</head>

/* ============================================================
   STORAGE HELPERS
   ============================================================ */
function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d=JSON.parse(raw);
      if(d&&d.settings&&d.genres) return d;
    }
  }catch(e){console.warn('Error loading localStorage:',e);}
  return null;
}

function saveData(data){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({...data,updatedAt:new Date().toISOString()}));
  }catch(e){console.warn('Error saving localStorage:',e);}
}

function initData(){
  return{
    settings:{user1:'Jonathan',user2:'Lucy'},
    genres:INITIAL_GENRES,
    weeks:[],
    activeWeekId:null,
    completedGenreIds:[],
    createdAt:new Date().toISOString(),
    updatedAt:new Date().toISOString()
  };
}

/* ============================================================
   UTILS
   ============================================================ */
function genId(){return Math.random().toString(36).substr(2,9);}

function calcArtistAvg(a){
  const s1=parseFloat(a.scoreU1);
  const s2=parseFloat(a.scoreU2);
  const v=[];
  if(!isNaN(s1)&&s1>=0)v.push(s1);
  if(!isNaN(s2)&&s2>=0)v.push(s2);
  if(!v.length)return null;
  return v.reduce((a,b)=>a+b,0)/v.length;
}

function Badge({type}){
  const map={core:'badge-core',variation:'badge-variation',wildcard:'badge-wildcard',completed:'badge-completed',planned:'badge-planned',in_progress:'badge-inprogress'};
  const labels={core:'Core',variation:'Variation',wildcard:'Wildcard',completed:'Completada',planned:'Planificada',in_progress:'En curso'};
  return <span className={`badge ${map[type]||'badge-planned'}`}>{labels[type]||type}</span>;
}

function buildSpotifySearchUrl(artistName,songTitle){
  const query=[artistName,songTitle].filter(Boolean).join(' ').trim();
  return `https://open.spotify.com/search/${encodeURIComponent(query||'')}`;
}
function getSpotifyUrl(artistName,song){
  const direct=(song&&song.spotifyUrl||'').trim();
  if(direct)return direct;
  return buildSpotifySearchUrl(artistName,(song&&song.title)||'');
}
function openSpotifyForSong(artistName,song,event){
  if(event){event.preventDefault();event.stopPropagation();}
  const url=getSpotifyUrl(artistName,song);
  if(!url)return;
  const opened=window.open(url,'_blank');
  if(!opened){ window.location.href=url; }
}

            <h3>Valoración del género</h3>
            <div className="grid3" style={{marginTop:8}}>
              {week.rating.scoreU1&&<div className="metric"><div className="metric-label">{u1}</div><div className="metric-value">{parseFloat(week.rating.scoreU1).toFixed(1)}</div></div>}
              {week.rating.scoreU2&&<div className="metric"><div className="metric-label">{u2}</div><div className="metric-value">{parseFloat(week.rating.scoreU2).toFixed(1)}</div></div>}
            </div>
            {week.rating.favSongU1&&<p style={{fontSize:12,marginTop:8}}>🎵 {u1}: {week.rating.favSongU1}</p>}
            {week.rating.favSongU2&&<p style={{fontSize:12}}>🎵 {u2}: {week.rating.favSongU2}</p>}
            {week.rating.comment&&<p style={{marginTop:8,fontSize:13,borderTop:'0.5px solid var(--border)',paddingTop:8}}>{week.rating.comment}</p>}
          </div>
        )}
        <div className="section-title">Artistas</div>
        {(week.artists||[]).map(a=>{
          const avg=calcArtistAvg(a);
          return(
            <div key={a.id} style={{padding:'8px 0',borderBottom:'0.5px solid var(--border)'}}>
              <div className="row" style={{justifyContent:'space-between'}}>
                <span style={{fontWeight:500}}>{a.name}</span>
                <div className="row" style={{gap:6}}>
                  {avg!==null&&<span style={{fontWeight:500,color:'var(--c2)'}}>{avg.toFixed(1)}</span>}
                  <Badge type={a.role}/>
                  {a.listened&&<Badge type="completed"/>}
                </div>
              </div>
              {(a.scoreU1||a.scoreU2)&&<div className="row" style={{marginTop:3,gap:12,fontSize:12,color:'var(--muted)'}}>
                {a.scoreU1&&<span>{u1}: {a.scoreU1}</span>}
                {a.scoreU2&&<span>{u2}: {a.scoreU2}</span>}
                {a.commentU1&&<span style={{fontStyle:'italic'}}>"{a.commentU1}"</span>}
              </div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

   TABS

function DashboardTab({weeks,completedWeeks,activeWeek,u1,u2,genreRankings,artistRankings,genres,completedGenreIds,onGenerate,onGoSemana,onManualSelect}){
  const avgU1=useMemo(()=>{
    const v=completedWeeks.filter(w=>!isNaN(parseFloat(w.rating?.scoreU1))).map(w=>parseFloat(w.rating.scoreU1));
    return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;
  },[completedWeeks]);
  const avgU2=useMemo(()=>{
    const v=completedWeeks.filter(w=>!isNaN(parseFloat(w.rating?.scoreU2))).map(w=>parseFloat(w.rating.scoreU2));
    return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;
  },[completedWeeks]);
  const famCount={};completedWeeks.forEach(w=>{famCount[w.genreFamily]=(famCount[w.genreFamily]||0)+1;});
  const topFam=Object.entries(famCount).sort((a,b)=>b[1]-a[1])[0];

  return(
    <div>
      <div className="row" style={{justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <div>
          <h1>Dashboard</h1>
          <p className="muted">Vuestro laboratorio musical juntos 🎵</p>
        </div>
        <div className="row">
          {!activeWeek&&<button className="btn btn-primary" onClick={onGenerate}>🎲 Nueva semana aleatoria</button>}
          {!activeWeek&&<button className="btn" onClick={onManualSelect}>Elegir género</button>}
          {activeWeek&&<button className="btn btn-primary" onClick={onGoSemana}>Ver semana activa →</button>}
        </div>
      </div>

      <div className="grid4" style={{marginBottom:16}}>
        <div className="metric"><div className="metric-label">Semanas completadas</div><div className="metric-value">{completedWeeks.length}</div></div>
        <div className="metric"><div className="metric-label">Géneros escuchados</div><div className="metric-value">{(completedGenreIds||[]).length}</div></div>
        <div className="metric"><div className="metric-label">Géneros pendientes</div><div className="metric-value">{genres.length-(completedGenreIds||[]).length}</div></div>
        <div className="metric"><div className="metric-label">Familia favorita</div><div className="metric-value" style={{fontSize:13}}>{topFam?topFam[0]:'—'}</div></div>
        <div className="metric"><div className="metric-label">Media {u1}</div><div className="metric-value">{avgU1!==null?avgU1.toFixed(1):'—'}</div></div>
        <div className="metric"><div className="metric-label">Media {u2}</div><div className="metric-value">{avgU2!==null?avgU2.toFixed(1):'—'}</div></div>
        <div className="metric"><div className="metric-label">Diferencia media</div><div className="metric-value">{(avgU1!==null&&avgU2!==null)?Math.abs(avgU1-avgU2).toFixed(1):'—'}</div></div>
        <div className="metric"><div className="metric-label">Biblioteca total</div><div className="metric-value">{genres.length}</div></div>
      </div>

      {activeWeek&&(
        <div className="card" style={{borderLeft:'3px solid var(--c1)',marginBottom:16}}>
          <div className="row" style={{justifyContent:'space-between'}}>
            <div>
              <div style={{fontWeight:500}}>Semana activa: {activeWeek.genreName}</div>
              <div className="muted" style={{fontSize:12}}>Desde {activeWeek.startDate} · {activeWeek.genreFamily}</div>
            </div>
            <button className="btn btn-sm btn-primary" onClick={onGoSemana}>Abrir →</button>
          </div>
        </div>
      )}

      {completedWeeks.length===0&&!activeWeek&&(
        <div className="empty-state">
          <div className="icon">🎸</div>
          <div style={{fontWeight:500,marginBottom:6}}>¡Empezad vuestra aventura musical!</div>
          <p className="muted">Generaed vuestra primera semana para descubrir un nuevo género juntos.</p>
        </div>
      )}

      {genreRankings.length>0&&(
        <div className="grid2">
          <div className="card">
            <h2 style={{marginBottom:10}}>🏆 Top géneros</h2>
            {genreRankings.slice(0,5).map((g,i)=>(
              <div key={g.weekId} className="rank-item">
                <div className="rank-num">{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:500,fontSize:13}}>{g.name}</div>
                  <div className="muted" style={{fontSize:11}}>{g.family}</div>
                </div>
                {g.avg!==null&&<span style={{fontWeight:500,color:'var(--c2)'}}>{g.avg.toFixed(1)}</span>}
              </div>
            ))}
          </div>
          <div className="card">
            <h2 style={{marginBottom:10}}>⭐ Top artistas</h2>
            {artistRankings.slice(0,5).map((a,i)=>(
              <div key={i} className="rank-item">
                <div className="rank-num">{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:500,fontSize:13}}>{a.name}</div>
                  <div className="muted" style={{fontSize:11}}>{a.genreName}</div>
                </div>
                <span style={{fontWeight:500,color:'var(--c2)'}}>{a.avg.toFixed(1)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {completedWeeks.length>0&&(
        <div className="card" style={{marginTop:0}}>
          <h2 style={{marginBottom:10}}>📅 Últimas semanas</h2>
          {[...completedWeeks].reverse().slice(0,4).map(w=>{
            const r=w.rating||{};
            const s1=parseFloat(r.scoreU1);const s2=parseFloat(r.scoreU2);
            const avg=!isNaN(s1)&&!isNaN(s2)?(s1+s2)/2:(!isNaN(s1)?s1:(!isNaN(s2)?s2:null));
            return(
              <div key={w.id} className="row" style={{padding:'6px 0',borderBottom:'0.5px solid var(--border)',gap:8}}>
                <div style={{width:24,height:24,borderRadius:6,background:'var(--c3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:500,color:'var(--c2)',flexShrink:0}}>{w.weekNum}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:500,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{w.genreName}</div>
                  <div className="muted" style={{fontSize:11}}>{w.startDate}</div>
                </div>
                {avg!==null&&<span style={{fontWeight:500,color:'var(--c2)',flexShrink:0}}>{avg.toFixed(1)}</span>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function SemanaTab({activeWeek,u1,u2,genres,weeks,completedGenreIds,onGenerate,onManualSelect,manualGenreSelect,setManualGenreSelect,onGenreSelect,onUpdateArtist,onToggleSong,onCloseWeek,weekCloseMode,setWeekCloseMode,weekRating,setWeekRating,onConfirmClose,expandedArtist,setExpandedArtist,onClearRating}){
  const [selGenre,setSelGenre]=useState('');
  const genreObj=activeWeek?genres.find(g=>g.id===activeWeek.genreId):null;

  if(manualGenreSelect){
    const done=completedGenreIds||[];
    const available=genres.filter(g=>!done.includes(g.id));
    const played=genres.filter(g=>done.includes(g.id));
    return(
      <div>
        <div className="row" style={{marginBottom:16}}>
          <button className="btn btn-sm" onClick={()=>setManualGenreSelect(false)}>← Volver</button>
          <h1>Elegir género manualmente</h1>
        </div>
        <div className="card">
          <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:6}}>Selecciona un género</label>
          <select value={selGenre} onChange={e=>setSelGenre(e.target.value)} style={{marginBottom:10}}>
            <option value="">— Selecciona —</option>
            {available.length>0&&<optgroup label={`Disponibles (${available.length})`}>
              {available.map(g=><option key={g.id} value={g.id}>{g.name} · {g.parentFamily}</option>)}
            </optgroup>}
            {played.length>0&&<optgroup label={`Ya escuchados (${played.length})`}>
              {played.map(g=><option key={g.id} value={g.id}>{g.name} (repetición)</option>)}
            </optgroup>}
          </select>
          <button className="btn btn-primary" disabled={!selGenre} onClick={()=>{onGenreSelect(selGenre);setManualGenreSelect(false);}}>Generar semana con este género</button>
        </div>
      </div>
    );
  }

  if(weekCloseMode&&activeWeek){
    const arts=activeWeek.artists;
    const u1Top=[...arts].filter(a=>a.scoreU1!=='').sort((a,b)=>parseFloat(b.scoreU1)-parseFloat(a.scoreU1)).slice(0,3);
    const u2Top=[...arts].filter(a=>a.scoreU2!=='').sort((a,b)=>parseFloat(b.scoreU2)-parseFloat(a.scoreU2)).slice(0,3);
    const both=arts.filter(a=>a.scoreU1!==''&&a.scoreU2!=='');
    const divisive=both.length?[...both].sort((a,b)=>Math.abs(parseFloat(b.scoreU1)-parseFloat(b.scoreU2))-Math.abs(parseFloat(a.scoreU1)-parseFloat(a.scoreU2)))[0]:null;
    const consensual=both.filter(a=>calcArtistAvg(a)>=7).sort((a,b)=>Math.abs(parseFloat(a.scoreU1)-parseFloat(a.scoreU2))-Math.abs(parseFloat(b.scoreU1)-parseFloat(b.scoreU2)))[0]||null;
    const topJoint=[...arts].filter(a=>calcArtistAvg(a)!==null).sort((a,b)=>calcArtistAvg(b)-calcArtistAvg(a)).slice(0,3);

    return(
      <div>
        <div className="row" style={{marginBottom:16}}>
          <button className="btn btn-sm" onClick={()=>setWeekCloseMode(false)}>← Volver</button>
          <h1>Cerrar semana: {activeWeek.genreName}</h1>
        </div>

        {(topJoint.length>0||divisive||consensual)&&(
          <div className="card" style={{marginBottom:12,background:'#f0effc',border:'0.5px solid #d0cef0'}}>
            <h2 style={{marginBottom:10}}>📊 Ranking semanal automático</h2>
            <div className="grid2" style={{marginBottom:10}}>
              {u1Top.length>0&&<div>
                <div className="muted" style={{fontSize:11,marginBottom:4}}>Top 3 {u1}</div>
                {u1Top.map((a,i)=><div key={a.id} style={{fontSize:12,marginBottom:2}}>{i+1}. {a.name} <span style={{color:'var(--c2)',fontWeight:500}}>({a.scoreU1})</span></div>)}
              </div>}
              {u2Top.length>0&&<div>
                <div className="muted" style={{fontSize:11,marginBottom:4}}>Top 3 {u2}</div>
                {u2Top.map((a,i)=><div key={a.id} style={{fontSize:12,marginBottom:2}}>{i+1}. {a.name} <span style={{color:'var(--success)',fontWeight:500}}>({a.scoreU2})</span></div>)}
              </div>}
            </div>
            {topJoint.length>0&&<p style={{fontSize:12,marginBottom:4}}><span className="muted">Top conjunto:</span> {topJoint.map(a=>`${a.name} (${calcArtistAvg(a).toFixed(1)})`).join(' · ')}</p>}
            {divisive&&<p style={{fontSize:12,marginBottom:2}}><span className="muted">Más divisivo:</span> {divisive.name} — {u1}: {divisive.scoreU1} / {u2}: {divisive.scoreU2} (Δ{Math.abs(parseFloat(divisive.scoreU1)-parseFloat(divisive.scoreU2)).toFixed(1)})</p>}
            {consensual&&<p style={{fontSize:12}}><span className="muted">Más consensuado (≥7):</span> {consensual.name} ({calcArtistAvg(consensual).toFixed(1)})</p>}
          </div>
        )}

        <div className="card">
          <h2 style={{marginBottom:12}}>Valoración del género completo</h2>
          <div className="grid2" style={{marginBottom:10}}>
            <ScoreInput label={`Nota ${u1} (0-10)`} value={weekRating.scoreU1||''} onChange={v=>setWeekRating(p=>({...p,scoreU1:v}))}/>
            <ScoreInput label={`Nota ${u2} (0-10)`} value={weekRating.scoreU2||''} onChange={v=>setWeekRating(p=>({...p,scoreU2:v}))}/>
          </div>
          <div className="grid2" style={{marginBottom:10}}>
            <div><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>Canción favorita {u1}</label><input value={weekRating.favSongU1||''} onChange={e=>setWeekRating(p=>({...p,favSongU1:e.target.value}))} placeholder="Título..."/></div>
            <div><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>Canción favorita {u2}</label><input value={weekRating.favSongU2||''} onChange={e=>setWeekRating(p=>({...p,favSongU2:e.target.value}))} placeholder="Título..."/></div>
          </div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>¿Lo escucharíamos de nuevo?</label>
            <select value={weekRating.listenAgain||''} onChange={e=>setWeekRating(p=>({...p,listenAgain:e.target.value}))}>
              <option value="">—</option>
              <option value="si">Sí, definitivamente</option>
              <option value="tal_vez">Tal vez</option>
              <option value="no">No</option>
            </select>
          </div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>¿Qué os ha sorprendido?</label>
            <textarea rows={2} value={weekRating.surprise||''} onChange={e=>setWeekRating(p=>({...p,surprise:e.target.value}))} placeholder="Lo más inesperado..."/>
          </div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>¿Qué os ha costado?</label>
            <textarea rows={2} value={weekRating.hard||''} onChange={e=>setWeekRating(p=>({...p,hard:e.target.value}))} placeholder="Lo más difícil de escuchar..."/>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>Comentario conjunto</label>
            <textarea rows={3} value={weekRating.comment||''} onChange={e=>setWeekRating(p=>({...p,comment:e.target.value}))} placeholder="Reflexiones, recuerdos, lo que os lleváis de esta semana..."/>
          </div>
          <button className="btn btn-primary" onClick={onConfirmClose}>✅ Cerrar semana y guardar</button>
        </div>
      </div>
    );
  }

  if(!activeWeek){
    return(
      <div className="empty-state">
        <div className="icon">🎵</div>
        <div style={{fontWeight:500,marginBottom:8}}>Sin semana activa</div>
        <p className="muted" style={{marginBottom:16}}>¿Preparados para descubrir un nuevo género esta semana?</p>
        <div className="row" style={{justifyContent:'center'}}>
          <button className="btn btn-primary" onClick={onGenerate}>🎲 Semana aleatoria</button>
          <button className="btn" onClick={onManualSelect}>Elegir género</button>
        </div>
      </div>
    );
  }

  const listened=activeWeek.artists.filter(a=>a.listened).length;
  const total=activeWeek.artists.length;

  return(
    <div>
      <div className="row" style={{justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:12}}>
        <div>
          <div className="genre-family">{activeWeek.genreFamily}</div>
          <h1>{activeWeek.genreName}</h1>
          <p className="muted">Semana {activeWeek.weekNum} · Desde {activeWeek.startDate}</p>
        </div>
        <button className="btn btn-primary" onClick={onCloseWeek}>Cerrar semana →</button>
      </div>

      {genreObj&&(
        <div className="card" style={{marginBottom:12}}>
          <p style={{fontSize:13,marginBottom:8}}>{genreObj.description}</p>
          <p className="muted" style={{fontSize:12,marginBottom:8}}>📍 {genreObj.originContext}</p>
          <div style={{marginBottom:6}}>
            {(genreObj.moodTags||[]).map(t=><span key={t} className="tag">#{t}</span>)}
          </div>
          {(genreObj.suggestedSituations||[]).length>0&&(
            <div>
              <span className="muted" style={{fontSize:11}}>Ideal para: </span>
              {(genreObj.suggestedSituations||[]).map(s=><span key={s} className="tag">{s}</span>)}
            </div>
          )}
        </div>
      )}

      <div className="row" style={{marginBottom:12,gap:12}}>
        <div style={{flex:1}}>
          <div className="muted" style={{fontSize:11,marginBottom:3}}>Escuchados: {listened}/{total}</div>
          <div className="progress-bar"><div className="progress-fill" style={{width:`${total?listened/total*100:0}%`}}/></div>
        </div>
        <span className="muted" style={{fontSize:12,whiteSpace:'nowrap'}}>{total?Math.round(listened/total*100):0}%</span>
      </div>

      {activeWeek.artists.map(artist=>{
        const avg=calcArtistAvg(artist);
        const isExp=expandedArtist===artist.id;
        return(
          <div key={artist.id} className={`artist-card ${artist.listened?'listened':''}`}>
            <div className="row" style={{justifyContent:'space-between',marginBottom:8}}>
              <div className="row" style={{gap:8,flex:1,minWidth:0}}>
                <div className={`check-circle ${artist.listened?'checked':''}`}
                  onClick={()=>onUpdateArtist(activeWeek.id,artist.id,'listened',!artist.listened)}>
                  {artist.listened&&'✓'}
                </div>
                <div style={{minWidth:0}}>
                  <div className="row" style={{flexWrap:'wrap',gap:4}}>
                    <span style={{fontWeight:500}}>{artist.name}</span>
                    <Badge type={artist.role}/>
                    {artist.favU1&&<span style={{fontSize:11,color:'var(--c2)'}}>★{u1}</span>}
                    {artist.favU2&&<span style={{fontSize:11,color:'var(--success)'}}>★{u2}</span>}
                    {avg!==null&&<span style={{fontSize:13,fontWeight:500,color:'var(--c2)'}}>{avg.toFixed(1)}</span>}
                  </div>
                  <div className="muted" style={{fontSize:11}}>{artist.shortDescription}</div>
                </div>
              </div>
              <button className="btn btn-sm" onClick={()=>setExpandedArtist(isExp?null:artist.id)} style={{flexShrink:0}}>
                {isExp?'▲ Cerrar':'▼ Valorar'}
              </button>
            </div>

            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:4}}>
              {(artist.listenedSongs||[]).map((s,i)=>(
                <div key={i} className="song-line">
                  <div className={`song-chip ${s.listened?'heard':''}`}
                    onClick={()=>onToggleSong(activeWeek.id,artist.id,i)}
                    title={s.note}>
                    <span style={{width:12,height:12,borderRadius:2,background:s.listened?'var(--success)':'transparent',border:`1.5px solid ${s.listened?'var(--success)':'var(--muted)'}`,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#fff',flexShrink:0}}>{s.listened&&'✓'}</span>
                    {s.title}
                  </div>
                  <button className="spotify-btn" type="button" title={`Abrir en Spotify: ${artist.name} - ${s.title}`} aria-label={`Abrir en Spotify ${artist.name} ${s.title}`} onClick={e=>openSpotifyForSong(artist.name,s,e)}>▶</button>
                </div>
              ))}
            </div>

            {isExp&&(
              <div style={{marginTop:10,borderTop:'0.5px solid var(--border)',paddingTop:12}}>
                <div className="grid2" style={{marginBottom:10}}>
                  <ScoreInput label={u1} value={artist.scoreU1} onChange={v=>onUpdateArtist(activeWeek.id,artist.id,'scoreU1',v)}/>
                  <ScoreInput label={u2} value={artist.scoreU2} onChange={v=>onUpdateArtist(activeWeek.id,artist.id,'scoreU2',v)}/>
                </div>
                <div className="grid2" style={{marginBottom:10}}>
                  <div>
                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>Comentario {u1}</label>
                    <textarea rows={2} style={{fontSize:12}} value={artist.commentU1||''} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'commentU1',e.target.value)} placeholder="¿Qué te parece?"/>
                  </div>
                  <div>
                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>Comentario {u2}</label>
                    <textarea rows={2} style={{fontSize:12}} value={artist.commentU2||''} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'commentU2',e.target.value)} placeholder="¿Qué te parece?"/>

                </div>
                <div className="row" style={{marginBottom:10,gap:16,flexWrap:'wrap'}}>
                  <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,cursor:'pointer'}}>

                    ⭐ Favorito {u1}
                  </label>
                  <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,cursor:'pointer'}}>
                    <input type="checkbox" checked={!!artist.favU2} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'favU2',e.target.checked)} style={{width:'auto'}}/>
                    ⭐ Favorito {u2}

/* ============================================================
   ROOT APP
   ============================================================ */
function App(){
  const [data,setData]=useState(()=>{
    const saved=loadData();
    return saved||initData();
  });
  const [tab,setTab]=useState('dashboard');
  const [confirm,setConfirm]=useState(null);
  const [genreSearch,setGenreSearch]=useState('');
  const [genreFilter,setGenreFilter]=useState('');
  const [expandedArtist,setExpandedArtist]=useState(null);
  const [weekCloseMode,setWeekCloseMode]=useState(false);
  const [weekRating,setWeekRating]=useState({});
  const [editingGenre,setEditingGenre]=useState(null);
  const [newGenreForm,setNewGenreForm]=useState(null);
  const [editingArtist,setEditingArtist]=useState(null);
  const [newArtistForm,setNewArtistForm]=useState(null);
  const [manualGenreSelect,setManualGenreSelect]=useState(false);
  const [viewWeek,setViewWeek]=useState(null);

  const {settings,genres,weeks,activeWeekId,completedGenreIds}=data;
  const u1=settings.user1||'Jonathan';
  const u2=settings.user2||'Lucy';

  // Save on every data change
  useEffect(()=>{saveData(data);},[data]);

  const update=useCallback(fn=>setData(prev=>({...fn(prev)})),[]);

  const activeWeek=useMemo(()=>weeks.find(w=>w.id===activeWeekId),[weeks,activeWeekId]);
  const completedWeeks=useMemo(()=>weeks.filter(w=>w.status==='completed'),[weeks]);
  const families=useMemo(()=>[...new Set(genres.map(g=>g.parentFamily))].sort(),[genres]);

  const filteredGenres=useMemo(()=>genres.filter(g=>{
    const ms=!genreSearch||g.name.toLowerCase().includes(genreSearch.toLowerCase())||g.parentFamily.toLowerCase().includes(genreSearch.toLowerCase());
    const mf=!genreFilter||g.parentFamily===genreFilter;
    return ms&&mf;
  }),[genres,genreSearch,genreFilter]);

  const genreRankings=useMemo(()=>completedWeeks.map(w=>{
    const r=w.rating||{};
    const s1=parseFloat(r.scoreU1);const s2=parseFloat(r.scoreU2);
    const scores=[[s1],[s2]].filter(([s])=>!isNaN(s)).map(([s])=>s);
    const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:null;
    return{weekId:w.id,genreId:w.genreId,name:w.genreName,family:w.genreFamily,scoreU1:s1,scoreU2:s2,avg,weekNum:w.weekNum};
  }).filter(g=>g.avg!==null).sort((a,b)=>b.avg-a.avg),[completedWeeks]);

  const artistRankings=useMemo(()=>{
    const all=[];
    completedWeeks.forEach(w=>(w.artists||[]).forEach(a=>{
      const avg=calcArtistAvg(a);
      if(avg!==null) all.push({name:a.name,genreName:w.genreName,scoreU1:isNaN(parseFloat(a.scoreU1))?null:parseFloat(a.scoreU1),scoreU2:isNaN(parseFloat(a.scoreU2))?null:parseFloat(a.scoreU2),avg});
    }));
    return all.sort((a,b)=>b.avg-a.avg);
  },[completedWeeks]);

  function generateWeek(genreId){
    const genre=genres.find(g=>g.id===genreId);
    if(!genre)return;
    const weekNum=weeks.length+1;
    const artists=[...genre.artists]
      .sort((a,b)=>({core:0,variation:1,wildcard:2}[a.role]||2)-({core:0,variation:1,wildcard:2}[b.role]||2))
      .slice(0,10)
      .map(a=>({
        ...a,
        listened:false,scoreU1:'',scoreU2:'',
        commentU1:'',commentU2:'',
        mood:'',replay:'',
        favU1:false,favU2:false,
        listenedSongs:(a.suggestedSongs||[]).map(s=>({...s,listened:false}))
      }));
    const week={id:genId(),weekNum,startDate:new Date().toISOString().split('T')[0],genreId,genreName:genre.name,genreFamily:genre.parentFamily,status:'in_progress',artists,rating:{}};
    update(prev=>({...prev,weeks:[...prev.weeks,week],activeWeekId:week.id}));
    setTab('semana');
  }

  function randomGenre(){
    const used=completedGenreIds||[];
    let available=genres.filter(g=>!used.includes(g.id));
    if(!available.length){
      if(!window.confirm('Ya habéis escuchado todos los géneros. ¿Reiniciar ciclo?'))return;
      update(prev=>({...prev,completedGenreIds:[]}));
      available=[...genres];
    }
    generateWeek(available[Math.floor(Math.random()*available.length)].id);
  }

  function updateArtist(weekId,artId,field,value){
    update(prev=>({...prev,weeks:prev.weeks.map(w=>w.id===weekId?{...w,artists:w.artists.map(a=>a.id===artId?{...a,[field]:value}:a)}:w)}));
  }

  function toggleSong(weekId,artId,songIdx){
    update(prev=>({...prev,weeks:prev.weeks.map(w=>w.id===weekId?{...w,artists:w.artists.map(a=>a.id===artId?{...a,listenedSongs:a.listenedSongs.map((s,i)=>i===songIdx?{...s,listened:!s.listened}:s)}:a)}:w)}));
  }

  function closeWeek(){
    update(prev=>({
      ...prev,
      weeks:prev.weeks.map(w=>w.id===activeWeek.id?{...w,status:'completed',rating:weekRating}:w),
      activeWeekId:null,
      completedGenreIds:[...(prev.completedGenreIds||[]),activeWeek.genreId]
    }));
    setWeekCloseMode(false);setWeekRating({});setTab('dashboard');
  }

  function deleteWeek(id){
    update(prev=>{
      const w=prev.weeks.find(x=>x.id===id);
      return{...prev,weeks:prev.weeks.filter(x=>x.id!==id),activeWeekId:prev.activeWeekId===id?null:prev.activeWeekId,completedGenreIds:w&&w.status==='completed'?prev.completedGenreIds.filter(g=>g!==w.genreId):prev.completedGenreIds};
    });
    setConfirm(null);
  }

  function clearArtistRatingNow(weekId,artId){
    update(prev=>({...prev,weeks:prev.weeks.map(w=>w.id===weekId?{...w,artists:w.artists.map(a=>a.id===artId?{...a,scoreU1:'',scoreU2:'',commentU1:'',commentU2:'',favU1:false,favU2:false,replay:''}:a)}:w)}));
    setConfirm(null);
  }

  function wipeAllNow(){
    const fresh=initData();setData(fresh);saveData(fresh);
    setConfirm(null);
  }

  function exportData(){
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='musiclab_backup.json';a.click();URL.revokeObjectURL(url);
  }

  function importData(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d&&d.settings&&d.genres){setData(d);alert('✅ Backup importado correctamente.');}
        else alert('❌ Archivo inválido.');
      }catch{alert('❌ Error al parsear el archivo.');}
    };
    reader.readAsText(file);
    e.target.value='';
  }

  function resetAll(){
    setConfirm({type:'wipe'});
  }

  return(
    <div className="app">
      <div className="app-header">
        <div className="app-logo">🎵</div>
        <div>
          <div style={{fontWeight:500,fontSize:17,color:'var(--c2)'}}>Music Discovery Lab</div>
          <div className="muted" style={{fontSize:12}}>{u1} & {u2} · {completedWeeks.length} semanas · {genres.length} géneros</div>
        </div>
        {activeWeek&&<div style={{marginLeft:'auto'}}><Badge type="in_progress"/></div>}
      </div>

      <nav className="nav">
        {[
          ['dashboard','🏠 Dashboard'],
          ['semana','🎧 Semana activa'],
          ['rankings','🏆 Rankings'],
          ['historial','📅 Historial'],
          ['biblioteca','📚 Biblioteca'],
          ['ajustes','⚙ Ajustes'],
        ].map(([id,label])=>(
          <button key={id} className={`nav-btn ${tab===id?'active':''}`} onClick={()=>setTab(id)}>
            {label}
            {id==='semana'&&activeWeek&&<span style={{marginLeft:5,width:7,height:7,borderRadius:'50%',background:'var(--c1)',display:'inline-block',verticalAlign:'middle'}}/>}
          </button>
        ))}
      </nav>

      <div>
        {tab==='dashboard'&&<DashboardTab weeks={weeks} completedWeeks={completedWeeks} activeWeek={activeWeek} u1={u1} u2={u2} genreRankings={genreRankings} artistRankings={artistRankings} genres={genres} completedGenreIds={completedGenreIds} onGenerate={randomGenre} onGoSemana={()=>setTab('semana')} onManualSelect={()=>{setManualGenreSelect(true);setTab('semana');}}/>}
        {tab==='semana'&&<SemanaTab activeWeek={activeWeek} u1={u1} u2={u2} genres={genres} weeks={weeks} completedGenreIds={completedGenreIds} onGenerate={randomGenre} onManualSelect={()=>setManualGenreSelect(true)} manualGenreSelect={manualGenreSelect} setManualGenreSelect={setManualGenreSelect} onGenreSelect={generateWeek} onUpdateArtist={updateArtist} onToggleSong={toggleSong} onCloseWeek={()=>setWeekCloseMode(true)} weekCloseMode={weekCloseMode} setWeekCloseMode={setWeekCloseMode} weekRating={weekRating} setWeekRating={setWeekRating} onConfirmClose={closeWeek} expandedArtist={expandedArtist} setExpandedArtist={setExpandedArtist} onClearRating={(wId,aId)=>setConfirm({type:'rating',wId,aId})}/>}
        {tab==='rankings'&&<RankingsTab genreRankings={genreRankings} artistRankings={artistRankings} completedWeeks={completedWeeks} u1={u1} u2={u2}/>}
        {tab==='historial'&&<HistorialTab weeks={weeks} onDelete={id=>setConfirm({type:'week',id})} onView={w=>setViewWeek(w)} u1={u1} u2={u2}/>}
        {tab==='biblioteca'&&<BibliotecaTab genres={genres} filteredGenres={filteredGenres} genreSearch={genreSearch} setGenreSearch={setGenreSearch} genreFilter={genreFilter} setGenreFilter={setGenreFilter} families={families} completedGenreIds={completedGenreIds} onEditGenre={g=>setEditingGenre({...g})} onDeleteGenre={id=>setConfirm({type:'genre',id})} onAddGenre={()=>setNewGenreForm({name:'',parentFamily:'',description:'',originContext:'',moodTags:'',suggestedSituations:'',artists:[]})} onEditArtist={(g,a)=>setEditingArtist({genreId:g.id,artist:{...a}}) } onDeleteArtist={(gId,aId)=>setConfirm({type:'artist',gId,aId})} onAddArtist={g=>setNewArtistForm({genreId:g.id,artist:{name:'',role:'core',shortDescription:'',suggestedSongs:[{title:'',note:'',spotifyUrl:''},{title:'',note:'',spotifyUrl:''}]}})}/>}
        {tab==='ajustes'&&<AjustesTab settings={settings} onSaveSettings={s=>update(prev=>({...prev,settings:s}))} onExport={exportData} onImport={importData} onReset={resetAll}/>}
      </div>

      {/* MODALS */}
      {confirm&&confirm.type==='week'&&<ConfirmModal message="¿Eliminar esta semana? Esta acción no se puede deshacer." onConfirm={()=>deleteWeek(confirm.id)} onCancel={()=>setConfirm(null)}/>}
      {confirm&&confirm.type==='genre'&&<ConfirmModal message="¿Eliminar este género de la biblioteca?" onConfirm={()=>{update(prev=>({...prev,genres:prev.genres.filter(g=>g.id!==confirm.id)}));setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
      {confirm&&confirm.type==='artist'&&<ConfirmModal message="¿Eliminar este artista del género?" onConfirm={()=>{update(prev=>({...prev,genres:prev.genres.map(g=>g.id===confirm.gId?{...g,artists:g.artists.filter(a=>a.id!==confirm.aId)}:g)}));setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
      {confirm&&confirm.type==='rating'&&<ConfirmModal message="¿Seguro que quieres eliminar la valoración de este artista? Notas, comentarios y favoritos se borrarán." onConfirm={()=>clearArtistRatingNow(confirm.wId,confirm.aId)} onCancel={()=>setConfirm(null)}/>}
      {confirm&&confirm.type==='wipe'&&<ConfirmModal message="¿Seguro que quieres borrar TODOS los datos? Se eliminarán semanas, valoraciones, historial y la biblioteca volverá a su estado inicial. Esta acción es irreversible." onConfirm={wipeAllNow} onCancel={()=>setConfirm(null)}/>}
      {editingGenre&&<GenreEditModal genre={editingGenre} onSave={g=>{update(prev=>({...prev,genres:prev.genres.map(x=>x.id===g.id?g:x)}));setEditingGenre(null);}} onClose={()=>setEditingGenre(null)}/>}
      {newGenreForm&&<GenreEditModal genre={newGenreForm} isNew onSave={g=>{update(prev=>({...prev,genres:[...prev.genres,{...g,id:genId(),artists:[]}]}));setNewGenreForm(null);}} onClose={()=>setNewGenreForm(null)}/>}
      {editingArtist&&<ArtistEditModal genreId={editingArtist.genreId} artist={editingArtist.artist} onSave={(gId,a)=>{update(prev=>({...prev,genres:prev.genres.map(g=>g.id===gId?{...g,artists:g.artists.map(x=>x.id===a.id?a:x)}:g)}));setEditingArtist(null);}} onClose={()=>setEditingArtist(null)}/>}
      {newArtistForm&&<ArtistEditModal genreId={newArtistForm.genreId} artist={newArtistForm.artist} isNew onSave={(gId,a)=>{update(prev=>({...prev,genres:prev.genres.map(g=>g.id===gId?{...g,artists:[...g.artists,{...a,id:genId()}]}:g)}));setNewArtistForm(null);}} onClose={()=>setNewArtistForm(null)}/>}
      {viewWeek&&<WeekDetailModal week={viewWeek} u1={u1} u2={u2} onClose={()=>setViewWeek(null)}/>}
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
