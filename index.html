<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Circular','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased}
:root{
  --green:#1DB954;--green-hover:#1ED760;--green-dark:#169C46;
  --bg:#000;--bg-elev:#121212;--bg-elev2:#181818;--bg-elev3:#242424;--bg-hover:#2a2a2a;
  --text:#fff;--text-sub:#b3b3b3;--text-muted:#6a6a6a;
  --border:#2a2a2a;--card-bg:#181818;--surface:#121212;
  --gradient:linear-gradient(180deg,#1f1f1f 0%,#121212 100%);
  --danger:#f15e6c;--warning:#ffa42b;
  --c1:var(--green);--c2:var(--green);--c3:rgba(29,185,84,.15);--c4:var(--green-dark);
  --success:var(--green);--muted:var(--text-sub);
}
.app{max-width:1280px;margin:0 auto;padding:16px;background:var(--gradient);min-height:100vh}
/* NAV */
.nav{display:flex;gap:8px;padding:6px;background:rgba(0,0,0,.5);backdrop-filter:blur(20px);border-radius:500px;margin-bottom:24px;overflow-x:auto;flex-wrap:wrap;border:1px solid var(--border)}
.nav-btn{padding:10px 20px;border:none;background:transparent;border-radius:500px;cursor:pointer;font-size:14px;color:var(--text-sub);white-space:nowrap;transition:all .2s;font-family:inherit;font-weight:600}
.nav-btn:hover{color:var(--text);transform:scale(1.04)}
.nav-btn.active{background:var(--text);color:#000}
/* CARDS */
.card{background:var(--card-bg);border-radius:8px;padding:20px;margin-bottom:16px;transition:background .2s}
.card:hover{background:var(--bg-elev2)}
.card-sm{padding:14px}
/* GRID */
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
/* METRIC */
.metric{background:var(--bg-elev2);border-radius:8px;padding:18px;text-align:center;transition:background .2s}
.metric:hover{background:var(--bg-elev3)}
.metric-label{font-size:11px;color:var(--text-sub);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;font-weight:700}
.metric-value{font-size:28px;font-weight:700;color:var(--green);letter-spacing:-.5px}

/* PRODUCT INSIGHTS */
.insight-card{background:var(--bg-elev2);border:1px solid var(--border);border-radius:10px;padding:16px;transition:background .2s}
.insight-card:hover{background:var(--bg-elev3)}
.insight-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-.2px}
.insight-value{font-size:30px;font-weight:900;color:var(--green);letter-spacing:-.8px;line-height:1}
.insight-copy{font-size:12px;color:var(--text-sub);line-height:1.45;margin-top:8px}
.progress-large{height:10px;background:var(--bg-elev3);border-radius:999px;overflow:hidden;border:1px solid var(--border)}
.progress-large-fill{height:100%;background:var(--green);border-radius:999px;transition:width .35s ease}
.divergence-row{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:9px 0;border-bottom:.5px solid var(--border)}
.divergence-row:last-child{border-bottom:none}

/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:500px;font-size:10px;font-weight:700;line-height:1.6;text-transform:uppercase;letter-spacing:.5px}
.badge-core{background:rgba(29,185,84,.15);color:var(--green)}
.badge-variation{background:rgba(255,164,43,.15);color:var(--warning)}
.badge-wildcard{background:rgba(186,113,255,.15);color:#ba71ff}
.badge-completed{background:rgba(29,185,84,.15);color:var(--green)}
.badge-planned{background:rgba(179,179,179,.15);color:var(--text-sub)}
.badge-inprogress{background:rgba(70,131,255,.18);color:#7eb0ff}
/* TYPOGRAPHY */
h1{font-size:32px;font-weight:900;margin-bottom:6px;letter-spacing:-1px}
h2{font-size:22px;font-weight:700;margin-bottom:12px;letter-spacing:-.5px}
h3{font-size:16px;font-weight:700;margin-bottom:8px}
.muted{color:var(--text-sub);font-size:14px}
/* BUTTONS */
.btn{padding:10px 22px;border-radius:500px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:14px;transition:all .2s;font-family:inherit;font-weight:700}
.btn:hover{border-color:var(--text);background:var(--bg-hover);transform:scale(1.04)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--green);color:#000;border-color:var(--green)}
.btn-primary:hover{background:var(--green-hover);border-color:var(--green-hover);transform:scale(1.04)}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:rgba(241,94,108,.1)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px}
/* FORMS */
input,select,textarea{padding:10px 14px;border-radius:4px;border:1px solid var(--border);font-size:14px;width:100%;font-family:inherit;background:var(--bg-elev3);color:var(--text)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--text);background:var(--bg-elev3)}
input::placeholder,textarea::placeholder{color:var(--text-muted)}
textarea{resize:vertical}
/* LAYOUT HELPERS */
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:8px}
/* ARTIST CARD */
.artist-card{border-radius:8px;padding:14px;margin-bottom:10px;background:var(--bg-elev2);transition:background .2s}
.artist-card:hover{background:var(--bg-elev3)}
.artist-card.listened{border-left:3px solid var(--green)}
/* TAGS */
.tag{background:var(--bg-elev3);color:var(--text-sub);padding:3px 10px;border-radius:500px;font-size:11px;display:inline-block;margin:2px;font-weight:500}
/* SECTION TITLE */
.section-title{font-size:11px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:1.2px;margin:20px 0 10px}
/* EMPTY STATE */
.empty-state{text-align:center;padding:56px 20px;color:var(--text-sub)}
.empty-state .icon{font-size:48px;margin-bottom:14px;opacity:.5}
/* RANK ITEM */
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:6px;background:var(--bg-elev2);margin-bottom:6px;transition:background .2s}
.rank-item:hover{background:var(--bg-elev3)}
.rank-num{width:28px;height:28px;border-radius:50%;background:rgba(29,185,84,.15);color:var(--green);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* DIVIDER */
.divider{height:1px;background:var(--border);margin:14px 0}
/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--bg-elev2);border-radius:8px;padding:24px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;border:1px solid var(--border)}
/* GENRE FAMILY LABEL */
.genre-family{font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:1px}
/* PROGRESS */
.progress-bar{height:4px;background:var(--bg-elev3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
/* CHECKBOX CIRCLE */
.check-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--text-sub);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:12px;color:#000}
.check-circle:hover{border-color:var(--text)}
.check-circle.checked{background:var(--green);border-color:var(--green)}
/* SONG CHIP */
.song-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:500px;font-size:12px;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--bg-elev2);color:var(--text-sub);user-select:none;font-weight:500}
.song-chip:hover{background:var(--bg-elev3);color:var(--text);border-color:var(--text-sub)}
.song-chip.heard{background:rgba(29,185,84,.15);border-color:var(--green);color:var(--green)}
.spotify-btn{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:1px solid rgba(29,185,84,.45);background:rgba(29,185,84,.12);color:var(--green);font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;flex-shrink:0;text-decoration:none}
.spotify-btn:hover{background:var(--green);color:#000;border-color:var(--green);transform:scale(1.05)}
.spotify-btn:active{transform:scale(.96)}
/* HISTORY ROW */
.history-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:6px;background:var(--bg-elev2);margin-bottom:6px;flex-wrap:wrap;transition:background .2s}
.history-row:hover{background:var(--bg-elev3)}
/* SCORE INPUT */
.score-box{display:flex;flex-direction:column;align-items:center;gap:4px}
.score-box label{font-size:10px;color:var(--text-sub);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.score-box input{width:68px;text-align:center;padding:6px 4px}
/* SUB-NAV TABS */
.sub-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.sub-tab{padding:6px 14px;border-radius:500px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--text-sub);font-family:inherit;transition:all .2s;font-weight:600}
.sub-tab:hover{color:var(--text);border-color:var(--text-sub)}
.sub-tab.active{background:var(--text);color:#000;border-color:var(--text)}
/* HEADER */
.app-header{display:flex;align-items:center;gap:14px;padding:12px 4px;margin-bottom:18px}
.app-logo{width:48px;height:48px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;color:#000}
/* SCROLLBAR */
::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:6px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#4a4a4a}


/* LEARNING / GENRE STORY */
.learning-hero{background:linear-gradient(135deg,rgba(29,185,84,.12),rgba(255,255,255,.04));border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.learning-kicker{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1.2px;color:var(--green);margin-bottom:6px}
.learning-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-top:12px}
.learning-block{background:var(--bg-elev2);border:1px solid var(--border);border-radius:10px;padding:14px}
.learning-block-title{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--text-sub);margin-bottom:6px}
.learning-list{margin:8px 0 0 18px;color:var(--text-sub);font-size:13px;line-height:1.5}
.quiz-option{display:block;width:100%;text-align:left;margin:7px 0;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-elev2);color:var(--text);cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
.quiz-option:hover{border-color:var(--green);background:var(--bg-elev3)}
.quiz-option.selected{border-color:var(--green);background:rgba(29,185,84,.16);color:var(--green)}
.quiz-option.correct{border-color:var(--green);background:rgba(29,185,84,.22);color:var(--green)}
.quiz-option.wrong{border-color:var(--danger);background:rgba(241,94,108,.18);color:#ff8793}
.quiz-score-card{background:var(--bg-elev2);border:1px solid var(--border);border-radius:10px;padding:14px}

/* AUTH / CLOUD SYNC */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top,#1f1f1f 0%,#000 70%)}
.auth-card{max-width:460px;width:100%;background:var(--card-bg);border:1px solid var(--border);border-radius:18px;padding:28px;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,.45)}
.auth-icon{width:72px;height:72px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:34px;color:#000}
.auth-title{font-size:28px;font-weight:900;margin-bottom:8px;letter-spacing:-.8px}
.auth-copy{color:var(--text-sub);font-size:14px;line-height:1.55;margin-bottom:18px}
.auth-warning{background:rgba(255,164,43,.12);border:1px solid rgba(255,164,43,.35);color:#ffd08a;border-radius:10px;padding:12px;font-size:12px;text-align:left;margin:14px 0}
.sync-pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.sync-saved{background:rgba(29,185,84,.16);color:var(--green)}
.sync-saving,.sync-loading,.sync-checking{background:rgba(70,131,255,.18);color:#8db8ff}
.sync-error{background:rgba(241,94,108,.18);color:#ff8793}
.secure-session{font-size:11px;color:var(--text-sub);margin-top:2px}

</style>
</head>

function normKey(v){return String(v||'').trim().toLowerCase();}
function cloneSongs(songs){return Array.isArray(songs)?songs.map(s=>({...s})):[];}
function cloneArtist(a){return {...a,suggestedSongs:cloneSongs(a&&a.suggestedSongs)};}
function cloneGenre(g){return {...g,artists:Array.isArray(g&&g.artists)?g.artists.map(cloneArtist):[]};}
function mergeLibraryIntoData(data){
  if(!data||!Array.isArray(data.genres))return data;
  const next={...data,genres:data.genres.map(cloneGenre)};
  const genreMap=new Map(next.genres.map(g=>[g.id,g]));
  let changed=false;
  LIBRARY_EXPANSION.forEach(exp=>{
    const existing=genreMap.get(exp.id);
    if(!existing){
      const g=cloneGenre(exp);
      next.genres.push(g);genreMap.set(g.id,g);changed=true;return;
    }
    existing.artists=Array.isArray(existing.artists)?existing.artists:[];
    const artistById=new Map(existing.artists.map(a=>[a.id,a]));
    const artistByName=new Map(existing.artists.map(a=>[normKey(a.name),a]));
    (exp.artists||[]).forEach(newA=>{
      const found=artistById.get(newA.id)||artistByName.get(normKey(newA.name));
      if(!found){existing.artists.push(cloneArtist(newA));changed=true;return;}
      found.suggestedSongs=Array.isArray(found.suggestedSongs)?found.suggestedSongs:[];
      const songTitles=new Set(found.suggestedSongs.map(s=>normKey(s.title)));
      (newA.suggestedSongs||[]).forEach(song=>{
        if(song&&song.title&&!songTitles.has(normKey(song.title))){found.suggestedSongs.push({...song});songTitles.add(normKey(song.title));changed=true;}
      });
      if(!found.role&&newA.role){found.role=newA.role;changed=true;}
      if(!found.shortDescription&&newA.shortDescription){found.shortDescription=newA.shortDescription;changed=true;}
    });
  });
  if(next.libraryExpansionVersion!==LIBRARY_EXPANSION_VERSION){next.libraryExpansionVersion=LIBRARY_EXPANSION_VERSION;changed=true;}
  return changed?{...next,updatedAt:new Date().toISOString()}:data;
}

function calcArtistAvg(a){
  const s1=parseFloat(a.scoreU1);
  const s2=parseFloat(a.scoreU2);
  const v=[];
  if(!isNaN(s1)&&s1>=0)v.push(s1);
  if(!isNaN(s2)&&s2>=0)v.push(s2);
  if(!v.length)return null;
  return v.reduce((a,b)=>a+b,0)/v.length;
}
function hasArtistUserEval(a,user){
  const suf=user==='u1'?'U1':'U2';
  return !!(a['score'+suf]||a['comment'+suf]||a['fav'+suf]||a['replay'+suf]||a['mood'+suf]||a['situations'+suf]);
}
function replayLabel(v){
  return {si:'Sí',tal_vez:'Tal vez',no:'No'}[v]||'';
}
function buildSpotifySearchUrl(artistName,songTitle){
  const query=[artistName,songTitle].filter(Boolean).join(' ').trim();
  return `https://open.spotify.com/search/${encodeURIComponent(query||'')}`;
}
function getSpotifyUrl(artistName,song){
  const direct=(song&&song.spotifyUrl||'').trim();
  if(direct)return direct;
  return buildSpotifySearchUrl(artistName,(song&&song.title)||'');
}
function openSpotifyForSong(artistName,song,event){
  if(event){event.preventDefault();event.stopPropagation();}
  const url=getSpotifyUrl(artistName,song);
  if(!url)return;
  /* Same-tab navigation avoids the annoying about:blank tab on iOS/Chrome.
     Spotify universal links normally hand off to the Spotify app when installed. */
  window.location.assign(url);
}


function getWeekSongProgress(week){
  const artists=(week&&week.artists)||[];
  let totalSongs=0, listenedSongs=0;
  artists.forEach(a=>((a.listenedSongs)||[]).forEach(song=>{totalSongs++; if(song.listened)listenedSongs++;}));
  const listenedArtists=artists.filter(a=>a.listened).length;
  const totalArtists=artists.length;
  return {totalSongs,listenedSongs,totalArtists,listenedArtists,songPct:totalSongs?Math.round((listenedSongs/totalSongs)*100):0,artistPct:totalArtists?Math.round((listenedArtists/totalArtists)*100):0};
}
function getCurrentStreak(completedWeeks){
  const nums=[...new Set((completedWeeks||[]).map(w=>Number(w.weekNum)).filter(n=>!isNaN(n)))].sort((a,b)=>b-a);
  if(!nums.length)return 0;
  let streak=1;
  for(let i=1;i<nums.length;i++){
    if(nums[i]===nums[i-1]-1)streak++; else break;
  }
  return streak;
}
function getComparisonInsights(completedWeeks){
  const artistPairs=[];
  (completedWeeks||[]).forEach(w=>((w.artists)||[]).forEach(a=>{
    const s1=parseFloat(a.scoreU1); const s2=parseFloat(a.scoreU2);
    if(!isNaN(s1)&&!isNaN(s2)) artistPairs.push({type:'artist',name:a.name,context:w.genreName,u1:s1,u2:s2,diff:Math.abs(s1-s2)});
  }));
  const genrePairs=[];
  (completedWeeks||[]).forEach(w=>{
    const r=w.rating||{}; const s1=parseFloat(r.scoreU1); const s2=parseFloat(r.scoreU2);
    if(!isNaN(s1)&&!isNaN(s2)) genrePairs.push({type:'genre',name:w.genreName,context:`Semana ${w.weekNum}`,u1:s1,u2:s2,diff:Math.abs(s1-s2)});
  });
  const allPairs=[...artistPairs,...genrePairs];
  const agreement=allPairs.length?Math.round((allPairs.filter(x=>x.diff<=1.5).length/allPairs.length)*100):null;
  const avgDiff=allPairs.length?allPairs.reduce((sum,x)=>sum+x.diff,0)/allPairs.length:null;
  const divergences=[...allPairs].sort((a,b)=>b.diff-a.diff).slice(0,5);
  const closeMatches=[...allPairs].filter(x=>x.diff<=1).sort((a,b)=>a.diff-b.diff).slice(0,5);
  return {agreement,avgDiff,divergences,closeMatches,totalPairs:allPairs.length};
}

function getGenreLearning(genre){
  if(!genre)return null;
  const core=(genre.artists||[]).filter(a=>a.role==='core');
  const variations=(genre.artists||[]).filter(a=>a.role==='variation');
  const wildcard=(genre.artists||[]).find(a=>a.role==='wildcard');
  const learning=genre.learning||{};
  const signature=(genre.moodTags||[]).slice(0,4);
  const situations=(genre.suggestedSituations||[]).slice(0,4);
  return {
    birthplace:learning.birthplace||genre.originContext||'Origen pendiente de documentar.',
    era:learning.era||genre.originContext||'Época pendiente de documentar.',
    shortStory:learning.shortStory||`${genre.name} se entiende mejor como una escena sonora: ${genre.description||'un lenguaje musical con identidad propia.'}`,
    whatDefinesIt:learning.whatDefinesIt||genre.description||'Sonido, actitud y contexto cultural propios.',
    howToRecognizeIt:learning.howToRecognizeIt||[
      signature.length?`Mood dominante: ${signature.join(', ')}.`:'Fíjate en el ritmo, la producción y la forma de cantar/tocar.',
      core[0]?`Empieza por ${core[0].name}, una referencia central del género.`:'Empieza por los artistas marcados como core.',
      situations.length?`Suele encajar en: ${situations.join(', ')}.`:'Piensa en qué situaciones os pide escucharlo.'
    ],
    curiousFact:learning.curiousFact||((wildcard&&wildcard.name)?`La wildcard de esta ficha es ${wildcard.name}: sirve para ver un borde menos obvio del género.`:'La wildcard os ayuda a escuchar una versión menos obvia del género.'),
    keyListening:learning.keyListening||[...(core||[]),...(variations||[])].slice(0,3).map(a=>a.name).join(' · '),
    miniQuiz:learning.miniQuiz||buildDefaultMiniQuiz(genre)
  };
}
function buildDefaultMiniQuiz(genre){
  const core=(genre.artists||[]).filter(a=>a.role==='core');
  const variation=(genre.artists||[]).filter(a=>a.role==='variation');
  const wildcard=(genre.artists||[]).find(a=>a.role==='wildcard');
  const tags=genre.moodTags||[];
  const situations=genre.suggestedSituations||[];
  const q=[];
  q.push({
    id:'origin',
    question:`Según la ficha, ¿dónde/cuándo surge ${genre.name}?`,
    options:[genre.originContext||'Contexto no indicado','España, años 80','Nueva York, años 70','Internet, años 2010'].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i).slice(0,4),
    correctAnswer:genre.originContext||'Contexto no indicado',
    explanation:'La respuesta sale del contexto/origen del género en la biblioteca.'
  });
  if(tags[0]) q.push({
    id:'mood',
    question:`¿Qué etiqueta de mood aparece asociada a ${genre.name}?`,
    options:[tags[0],'ultra comercial','silencioso','infantil'].filter((v,i,a)=>a.indexOf(v)===i).slice(0,4),
    correctAnswer:tags[0],
    explanation:'Los mood tags ayudan a reconocer la sensación del género.'
  });
  if(core[0]) q.push({
    id:'core',
    question:`¿Qué artista está marcado como referencia core de ${genre.name}?`,
    options:[core[0]?.name,variation[0]?.name,wildcard?.name,(genre.artists||[])[3]?.name].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i).slice(0,4),
    correctAnswer:core[0].name,
    explanation:'Los artistas core son la puerta de entrada más representativa.'
  });
  if(situations[0]) q.push({
    id:'situation',
    question:`¿En qué situación sugiere la app escuchar ${genre.name}?`,
    options:[situations[0],'silencio absoluto','leer un contrato','hacer una auditoría bancaria'].filter((v,i,a)=>a.indexOf(v)===i).slice(0,4),
    correctAnswer:situations[0],
    explanation:'La idea es asociar el género a momentos reales de escucha.'
  });
  return q.slice(0,4);
}
function getQuizResultForUser(week,userKey){
  return ((week&&week.learningQuiz)||{})[userKey]||null;
}
function scoreQuiz(quiz,answers){
  const qs=quiz||[];
  const correct=qs.reduce((sum,q)=>sum+((answers||{})[q.id]===q.correctAnswer?1:0),0);
  return {score:correct,total:qs.length,percent:qs.length?Math.round((correct/qs.length)*100):0};
}

              {week.learningQuiz.u2&&<div className="metric"><div className="metric-label">Historiador {u2}</div><div className="metric-value">{week.learningQuiz.u2.score}/{week.learningQuiz.u2.total}</div></div>}

        <div className="section-title">Artistas</div>
        {(week.artists||[]).map(a=>{
          const avg=calcArtistAvg(a);
          return(
            <div key={a.id} style={{padding:'8px 0',borderBottom:'0.5px solid var(--border)'}}>
              <div className="row" style={{justifyContent:'space-between'}}>
                <span style={{fontWeight:500}}>{a.name}</span>
                <div className="row" style={{gap:6}}>
                  {avg!==null&&<span style={{fontWeight:500,color:'var(--c2)'}}>{avg.toFixed(1)}</span>}

                </div>
              </div>
              {(a.scoreU1||a.scoreU2||a.replayU1||a.replayU2)&&<div className="row" style={{marginTop:3,gap:12,fontSize:12,color:'var(--muted)'}}>
                {a.scoreU1&&<span>{u1}: {a.scoreU1}{a.replayU1?` · Replay: ${replayLabel(a.replayU1)}`:''}</span>}
                {a.scoreU2&&<span>{u2}: {a.scoreU2}{a.replayU2?` · Replay: ${replayLabel(a.replayU2)}`:''}</span>}

                {a.commentU2&&<span style={{fontStyle:'italic'}}>"{a.commentU2}"</span>}
              </div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DashboardTab({weeks,completedWeeks,activeWeek,u1,u2,genreRankings,artistRankings,genres,completedGenreIds,onGenerate,onGoSemana,onManualSelect}){
  const avgU1=useMemo(()=>{
    const v=completedWeeks.filter(w=>!isNaN(parseFloat(w.rating?.scoreU1))).map(w=>parseFloat(w.rating.scoreU1));
    return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;
  },[completedWeeks]);
  const avgU2=useMemo(()=>{
    const v=completedWeeks.filter(w=>!isNaN(parseFloat(w.rating?.scoreU2))).map(w=>parseFloat(w.rating.scoreU2));
    return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;
  },[completedWeeks]);
  const famCount={};completedWeeks.forEach(w=>{famCount[w.genreFamily]=(famCount[w.genreFamily]||0)+1;});
  const topFam=Object.entries(famCount).sort((a,b)=>b[1]-a[1])[0];
  const activeProgress=useMemo(()=>getWeekSongProgress(activeWeek),[activeWeek]);
  const streak=useMemo(()=>getCurrentStreak(completedWeeks),[completedWeeks]);
  const comparison=useMemo(()=>getComparisonInsights(completedWeeks),[completedWeeks]);

  return(
    <div>
      <div className="row" style={{justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <div>
          <h1>Dashboard</h1>
          <p className="muted">Vuestro laboratorio musical juntos 🎵</p>
        </div>
        <div className="row">
          {!activeWeek&&<button className="btn btn-primary" onClick={onGenerate}>🎲 Nueva semana aleatoria</button>}
          {!activeWeek&&<button className="btn" onClick={onManualSelect}>Elegir género</button>}
          {activeWeek&&<button className="btn btn-primary" onClick={onGoSemana}>Ver semana activa →</button>}
        </div>
      </div>

      <div className="grid4" style={{marginBottom:16}}>
        <div className="metric"><div className="metric-label">Semanas completadas</div><div className="metric-value">{completedWeeks.length}</div></div>
        <div className="metric"><div className="metric-label">Géneros escuchados</div><div className="metric-value">{(completedGenreIds||[]).length}</div></div>
        <div className="metric"><div className="metric-label">Géneros pendientes</div><div className="metric-value">{genres.length-(completedGenreIds||[]).length}</div></div>
        <div className="metric"><div className="metric-label">Familia favorita</div><div className="metric-value" style={{fontSize:13}}>{topFam?topFam[0]:'—'}</div></div>
        <div className="metric"><div className="metric-label">Media {u1}</div><div className="metric-value">{avgU1!==null?avgU1.toFixed(1):'—'}</div></div>
        <div className="metric"><div className="metric-label">Media {u2}</div><div className="metric-value">{avgU2!==null?avgU2.toFixed(1):'—'}</div></div>
        <div className="metric"><div className="metric-label">Diferencia media</div><div className="metric-value">{(avgU1!==null&&avgU2!==null)?Math.abs(avgU1-avgU2).toFixed(1):'—'}</div></div>
        <div className="metric"><div className="metric-label">Biblioteca total</div><div className="metric-value">{genres.length}</div></div>
      </div>

      <div className="grid3" style={{marginBottom:16}}>
        <div className="insight-card">
          <div className="insight-title">🔥 Racha actual</div>
          <div className="insight-value">{streak}</div>
          <div className="insight-copy">{streak===1?'1 semana completada seguida':streak>1?`${streak} semanas consecutivas completadas`:'Completad una semana para iniciar racha'}</div>
        </div>
        <div className="insight-card">
          <div className="insight-title">🤝 Coincidencia {u1} / {u2}</div>
          <div className="insight-value">{comparison.agreement!==null?`${comparison.agreement}%`:'—'}</div>
          <div className="insight-copy">{comparison.totalPairs?`Basado en ${comparison.totalPairs} valoraciones comparables · diferencia media ${comparison.avgDiff.toFixed(1)}`:'Valorad ambos artistas o semanas para calcular afinidad'}</div>
        </div>
        <div className="insight-card">
          <div className="insight-title">⚡ Mayor diferencia</div>
          <div className="insight-value">{comparison.divergences[0]?comparison.divergences[0].diff.toFixed(1):'—'}</div>
          <div className="insight-copy">{comparison.divergences[0]?`${comparison.divergences[0].name} · ${u1} ${comparison.divergences[0].u1} / ${u2} ${comparison.divergences[0].u2}`:'Aún no hay discrepancias medibles'}</div>
        </div>
      </div>

      {activeWeek&&(
        <div className="card" style={{borderLeft:'3px solid var(--green)',marginBottom:16}}>
          <div className="row" style={{justifyContent:'space-between',marginBottom:10}}>
            <div>
              <div style={{fontWeight:700}}>Progreso semanal</div>
              <div className="muted" style={{fontSize:12}}>{activeProgress.listenedSongs}/{activeProgress.totalSongs} canciones · {activeProgress.listenedArtists}/{activeProgress.totalArtists} artistas</div>
            </div>
            <span className="sync-pill sync-saved">{activeProgress.songPct}%</span>
          </div>
          <div className="progress-large"><div className="progress-large-fill" style={{width:`${activeProgress.songPct}%`}}></div></div>
          <div className="insight-copy">{activeProgress.songPct>=100?'Semana lista para cerrar 🎉':'La racha subirá cuando cerréis la semana.'}</div>
        </div>
      )}

      {activeWeek&&(
        <div className="card" style={{borderLeft:'3px solid var(--c1)',marginBottom:16}}>
          <div className="row" style={{justifyContent:'space-between'}}>
            <div>
              <div style={{fontWeight:500}}>Semana activa: {activeWeek.genreName}</div>
              <div className="muted" style={{fontSize:12}}>Desde {activeWeek.startDate} · {activeWeek.genreFamily}</div>
            </div>
            <button className="btn btn-sm btn-primary" onClick={onGoSemana}>Abrir →</button>
          </div>
        </div>
      )}

      {completedWeeks.length===0&&!activeWeek&&(

          <div className="icon">🎸</div>
          <div style={{fontWeight:500,marginBottom:6}}>¡Empezad vuestra aventura musical!</div>
          <p className="muted">Generaed vuestra primera semana para descubrir un nuevo género juntos.</p>
        </div>
      )}

      {genreRankings.length>0&&(
        <div className="grid2">
          <div className="card">
            <h2 style={{marginBottom:10}}>🏆 Top géneros</h2>
            {genreRankings.slice(0,5).map((g,i)=>(
              <div key={g.weekId} className="rank-item">
                <div className="rank-num">{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:500,fontSize:13}}>{g.name}</div>
                  <div className="muted" style={{fontSize:11}}>{g.family}</div>
                </div>
                {g.avg!==null&&<span style={{fontWeight:500,color:'var(--c2)'}}>{g.avg.toFixed(1)}</span>}
              </div>
            ))}
          </div>
          <div className="card">
            <h2 style={{marginBottom:10}}>⭐ Top artistas</h2>
            {artistRankings.slice(0,5).map((a,i)=>(
              <div key={i} className="rank-item">
                <div className="rank-num">{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:500,fontSize:13}}>{a.name}</div>
                  <div className="muted" style={{fontSize:11}}>{a.genreName}</div>
                </div>
                <span style={{fontWeight:500,color:'var(--c2)'}}>{a.avg.toFixed(1)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {completedWeeks.length>0&&(
        <div className="card" style={{marginTop:0}}>
          <h2 style={{marginBottom:10}}>📅 Últimas semanas</h2>
          {[...completedWeeks].reverse().slice(0,4).map(w=>{
            const r=w.rating||{};
            const s1=parseFloat(r.scoreU1);const s2=parseFloat(r.scoreU2);
            const avg=!isNaN(s1)&&!isNaN(s2)?(s1+s2)/2:(!isNaN(s1)?s1:(!isNaN(s2)?s2:null));
            return(
              <div key={w.id} className="row" style={{padding:'6px 0',borderBottom:'0.5px solid var(--border)',gap:8}}>
                <div style={{width:24,height:24,borderRadius:6,background:'var(--c3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:500,color:'var(--c2)',flexShrink:0}}>{w.weekNum}</div>

                  <div style={{fontWeight:500,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{w.genreName}</div>
                  <div className="muted" style={{fontSize:11}}>{w.startDate}</div>
                </div>
                {avg!==null&&<span style={{fontWeight:500,color:'var(--c2)',flexShrink:0}}>{avg.toFixed(1)}</span>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function SemanaTab({activeWeek,u1,u2,currentUserKey,currentUserName,genres,weeks,completedGenreIds,onGenerate,onManualSelect,manualGenreSelect,setManualGenreSelect,onGenreSelect,onUpdateArtist,onToggleSong,onUpdateLearning,onCloseWeek,weekCloseMode,setWeekCloseMode,weekRating,setWeekRating,onConfirmClose,expandedArtist,setExpandedArtist,onClearRating}){
  const [selGenre,setSelGenre]=useState('');
  const [weekInnerTab,setWeekInnerTab]=useState('escucha');
  const genreObj=activeWeek?genres.find(g=>g.id===activeWeek.genreId):null;

  if(manualGenreSelect){
    const done=completedGenreIds||[];
    const available=genres.filter(g=>!done.includes(g.id));
    const played=genres.filter(g=>done.includes(g.id));
    return(
      <div>
        <div className="row" style={{marginBottom:16}}>
          <button className="btn btn-sm" onClick={()=>setManualGenreSelect(false)}>← Volver</button>
          <h1>Elegir género manualmente</h1>
        </div>
        <div className="card">
          <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:6}}>Selecciona un género</label>
          <select value={selGenre} onChange={e=>setSelGenre(e.target.value)} style={{marginBottom:10}}>
            <option value="">— Selecciona —</option>
            {available.length>0&&<optgroup label={`Disponibles (${available.length})`}>
              {available.map(g=><option key={g.id} value={g.id}>{g.name} · {g.parentFamily}</option>)}
            </optgroup>}
            {played.length>0&&<optgroup label={`Ya escuchados (${played.length})`}>
              {played.map(g=><option key={g.id} value={g.id}>{g.name} (repetición)</option>)}
            </optgroup>}
          </select>
          <button className="btn btn-primary" disabled={!selGenre} onClick={()=>{onGenreSelect(selGenre);setManualGenreSelect(false);}}>Generar semana con este género</button>
        </div>
      </div>
    );
  }

  if(weekCloseMode&&activeWeek){
    const arts=activeWeek.artists;
    const u1Top=[...arts].filter(a=>a.scoreU1!=='').sort((a,b)=>parseFloat(b.scoreU1)-parseFloat(a.scoreU1)).slice(0,3);
    const u2Top=[...arts].filter(a=>a.scoreU2!=='').sort((a,b)=>parseFloat(b.scoreU2)-parseFloat(a.scoreU2)).slice(0,3);
    const both=arts.filter(a=>a.scoreU1!==''&&a.scoreU2!=='');
    const divisive=both.length?[...both].sort((a,b)=>Math.abs(parseFloat(b.scoreU1)-parseFloat(b.scoreU2))-Math.abs(parseFloat(a.scoreU1)-parseFloat(a.scoreU2)))[0]:null;
    const consensual=both.filter(a=>calcArtistAvg(a)>=7).sort((a,b)=>Math.abs(parseFloat(a.scoreU1)-parseFloat(a.scoreU2))-Math.abs(parseFloat(b.scoreU1)-parseFloat(b.scoreU2)))[0]||null;

            </div>
            {topJoint.length>0&&<p style={{fontSize:12,marginBottom:4}}><span className="muted">Top conjunto:</span> {topJoint.map(a=>`${a.name} (${calcArtistAvg(a).toFixed(1)})`).join(' · ')}</p>}

          <div style={{marginBottom:14}}>

            <textarea rows={3} value={weekRating.comment||''} onChange={e=>setWeekRating(p=>({...p,comment:e.target.value}))} placeholder="Conclusión conjunta si coincidís en algo..."/>
          </div>
          <button className="btn btn-primary" onClick={onConfirmClose}>✅ Cerrar semana y guardar</button>
        </div>
      </div>
    );
  }

  if(!activeWeek){
    return(
      <div className="empty-state">
        <div className="icon">🎵</div>
        <div style={{fontWeight:500,marginBottom:8}}>Sin semana activa</div>
        <p className="muted" style={{marginBottom:16}}>¿Preparados para descubrir un nuevo género esta semana?</p>
        <div className="row" style={{justifyContent:'center'}}>
          <button className="btn btn-primary" onClick={onGenerate}>🎲 Semana aleatoria</button>
          <button className="btn" onClick={onManualSelect}>Elegir género</button>
        </div>
      </div>
    );
  }

  const listened=activeWeek.artists.filter(a=>a.listened).length;
  const total=activeWeek.artists.length;

  return(
    <div>
      <div className="row" style={{justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:12}}>
        <div>
          <div className="genre-family">{activeWeek.genreFamily}</div>
          <h1>{activeWeek.genreName}</h1>
          <p className="muted">Semana {activeWeek.weekNum} · Desde {activeWeek.startDate}</p>
        </div>
        <button className="btn btn-primary" onClick={onCloseWeek}>Cerrar semana →</button>
      </div>

      {genreObj&&(
        <div className="card" style={{marginBottom:12}}>
          <p style={{fontSize:13,marginBottom:8}}>{genreObj.description}</p>
          <p className="muted" style={{fontSize:12,marginBottom:8}}>📍 {genreObj.originContext}</p>
          <div style={{marginBottom:6}}>
            {(genreObj.moodTags||[]).map(t=><span key={t} className="tag">#{t}</span>)}
          </div>
          {(genreObj.suggestedSituations||[]).length>0&&(
            <div>
              <span className="muted" style={{fontSize:11}}>Ideal para: </span>
              {(genreObj.suggestedSituations||[]).map(s=><span key={s} className="tag">{s}</span>)}
            </div>
          )}
        </div>
      )}

      <div className="row" style={{marginBottom:12,gap:12}}>
        <div style={{flex:1}}>
          <div className="muted" style={{fontSize:11,marginBottom:3}}>Escuchados: {listened}/{total}</div>
          <div className="progress-bar"><div className="progress-fill" style={{width:`${total?listened/total*100:0}%`}}/></div>
        </div>
        <span className="muted" style={{fontSize:12,whiteSpace:'nowrap'}}>{total?Math.round(listened/total*100):0}%</span>
      </div>

      <div className="sub-tabs" style={{marginTop:8}}>
        <button className={`sub-tab ${weekInnerTab==='escucha'?'active':''}`} onClick={()=>setWeekInnerTab('escucha')}>🎧 Escucha</button>
        <button className={`sub-tab ${weekInnerTab==='aprende'?'active':''}`} onClick={()=>setWeekInnerTab('aprende')}>📖 Aprende</button>
      </div>

      {weekInnerTab==='aprende'&&<LearningPanel genre={genreObj} week={activeWeek} u1={u1} u2={u2} currentUserKey={currentUserKey} currentUserName={currentUserName} onUpdateLearning={onUpdateLearning} mode="week"/>}

      {weekInnerTab==='escucha'&&activeWeek.artists.map(artist=>{
        const avg=calcArtistAvg(artist);
        const isExp=expandedArtist===artist.id;
        return(
          <div key={artist.id} className={`artist-card ${artist.listened?'listened':''}`}>
            <div className="row" style={{justifyContent:'space-between',marginBottom:8}}>
              <div className="row" style={{gap:8,flex:1,minWidth:0}}>
                <div className={`check-circle ${artist.listened?'checked':''}`}
                  onClick={()=>onUpdateArtist(activeWeek.id,artist.id,'listened',!artist.listened)}>
                  {artist.listened&&'✓'}
                </div>
                <div style={{minWidth:0}}>
                  <div className="row" style={{flexWrap:'wrap',gap:4}}>
                    <span style={{fontWeight:500}}>{artist.name}</span>
                    <Badge type={artist.role}/>
                    {artist.favU1&&<span style={{fontSize:11,color:'var(--c2)'}}>★{u1}</span>}
                    {artist.favU2&&<span style={{fontSize:11,color:'var(--success)'}}>★{u2}</span>}
                    {avg!==null&&<span style={{fontSize:13,fontWeight:500,color:'var(--c2)'}}>{avg.toFixed(1)}</span>}
                  </div>
                  <div className="muted" style={{fontSize:11}}>{artist.shortDescription}</div>
                </div>
              </div>
              <button className="btn btn-sm" onClick={()=>setExpandedArtist(isExp?null:artist.id)} style={{flexShrink:0}}>
                {isExp?'▲ Cerrar':'▼ Valorar'}
              </button>
            </div>

            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:4}}>
              {(artist.listenedSongs||[]).map((s,i)=>(
                <div key={i} className={`song-chip ${s.listened?'heard':''}`}
                  onClick={()=>onToggleSong(activeWeek.id,artist.id,i)}
                  title={s.note}>
                  <span style={{width:12,height:12,borderRadius:2,background:s.listened?'var(--success)':'transparent',border:`1.5px solid ${s.listened?'var(--success)':'var(--muted)'}`,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#fff',flexShrink:0}}>{s.listened&&'✓'}</span>
                  <span>{s.title}</span>
                  <button className="spotify-btn" type="button" title={`Abrir en Spotify: ${artist.name} - ${s.title}`} aria-label={`Abrir en Spotify ${artist.name} ${s.title}`} onClick={e=>openSpotifyForSong(artist.name,s,e)}>▶</button>
                </div>
              ))}
            </div>

            {isExp&&(
              <div style={{marginTop:10,borderTop:'0.5px solid var(--border)',paddingTop:12}}>
                <div className="grid2" style={{marginBottom:10}}>
                  <div className="card card-sm" style={{background:'var(--bg-elev2)'}}>
                    <h3 style={{marginBottom:10}}>Evaluación {u1}</h3>
                    <ScoreInput label={`Nota ${u1}`} value={artist.scoreU1} onChange={v=>onUpdateArtist(activeWeek.id,artist.id,'scoreU1',v)}/>
                    <div style={{height:8}}/>
                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>¿Lo volverías a escuchar?</label>
                    <select value={artist.replayU1||artist.replay||''} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'replayU1',e.target.value)} style={{fontSize:12,marginBottom:8}}>
                      <option value="">—</option><option value="si">Sí</option><option value="tal_vez">Tal vez</option><option value="no">No</option>
                    </select>
                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>Mood / sensación {u1}</label>
                    <input value={artist.moodU1||''} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'moodU1',e.target.value)} placeholder="energía, nostalgia, calma..." style={{fontSize:12,marginBottom:8}}/>
                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>¿En qué situación lo pondrías?</label>
                    <input value={artist.situationsU1||''} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'situationsU1',e.target.value)} placeholder="gym, conducir, cena..." style={{fontSize:12,marginBottom:8}}/>
                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>Comentario {u1}</label>
                    <textarea rows={2} style={{fontSize:12,marginBottom:8}} value={artist.commentU1||''} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'commentU1',e.target.value)} placeholder="¿Qué te parece?"/>
                    <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,cursor:'pointer'}}>
                      <input type="checkbox" checked={!!artist.favU1} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'favU1',e.target.checked)} style={{width:'auto'}}/> ⭐ Favorito {u1}
                    </label>
                  </div>
                  <div className="card card-sm" style={{background:'var(--bg-elev2)'}}>
                    <h3 style={{marginBottom:10}}>Evaluación {u2}</h3>
                    <ScoreInput label={`Nota ${u2}`} value={artist.scoreU2} onChange={v=>onUpdateArtist(activeWeek.id,artist.id,'scoreU2',v)}/>
                    <div style={{height:8}}/>
                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>¿Lo volverías a escuchar?</label>
                    <select value={artist.replayU2||artist.replay||''} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'replayU2',e.target.value)} style={{fontSize:12,marginBottom:8}}>
                      <option value="">—</option><option value="si">Sí</option><option value="tal_vez">Tal vez</option><option value="no">No</option>
                    </select>
                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>Mood / sensación {u2}</label>
                    <input value={artist.moodU2||''} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'moodU2',e.target.value)} placeholder="energía, nostalgia, calma..." style={{fontSize:12,marginBottom:8}}/>
                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>¿En qué situación lo pondrías?</label>
                    <input value={artist.situationsU2||''} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'situationsU2',e.target.value)} placeholder="gym, conducir, cena..." style={{fontSize:12,marginBottom:8}}/>
                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>Comentario {u2}</label>
                    <textarea rows={2} style={{fontSize:12,marginBottom:8}} value={artist.commentU2||''} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'commentU2',e.target.value)} placeholder="¿Qué te parece?"/>
                    <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,cursor:'pointer'}}>
                      <input type="checkbox" checked={!!artist.favU2} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'favU2',e.target.checked)} style={{width:'auto'}}/> ⭐ Favorito {u2}
                    </label>
                  </div>
                </div>
                <div className="row" style={{justifyContent:'space-between',gap:8,paddingTop:10,borderTop:'1px solid var(--border)'}}>
                  <span style={{fontSize:11,color:'var(--green)',fontWeight:600}}>✓ Guardado automáticamente</span>
                  <div className="row" style={{gap:6}}>
                    {(hasArtistUserEval(artist,'u1')||hasArtistUserEval(artist,'u2'))&&(
                      <button className="btn btn-sm btn-danger" onClick={()=>onClearRating(activeWeek.id,artist.id)}>🗑 Borrar valoración</button>
                    )}
                    <button className="btn btn-sm btn-primary" onClick={()=>setExpandedArtist(null)}>Cerrar</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}


function LearningPanel({genre,week,u1,u2,currentUserKey,currentUserName,onUpdateLearning,mode='week'}){
  const learning=getGenreLearning(genre);
  const quiz=(learning&&learning.miniQuiz)||[];
  const existing=getQuizResultForUser(week,currentUserKey)||{};
  const [answers,setAnswers]=useState(existing.answers||{});
  useEffect(()=>{setAnswers((getQuizResultForUser(week,currentUserKey)||{}).answers||{});},[week&&week.id,currentUserKey]);
  if(!genre||!learning){
    return <div className="empty-state"><div className="icon">📖</div><div style={{fontWeight:700}}>Ficha de aprendizaje no disponible</div></div>;
  }
  const result=scoreQuiz(quiz,answers);
  const savedU1=getQuizResultForUser(week,'u1');
  const savedU2=getQuizResultForUser(week,'u2');
  function choose(q,opt){setAnswers(prev=>({...prev,[q.id]:opt}));}
  function saveQuiz(){
    if(!onUpdateLearning||!week||!currentUserKey)return;
    const res=scoreQuiz(quiz,answers);
    onUpdateLearning(week.id,currentUserKey,{answers,score:res.score,total:res.total,percent:res.percent,completedAt:new Date().toISOString()});
  }
  return(
    <div>
      <div className="learning-hero">
        <div className="learning-kicker">Aprende el género</div>
        <h2 style={{marginBottom:8}}>📖 {genre.name}, en corto</h2>
        <p style={{fontSize:14,lineHeight:1.55,marginBottom:10}}>{learning.shortStory}</p>
        <div className="learning-grid">
          <div className="learning-block"><div className="learning-block-title">Dónde nació</div><p className="muted" style={{fontSize:13,lineHeight:1.5}}>{learning.birthplace}</p></div>
          <div className="learning-block"><div className="learning-block-title">Qué lo distingue</div><p className="muted" style={{fontSize:13,lineHeight:1.5}}>{learning.whatDefinesIt}</p></div>
          <div className="learning-block"><div className="learning-block-title">Dato curioso</div><p className="muted" style={{fontSize:13,lineHeight:1.5}}>{learning.curiousFact}</p></div>
        </div>
      </div>
      <div className="grid2">
        <div className="card">
          <h2 style={{marginBottom:8}}>🎧 Cómo reconocerlo</h2>
          <ul className="learning-list">{(learning.howToRecognizeIt||[]).map((x,i)=><li key={i}>{x}</li>)}</ul>
          {learning.keyListening&&<p className="muted" style={{fontSize:12,marginTop:12}}>Escucha clave: {learning.keyListening}</p>}
        </div>
        <div className="card">
          <h2 style={{marginBottom:8}}>🏅 Tres lecturas de la semana</h2>
          <div className="learning-grid" style={{gridTemplateColumns:'1fr',marginTop:8}}>
            <div className="quiz-score-card"><div className="learning-block-title">Crítico del género</div><p className="muted" style={{fontSize:12}}>Lo que medís con vuestras notas: cuánto os ha gustado musicalmente.</p></div>
            <div className="quiz-score-card"><div className="learning-block-title">Explorador</div><p className="muted" style={{fontSize:12}}>Lo que medís con sorpresa, situaciones y replay: cuánto os abre puertas nuevas.</p></div>
            <div className="quiz-score-card"><div className="learning-block-title">Historiador</div><p className="muted" style={{fontSize:12}}>Lo que mide el mini test: si os quedasteis con la historia y señales del género.</p></div>
          </div>
        </div>
      </div>
      {mode==='week'&&(
        <div className="card" style={{marginTop:12}}>
          <div className="row" style={{justifyContent:'space-between',marginBottom:8}}>
            <div><h2 style={{marginBottom:4}}>🧠 Mini test de la semana</h2><p className="muted" style={{fontSize:12}}>Responde como {currentUserName}. La puntuación se guarda por separado para cada uno.</p></div>
            <span className="sync-pill sync-saved">{result.score}/{result.total}</span>
          </div>
          {quiz.map((q,idx)=>(
            <div key={q.id||idx} style={{marginTop:12,paddingTop:12,borderTop:idx?'1px solid var(--border)':'none'}}>
              <div style={{fontWeight:800,fontSize:13,marginBottom:6}}>{idx+1}. {q.question}</div>
              {(q.options||[]).map(opt=>{
                const selected=answers[q.id]===opt;
                const saved=!!existing.completedAt;
                const cls=saved?(opt===q.correctAnswer?' correct':(selected?' wrong':'')):(selected?' selected':'');
                return <button key={opt} type="button" className={`quiz-option${cls}`} onClick={()=>choose(q,opt)}>{opt}</button>;
              })}
              {existing.completedAt&&<p className="muted" style={{fontSize:12,marginTop:6}}>💡 {q.explanation}</p>}
            </div>
          ))}
          <div className="row" style={{justifyContent:'space-between',marginTop:14,paddingTop:12,borderTop:'1px solid var(--border)'}}>
            <div className="muted" style={{fontSize:12}}>
              {savedU1&&<span style={{marginRight:10}}>{u1}: {savedU1.score}/{savedU1.total}</span>}
              {savedU2&&<span>{u2}: {savedU2.score}/{savedU2.total}</span>}
            </div>
            <button className="btn btn-primary" onClick={saveQuiz} disabled={!quiz.length}>Guardar test</button>
          </div>
        </div>
      )}
    </div>
  );
}

function RankingsTab({genreRankings,artistRankings,completedWeeks,u1,u2}){
  const [rt,setRt]=useState('genres');
  if(!completedWeeks.length) return<div className="empty-state"><div className="icon">🏆</div><div style={{fontWeight:500}}>Sin rankings todavía</div><p className="muted">Completad vuestra primera semana para ver los rankings.</p></div>;

  const artU1=[...artistRankings].filter(a=>a.scoreU1!==null).sort((a,b)=>b.scoreU1-a.scoreU1);
  const artU2=[...artistRankings].filter(a=>a.scoreU2!==null).sort((a,b)=>b.scoreU2-a.scoreU2);
  const divisiveGenres=[...genreRankings].filter(g=>!isNaN(g.scoreU1)&&!isNaN(g.scoreU2)).sort((a,b)=>Math.abs(b.scoreU1-b.scoreU2)-Math.abs(a.scoreU1-a.scoreU2));
  const famMap={};completedWeeks.forEach(w=>{const f=w.genreFamily||'';if(!famMap[f])famMap[f]={sum:0,n:0};const r=w.rating||{};[parseFloat(r.scoreU1),parseFloat(r.scoreU2)].forEach(s=>{if(!isNaN(s)){famMap[f].sum+=s;famMap[f].n++;}});});
  const famRank=Object.entries(famMap).filter(([,v])=>v.n>0).sort((a,b)=>(b[1].sum/b[1].n)-(a[1].sum/a[1].n));
  const comparison=getComparisonInsights(completedWeeks);

  return(
    <div>
      <h1 style={{marginBottom:10}}>Rankings</h1>
      <div className="sub-tabs">
        {[['genres','🎵 Géneros'],['artists','🎤 Artistas'],['families','🗂 Familias'],['divisive','⚡ Divisivos'],['match','🤝 Coincidencias']].map(([id,l])=>(
          <button key={id} className={`sub-tab ${rt===id?'active':''}`} onClick={()=>setRt(id)}>{l}</button>
        ))}
      </div>

      {rt==='genres'&&(
        <div className="card">
          <h2 style={{marginBottom:10}}>Géneros por nota media</h2>
          {genreRankings.length===0&&<p className="muted">Completad semanas con valoraciones para ver rankings.</p>}
          {genreRankings.map((g,i)=>(
            <div key={g.weekId} className="rank-item">
              <div className="rank-num">{i+1}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:500,fontSize:13}}>{g.name}</div>
                <div className="muted" style={{fontSize:11}}>{g.family} · Semana {g.weekNum}</div>
              </div>
              <div style={{textAlign:'right',fontSize:12}}>
                {!isNaN(g.scoreU1)&&<div style={{color:'var(--c2)'}}>{u1}: {g.scoreU1.toFixed(1)}</div>}
                {!isNaN(g.scoreU2)&&<div style={{color:'var(--success)'}}>{u2}: {g.scoreU2.toFixed(1)}</div>}
                {g.avg!==null&&<div style={{fontWeight:500,fontSize:14}}>Ø {g.avg.toFixed(1)}</div>}
              </div>
            </div>
          ))}
        </div>
      )}

      {rt==='artists'&&(
        <div className="grid2">
          <div className="card">
            <h2 style={{marginBottom:10}}>Top {u1}</h2>
            {artU1.slice(0,12).map((a,i)=>(
              <div key={i} className="rank-item">
                <div className="rank-num">{i+1}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{a.name}</div><div className="muted" style={{fontSize:11}}>{a.genreName}</div></div>
                <span style={{fontWeight:500,color:'var(--c2)'}}>{a.scoreU1.toFixed(1)}</span>
              </div>
            ))}
            {!artU1.length&&<p className="muted">Sin valoraciones de {u1} todavía.</p>}
          </div>
          <div className="card">
            <h2 style={{marginBottom:10}}>Top {u2}</h2>
            {artU2.slice(0,12).map((a,i)=>(
              <div key={i} className="rank-item">
                <div className="rank-num">{i+1}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{a.name}</div><div className="muted" style={{fontSize:11}}>{a.genreName}</div></div>
                <span style={{fontWeight:500,color:'var(--success)'}}>{a.scoreU2.toFixed(1)}</span>
              </div>
            ))}
            {!artU2.length&&<p className="muted">Sin valoraciones de {u2} todavía.</p>}
          </div>
          <div className="card">
            <h2 style={{marginBottom:10}}>Top conjunto</h2>
            {artistRankings.slice(0,12).map((a,i)=>(
              <div key={i} className="rank-item">
                <div className="rank-num">{i+1}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{a.name}</div><div className="muted" style={{fontSize:11}}>{a.genreName}</div></div>
                <span style={{fontWeight:500,color:'var(--c2)'}}>{a.avg.toFixed(1)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {rt==='families'&&(
        <div className="card">
          <h2 style={{marginBottom:10}}>Familias por nota media</h2>
          {famRank.map(([name,v],i)=>(
            <div key={name} className="rank-item">
              <div className="rank-num">{i+1}</div>
              <div style={{flex:1}}><div style={{fontWeight:500,fontSize:13}}>{name}</div></div>
              <span style={{fontWeight:500,color:'var(--c2)'}}>{(v.sum/v.n).toFixed(1)}</span>
            </div>
          ))}
          {!famRank.length&&<p className="muted">Necesitáis valoraciones de géneros para ver esto.</p>}
        </div>
      )}

      {rt==='divisive'&&(
        <div className="card">
          <h2 style={{marginBottom:4}}>Géneros más divisivos</h2>
          <p className="muted" style={{fontSize:12,marginBottom:10}}>Mayor diferencia entre {u1} y {u2}</p>
          {divisiveGenres.map((g,i)=>(
            <div key={g.weekId} className="rank-item">
              <div className="rank-num">{i+1}</div>
              <div style={{flex:1}}><div style={{fontWeight:500,fontSize:13}}>{g.name}</div></div>
              <div style={{textAlign:'right',fontSize:12}}>
                <div>{u1}: {g.scoreU1.toFixed(1)}</div>
                <div>{u2}: {g.scoreU2.toFixed(1)}</div>
                <div style={{fontWeight:500,color:'var(--danger)'}}>Δ {Math.abs(g.scoreU1-g.scoreU2).toFixed(1)}</div>
              </div>
            </div>
          ))}
          {!divisiveGenres.length&&<p className="muted">Necesitáis que ambos valoréis géneros para ver esto.</p>}
        </div>
      )}

      {rt==='match'&&(
        <div className="grid2">
          <div className="card">
            <h2 style={{marginBottom:6}}>🤝 Coincidencias</h2>
            <p className="muted" style={{fontSize:12,marginBottom:12}}>Valoraciones con diferencia de 1 punto o menos.</p>
            {comparison.closeMatches.map((x,i)=>(
              <div key={i} className="divergence-row">
                <div style={{minWidth:0}}><div style={{fontWeight:700,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.name}</div><div className="muted" style={{fontSize:11}}>{x.context}</div></div>
                <div style={{fontSize:12,textAlign:'right',flexShrink:0}}>{u1} {x.u1} · {u2} {x.u2}</div>
              </div>
            ))}
            {!comparison.closeMatches.length&&<p className="muted">Aún no hay coincidencias suficientes.</p>}
          </div>
          <div className="card">
            <h2 style={{marginBottom:6}}>⚡ Diferencias</h2>
            <p className="muted" style={{fontSize:12,marginBottom:12}}>Lo que más os separa musicalmente.</p>
            {comparison.divergences.map((x,i)=>(
              <div key={i} className="divergence-row">
                <div style={{minWidth:0}}><div style={{fontWeight:700,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.name}</div><div className="muted" style={{fontSize:11}}>{x.context}</div></div>
                <div style={{fontSize:12,textAlign:'right',flexShrink:0}}><div>{u1} {x.u1} · {u2} {x.u2}</div><div style={{color:'var(--danger)',fontWeight:800}}>Δ {x.diff.toFixed(1)}</div></div>
              </div>
            ))}
            {!comparison.divergences.length&&<p className="muted">Aún no hay diferencias suficientes.</p>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App(){
  const [data,setData]=useState(null);
  const [authUser,setAuthUser]=useState(null);
  const [authMode,setAuthMode]=useState('checking');
  const [firebaseApi,setFirebaseApi]=useState(null);
  const [syncStatus,setSyncStatus]=useState('checking');
  const [syncMessage,setSyncMessage]=useState('Inicializando seguridad...');
  const applyingRemoteRef=useRef(false);
  const saveTimerRef=useRef(null);
  const unsubscribeDocRef=useRef(null);
  const [tab,setTab]=useState('dashboard');
  const [confirm,setConfirm]=useState(null);
  const [genreSearch,setGenreSearch]=useState('');
  const [genreFilter,setGenreFilter]=useState('');
  const [expandedArtist,setExpandedArtist]=useState(null);
  const [weekCloseMode,setWeekCloseMode]=useState(false);
  const [weekRating,setWeekRating]=useState({});
  const [editingGenre,setEditingGenre]=useState(null);
  const [newGenreForm,setNewGenreForm]=useState(null);
  const [editingArtist,setEditingArtist]=useState(null);
  const [newArtistForm,setNewArtistForm]=useState(null);
  const [manualGenreSelect,setManualGenreSelect]=useState(false);
  const [viewWeek,setViewWeek]=useState(null);

  useEffect(()=>{
    let unsubAuth=null;
    let cancelled=false;
    window.firebaseReady.then(api=>{
      if(cancelled)return;
      setFirebaseApi(api);
      unsubAuth=api.onAuthStateChanged(api.auth,user=>{
        if(unsubscribeDocRef.current){unsubscribeDocRef.current();unsubscribeDocRef.current=null;}
        if(!user){
          setAuthUser(null);setAuthMode('signed_out');setData(null);setSyncStatus('offline');setSyncMessage('Inicia sesión para acceder.');
          return;
        }
        const email=(user.email||'').toLowerCase();
        if(!ALLOWED_EMAILS.includes(email)){
          setAuthUser(null);setData(null);setAuthMode('error');setSyncStatus('error');
          setSyncMessage('Cuenta no autorizada. Usa el correo de Jonathan o el de Lucy.');
          api.signOut(api.auth);
          return;
        }
        setAuthUser(user);setAuthMode('loading');setSyncStatus('loading');setSyncMessage('Verificando acceso y cargando nube...');
        const ref=api.doc(api.db,CLOUD_COLLECTION,CLOUD_DOCUMENT);
        unsubscribeDocRef.current=api.onSnapshot(ref,async snap=>{
          try{
            if(!snap.exists()){
              const seed=loadData()||initData();
              applyingRemoteRef.current=true;
              setData(seed);saveData(seed);
              setAuthMode('signed_in');setSyncStatus('saving');setSyncMessage('Inicializando documento seguro en la nube...');
              await api.setDoc(ref,{...seed,updatedAt:new Date().toISOString(),cloudUpdatedAt:api.serverTimestamp()},{merge:false});
              setTimeout(()=>{applyingRemoteRef.current=false;},1200);
              setSyncStatus('saved');setSyncMessage('Nube inicializada.');
              return;
            }
            const cloud=snap.data();
            if(!cloud||!cloud.settings||!cloud.genres)throw new Error('El documento de Firestore no tiene el formato esperado.');
            const clean={...cloud};delete clean.cloudUpdatedAt;
            const merged=mergeLibraryIntoData(clean);
            applyingRemoteRef.current=true;
            setData(merged);saveData(merged);
            if(merged!==clean){
              setSyncStatus('saving');setSyncMessage('Actualizando biblioteca musical ampliada en la nube...');
              await api.setDoc(ref,{...merged,updatedAt:new Date().toISOString(),cloudUpdatedAt:api.serverTimestamp()},{merge:false});
            }
            setAuthMode('signed_in');setSyncStatus('saved');setSyncMessage('Sincronizado en la nube.');
            setTimeout(()=>{applyingRemoteRef.current=false;},1200);
          }catch(e){
            console.error(e);setAuthMode('error');setSyncStatus('error');setSyncMessage(e.message||'Error cargando Firestore.');
          }
        },err=>{
          console.error('Firestore access error',err);
          setData(null);setAuthMode('error');setSyncStatus('error');
          setSyncMessage(err.code==='permission-denied'?'Acceso denegado. Revisa que este Google esté autorizado en las reglas de Firestore.':(err.message||'Error de Firestore.'));
        });
      });
    }).catch(err=>{
      console.error('Firebase ready error',err);setAuthMode('firebase_error');setSyncStatus('error');setSyncMessage(err.message||'Firebase no pudo inicializarse.');
    });
    return()=>{cancelled=true;if(unsubAuth)unsubAuth();if(unsubscribeDocRef.current)unsubscribeDocRef.current();if(saveTimerRef.current)clearTimeout(saveTimerRef.current);};
  },[]);

  useEffect(()=>{
    if(!data)return;
    saveData(data);
    if(!authUser||!firebaseApi||applyingRemoteRef.current)return;
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    setSyncStatus('saving');setSyncMessage('Guardando cambios en la nube...');
    saveTimerRef.current=setTimeout(async()=>{
      try{
        const ref=firebaseApi.doc(firebaseApi.db,CLOUD_COLLECTION,CLOUD_DOCUMENT);
        await firebaseApi.setDoc(ref,{...data,updatedAt:new Date().toISOString(),cloudUpdatedAt:firebaseApi.serverTimestamp()},{merge:false});
        setSyncStatus('saved');setSyncMessage('Guardado en la nube.');
      }catch(e){
        console.error('Cloud save error',e);setSyncStatus('error');setSyncMessage(e.message||'No se pudo guardar en Firestore.');
      }
    },450);
  },[data,authUser,firebaseApi]);

  async function signIn(){
    const api=firebaseApi||await window.firebaseReady;
    setFirebaseApi(api);
    setSyncStatus('loading');setSyncMessage('Abriendo inicio de sesión con Google...');
    try{
      await api.signInWithPopup(api.auth,api.provider);
    }catch(e){
      console.error('Google login error',e);
      setAuthMode('error');setSyncStatus('error');
      let msg='No se pudo iniciar sesión con Google.';
      if(e.code==='auth/unauthorized-domain')msg='Dominio no autorizado en Firebase Auth. Añade jonathancohenav-bit.github.io en Authentication > Settings > Authorized domains.';
      if(e.code==='auth/popup-blocked')msg='El navegador bloqueó la ventana de Google. Permite popups para esta web o prueba Safari/Chrome directamente, no desde apps internas.';
      if(e.code==='auth/popup-closed-by-user')msg='Se cerró la ventana de Google antes de completar el inicio de sesión.';
      if(e.message)msg+=' Detalle: '+e.message;
      setSyncMessage(msg);
    }
  }
  async function signOutNow(){
    const api=firebaseApi||await window.firebaseReady;
    await api.signOut(api.auth);
  }

  const safeData=data||{settings:{user1:'Jonathan',user2:'Lucy'},genres:[],weeks:[],activeWeekId:null,completedGenreIds:[]};
  const {settings,genres,weeks,activeWeekId,completedGenreIds}=safeData;
  const u1=settings.user1||'Jonathan';
  const u2=settings.user2||'Lucy';
  const currentUserKey=getUserKeyFromEmail(authUser&&authUser.email)||'u1';
  const currentUserName=currentUserKey==='u2'?u2:u1;

  const update=useCallback(fn=>setData(prev=>({...fn(prev)})),[]);

  const activeWeek=useMemo(()=>weeks.find(w=>w.id===activeWeekId),[weeks,activeWeekId]);
  const completedWeeks=useMemo(()=>weeks.filter(w=>w.status==='completed'),[weeks]);
  const families=useMemo(()=>[...new Set(genres.map(g=>g.parentFamily))].sort(),[genres]);

  const filteredGenres=useMemo(()=>genres.filter(g=>{
    const ms=!genreSearch||g.name.toLowerCase().includes(genreSearch.toLowerCase())||g.parentFamily.toLowerCase().includes(genreSearch.toLowerCase());
    const mf=!genreFilter||g.parentFamily===genreFilter;
    return ms&&mf;
  }),[genres,genreSearch,genreFilter]);

  const genreRankings=useMemo(()=>completedWeeks.map(w=>{
    const r=w.rating||{};
    const s1=parseFloat(r.scoreU1);const s2=parseFloat(r.scoreU2);
    const scores=[[s1],[s2]].filter(([s])=>!isNaN(s)).map(([s])=>s);
    const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:null;
    return{weekId:w.id,genreId:w.genreId,name:w.genreName,family:w.genreFamily,scoreU1:s1,scoreU2:s2,avg,weekNum:w.weekNum};
  }).filter(g=>g.avg!==null).sort((a,b)=>b.avg-a.avg),[completedWeeks]);

  const artistRankings=useMemo(()=>{
    const all=[];
    completedWeeks.forEach(w=>(w.artists||[]).forEach(a=>{
      const avg=calcArtistAvg(a);
      if(avg!==null) all.push({name:a.name,genreName:w.genreName,scoreU1:isNaN(parseFloat(a.scoreU1))?null:parseFloat(a.scoreU1),scoreU2:isNaN(parseFloat(a.scoreU2))?null:parseFloat(a.scoreU2),avg});
    }));
    return all.sort((a,b)=>b.avg-a.avg);
  },[completedWeeks]);

  if(authMode==='checking')return <AuthGate mode="checking" message="Comprobando sesión persistente..." onLogin={signIn}/>;
  if(authMode==='signed_out')return <AuthGate mode="signed_out" message="Solo Jonathan y Lucy pueden acceder. La sesión queda iniciada en este navegador." onLogin={signIn}/>;
  if((authMode==='error'||authMode==='firebase_error')&&!data)return <AuthGate mode="error" message={syncMessage} onLogin={signIn} onSignOut={signOutNow}/>;
  if(!data)return <AuthGate mode="loading" message={syncMessage} onLogin={signIn}/>;

  function generateWeek(genreId){
    const genre=genres.find(g=>g.id===genreId);
    if(!genre)return;
    const weekNum=weeks.length+1;
    const artists=[...genre.artists]
      .sort((a,b)=>({core:0,variation:1,wildcard:2}[a.role]||2)-({core:0,variation:1,wildcard:2}[b.role]||2))
      .slice(0,10)
      .map(a=>({
        ...a,
        listened:false,scoreU1:'',scoreU2:'',
        commentU1:'',commentU2:'',
        moodU1:'',moodU2:'',situationsU1:'',situationsU2:'',
        replayU1:'',replayU2:'',
        favU1:false,favU2:false,
        listenedSongs:(a.suggestedSongs||[]).map(s=>({...s,listened:false}))
      }));
    const week={id:genId(),weekNum,startDate:new Date().toISOString().split('T')[0],genreId,genreName:genre.name,genreFamily:genre.parentFamily,status:'in_progress',artists,rating:{}};
    update(prev=>({...prev,weeks:[...prev.weeks,week],activeWeekId:week.id}));
    setTab('semana');
  }

  function randomGenre(){
    const used=completedGenreIds||[];
    let available=genres.filter(g=>!used.includes(g.id));
    if(!available.length){
      if(!window.confirm('Ya habéis escuchado todos los géneros. ¿Reiniciar ciclo?'))return;
      update(prev=>({...prev,completedGenreIds:[]}));
      available=[...genres];
    }
    generateWeek(available[Math.floor(Math.random()*available.length)].id);
  }

  function updateArtist(weekId,artId,field,value){
    update(prev=>({...prev,weeks:prev.weeks.map(w=>w.id===weekId?{...w,artists:w.artists.map(a=>a.id===artId?{...a,[field]:value}:a)}:w)}));
  }

  function toggleSong(weekId,artId,songIdx){
    update(prev=>({...prev,weeks:prev.weeks.map(w=>w.id===weekId?{...w,artists:w.artists.map(a=>a.id===artId?{...a,listenedSongs:a.listenedSongs.map((s,i)=>i===songIdx?{...s,listened:!s.listened}:s)}:a)}:w)}));
  }

  function updateWeekLearning(weekId,userKey,result){
    update(prev=>({...prev,weeks:prev.weeks.map(w=>w.id===weekId?{...w,learningQuiz:{...(w.learningQuiz||{}),[userKey]:result}}:w)}));
  }

  function closeWeek(){
    update(prev=>({
      ...prev,
      weeks:prev.weeks.map(w=>w.id===activeWeek.id?{...w,status:'completed',rating:weekRating}:w),
      activeWeekId:null,
      completedGenreIds:[...(prev.completedGenreIds||[]),activeWeek.genreId]
    }));
    setWeekCloseMode(false);setWeekRating({});setTab('dashboard');
  }

  function deleteWeek(id){
    update(prev=>{
      const w=prev.weeks.find(x=>x.id===id);
      return{...prev,weeks:prev.weeks.filter(x=>x.id!==id),activeWeekId:prev.activeWeekId===id?null:prev.activeWeekId,completedGenreIds:w&&w.status==='completed'?prev.completedGenreIds.filter(g=>g!==w.genreId):prev.completedGenreIds};
    });
    setConfirm(null);
  }

  function clearArtistRatingNow(weekId,artId){
    update(prev=>({...prev,weeks:prev.weeks.map(w=>w.id===weekId?{...w,artists:w.artists.map(a=>a.id===artId?{...a,scoreU1:'',scoreU2:'',commentU1:'',commentU2:'',favU1:false,favU2:false,replay:'',replayU1:'',replayU2:'',moodU1:'',moodU2:'',situationsU1:'',situationsU2:''}:a)}:w)}));
    setConfirm(null);
  }

  function wipeAllNow(){
    const fresh=initData();setData(fresh);saveData(fresh);
    setConfirm(null);
  }

  function exportData(){
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='musiclab_backup.json';a.click();URL.revokeObjectURL(url);
  }

  function importData(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d&&d.settings&&d.genres){const merged=mergeLibraryIntoData(d);setData(merged);alert('✅ Backup importado correctamente. Biblioteca ampliada preservada.');}
        else alert('❌ Archivo inválido.');
      }catch{alert('❌ Error al parsear el archivo.');}
    };
    reader.readAsText(file);
    e.target.value='';
  }

  function resetAll(){
    setConfirm({type:'wipe'});
  }

  return(
    <div className="app">
      <div className="app-header">
        <div className="app-logo">🎵</div>
        <div>
          <div style={{fontWeight:500,fontSize:17,color:'var(--c2)'}}>Music Discovery Lab</div>
          <div className="muted" style={{fontSize:12}}>{u1} & {u2} · {completedWeeks.length} semanas · {genres.length} géneros</div>
          <div className="secure-session">🔐 Sesión segura con Google · persistencia activada</div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',justifyContent:'flex-end'}}>
          <CloudStatusPill status={syncStatus}/>
          {activeWeek&&<Badge type="in_progress"/>}
          <button className="btn btn-xs" onClick={signOutNow}>Salir</button>
        </div>
      </div>

      <nav className="nav">
        {[
          ['dashboard','🏠 Dashboard'],
          ['semana','🎧 Semana activa'],
          ['rankings','🏆 Rankings'],
          ['historial','📅 Historial'],
          ['biblioteca','📚 Biblioteca'],
          ['ajustes','⚙ Ajustes'],
        ].map(([id,label])=>(
          <button key={id} className={`nav-btn ${tab===id?'active':''}`} onClick={()=>setTab(id)}>
            {label}
            {id==='semana'&&activeWeek&&<span style={{marginLeft:5,width:7,height:7,borderRadius:'50%',background:'var(--c1)',display:'inline-block',verticalAlign:'middle'}}/>}
          </button>
        ))}
      </nav>

      <div>
        {tab==='dashboard'&&<DashboardTab weeks={weeks} completedWeeks={completedWeeks} activeWeek={activeWeek} u1={u1} u2={u2} genreRankings={genreRankings} artistRankings={artistRankings} genres={genres} completedGenreIds={completedGenreIds} onGenerate={randomGenre} onGoSemana={()=>setTab('semana')} onManualSelect={()=>{setManualGenreSelect(true);setTab('semana');}}/>}
        {tab==='semana'&&<SemanaTab activeWeek={activeWeek} u1={u1} u2={u2} currentUserKey={currentUserKey} currentUserName={currentUserName} genres={genres} weeks={weeks} completedGenreIds={completedGenreIds} onGenerate={randomGenre} onManualSelect={()=>setManualGenreSelect(true)} manualGenreSelect={manualGenreSelect} setManualGenreSelect={setManualGenreSelect} onGenreSelect={generateWeek} onUpdateArtist={updateArtist} onToggleSong={toggleSong} onUpdateLearning={updateWeekLearning} onCloseWeek={()=>setWeekCloseMode(true)} weekCloseMode={weekCloseMode} setWeekCloseMode={setWeekCloseMode} weekRating={weekRating} setWeekRating={setWeekRating} onConfirmClose={closeWeek} expandedArtist={expandedArtist} setExpandedArtist={setExpandedArtist} onClearRating={(wId,aId)=>setConfirm({type:'rating',wId,aId})}/>}
        {tab==='rankings'&&<RankingsTab genreRankings={genreRankings} artistRankings={artistRankings} completedWeeks={completedWeeks} u1={u1} u2={u2}/>}
        {tab==='historial'&&<HistorialTab weeks={weeks} onDelete={id=>setConfirm({type:'week',id})} onView={w=>setViewWeek(w)} u1={u1} u2={u2}/>}
        {tab==='biblioteca'&&<BibliotecaTab genres={genres} filteredGenres={filteredGenres} genreSearch={genreSearch} setGenreSearch={setGenreSearch} genreFilter={genreFilter} setGenreFilter={setGenreFilter} families={families} completedGenreIds={completedGenreIds} onEditGenre={g=>setEditingGenre({...g})} onDeleteGenre={id=>setConfirm({type:'genre',id})} onAddGenre={()=>setNewGenreForm({name:'',parentFamily:'',description:'',originContext:'',moodTags:'',suggestedSituations:'',artists:[]})} onEditArtist={(g,a)=>setEditingArtist({genreId:g.id,artist:{...a}}) } onDeleteArtist={(gId,aId)=>setConfirm({type:'artist',gId,aId})} onAddArtist={g=>setNewArtistForm({genreId:g.id,artist:{name:'',role:'core',shortDescription:'',suggestedSongs:[{title:'',note:'',spotifyUrl:''},{title:'',note:'',spotifyUrl:''}]}})}/>}
        {tab==='ajustes'&&<AjustesTab settings={settings} onSaveSettings={s=>update(prev=>({...prev,settings:s}))} onExport={exportData} onImport={importData} onReset={resetAll}/>}
      </div>

      {/* MODALS */}
      {confirm&&confirm.type==='week'&&<ConfirmModal message="¿Eliminar esta semana? Esta acción no se puede deshacer." onConfirm={()=>deleteWeek(confirm.id)} onCancel={()=>setConfirm(null)}/>}
      {confirm&&confirm.type==='genre'&&<ConfirmModal message="¿Eliminar este género de la biblioteca?" onConfirm={()=>{update(prev=>({...prev,genres:prev.genres.filter(g=>g.id!==confirm.id)}));setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
      {confirm&&confirm.type==='artist'&&<ConfirmModal message="¿Eliminar este artista del género?" onConfirm={()=>{update(prev=>({...prev,genres:prev.genres.map(g=>g.id===confirm.gId?{...g,artists:g.artists.filter(a=>a.id!==confirm.aId)}:g)}));setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
      {confirm&&confirm.type==='rating'&&<ConfirmModal message="¿Seguro que quieres eliminar la valoración de este artista? Notas, comentarios y favoritos se borrarán." onConfirm={()=>clearArtistRatingNow(confirm.wId,confirm.aId)} onCancel={()=>setConfirm(null)}/>}
      {confirm&&confirm.type==='wipe'&&<ConfirmModal message="¿Seguro que quieres borrar TODOS los datos? Se eliminarán semanas, valoraciones, historial y la biblioteca volverá a su estado inicial. Esta acción es irreversible." onConfirm={wipeAllNow} onCancel={()=>setConfirm(null)}/>}
      {editingGenre&&<GenreEditModal genre={editingGenre} onSave={g=>{update(prev=>({...prev,genres:prev.genres.map(x=>x.id===g.id?g:x)}));setEditingGenre(null);}} onClose={()=>setEditingGenre(null)}/>}
      {newGenreForm&&<GenreEditModal genre={newGenreForm} isNew onSave={g=>{update(prev=>({...prev,genres:[...prev.genres,{...g,id:genId(),artists:[]}]}));setNewGenreForm(null);}} onClose={()=>setNewGenreForm(null)}/>}
      {editingArtist&&<ArtistEditModal genreId={editingArtist.genreId} artist={editingArtist.artist} onSave={(gId,a)=>{update(prev=>({...prev,genres:prev.genres.map(g=>g.id===gId?{...g,artists:g.artists.map(x=>x.id===a.id?a:x)}:g)}));setEditingArtist(null);}} onClose={()=>setEditingArtist(null)}/>}
      {newArtistForm&&<ArtistEditModal genreId={newArtistForm.genreId} artist={newArtistForm.artist} isNew onSave={(gId,a)=>{update(prev=>({...prev,genres:prev.genres.map(g=>g.id===gId?{...g,artists:[...g.artists,{...a,id:genId()}]}:g)}));setNewArtistForm(null);}} onClose={()=>setNewArtistForm(null)}/>}
      {viewWeek&&<WeekDetailModal week={viewWeek} u1={u1} u2={u2} onClose={()=>setViewWeek(null)}/>}
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
