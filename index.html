  const [weekRating,setWeekRating]=useState({});
  const [editingGenre,setEditingGenre]=useState(null);
  const [newGenreForm,setNewGenreForm]=useState(null);
  const [editingArtist,setEditingArtist]=useState(null);
  const [newArtistForm,setNewArtistForm]=useState(null);
  const [manualGenreSelect,setManualGenreSelect]=useState(false);
  const [viewWeek,setViewWeek]=useState(null);

  useEffect(()=>{
    let unsubAuth=null;
    let cancelled=false;
    window.firebaseReady.then(api=>{
      if(cancelled)return;
      setFirebaseApi(api);
      unsubAuth=api.onAuthStateChanged(api.auth,user=>{
        if(unsubscribeDocRef.current){unsubscribeDocRef.current();unsubscribeDocRef.current=null;}
        if(!user){
          setAuthUser(null);setAuthMode('signed_out');setData(null);setSyncStatus('offline');setSyncMessage('Inicia sesión para acceder.');
          return;
        }
        const email=(user.email||'').toLowerCase();
        if(!ALLOWED_EMAILS.includes(email)){
          setAuthUser(null);setData(null);setAuthMode('error');setSyncStatus('error');
          setSyncMessage('Cuenta no autorizada. Usa el correo de Jonathan o el de Lucy.');
          api.signOut(api.auth);
          return;
        }
        setAuthUser(user);setAuthMode('loading');setSyncStatus('loading');setSyncMessage('Verificando acceso y cargando nube...');
        const ref=api.doc(api.db,CLOUD_COLLECTION,CLOUD_DOCUMENT);
        unsubscribeDocRef.current=api.onSnapshot(ref,async snap=>{
          try{
            if(!snap.exists()){
              const seed=loadData()||initData();
              applyingRemoteRef.current=true;
              setData(seed);saveData(seed);
              setAuthMode('signed_in');setSyncStatus('saving');setSyncMessage('Inicializando documento seguro en la nube...');
              await api.setDoc(ref,{...seed,updatedAt:new Date().toISOString(),cloudUpdatedAt:api.serverTimestamp()},{merge:false});
              setTimeout(()=>{applyingRemoteRef.current=false;},1200);
              setSyncStatus('saved');setSyncMessage('Nube inicializada.');
              return;
            }
            const cloud=snap.data();
            if(!cloud||!cloud.settings||!cloud.genres)throw new Error('El documento de Firestore no tiene el formato esperado.');
            const clean={...cloud};delete clean.cloudUpdatedAt;
            const upgraded=upgradeLibraryData(clean);
            const needsLibraryMigration=JSON.stringify(clean.genres||[])!==JSON.stringify(upgraded.genres||[]);
            applyingRemoteRef.current=true;
            setData(upgraded);saveData(upgraded);
            setAuthMode('signed_in');
            if(needsLibraryMigration){
              setSyncStatus('saving');setSyncMessage('Actualizando biblioteca segura en la nube...');
              await api.setDoc(ref,{...upgraded,updatedAt:new Date().toISOString(),cloudUpdatedAt:api.serverTimestamp()},{merge:false});
              setSyncStatus('saved');setSyncMessage('Biblioteca actualizada en la nube.');
            }else{
              setSyncStatus('saved');setSyncMessage('Sincronizado en la nube.');
            }
            setTimeout(()=>{applyingRemoteRef.current=false;},1200);
          }catch(e){
            console.error(e);setAuthMode('error');setSyncStatus('error');setSyncMessage(e.message||'Error cargando Firestore.');
          }
        },err=>{
          console.error('Firestore access error',err);
          setData(null);setAuthMode('error');setSyncStatus('error');
          setSyncMessage(err.code==='permission-denied'?'Acceso denegado. Revisa que este Google esté autorizado en las reglas de Firestore.':(err.message||'Error de Firestore.'));
        });
      });
    }).catch(err=>{
      console.error('Firebase ready error',err);setAuthMode('firebase_error');setSyncStatus('error');setSyncMessage(err.message||'Firebase no pudo inicializarse.');
    });
    return()=>{cancelled=true;if(unsubAuth)unsubAuth();if(unsubscribeDocRef.current)unsubscribeDocRef.current();if(saveTimerRef.current)clearTimeout(saveTimerRef.current);};
  },[]);

  useEffect(()=>{
    if(!data)return;
    saveData(data);
    if(!authUser||!firebaseApi||applyingRemoteRef.current)return;
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    setSyncStatus('saving');setSyncMessage('Guardando cambios en la nube...');
    saveTimerRef.current=setTimeout(async()=>{
      try{
        const ref=firebaseApi.doc(firebaseApi.db,CLOUD_COLLECTION,CLOUD_DOCUMENT);
        await firebaseApi.setDoc(ref,{...data,updatedAt:new Date().toISOString(),cloudUpdatedAt:firebaseApi.serverTimestamp()},{merge:false});
        setSyncStatus('saved');setSyncMessage('Guardado en la nube.');
      }catch(e){
        console.error('Cloud save error',e);setSyncStatus('error');setSyncMessage(e.message||'No se pudo guardar en Firestore.');
      }
    },450);
  },[data,authUser,firebaseApi]);

  async function signIn(){
    const api=firebaseApi||await window.firebaseReady;
    setFirebaseApi(api);
    setSyncStatus('loading');setSyncMessage('Abriendo inicio de sesión con Google...');
    try{
      await api.signInWithPopup(api.auth,api.provider);
    }catch(e){
      console.error('Google login error',e);
      setAuthMode('error');setSyncStatus('error');
      let msg='No se pudo iniciar sesión con Google.';
      if(e.code==='auth/unauthorized-domain')msg='Dominio no autorizado en Firebase Auth. Añade jonathancohenav-bit.github.io en Authentication > Settings > Authorized domains.';
      if(e.code==='auth/popup-blocked')msg='El navegador bloqueó la ventana de Google. Permite popups para esta web o prueba Safari/Chrome directamente, no desde apps internas.';
      if(e.code==='auth/popup-closed-by-user')msg='Se cerró la ventana de Google antes de completar el inicio de sesión.';
      if(e.message)msg+=' Detalle: '+e.message;
      setSyncMessage(msg);
    }
  }
  async function signOutNow(){
    const api=firebaseApi||await window.firebaseReady;
    await api.signOut(api.auth);
  }

  const safeData=data||{settings:{user1:'Jonathan',user2:'Lucy'},genres:[],weeks:[],activeWeekId:null,completedGenreIds:[],challenges:[]};
  const {settings,genres,weeks,activeWeekId,completedGenreIds,challenges=[]}=safeData;
  const u1=settings.user1||'Jonathan';
  const u2=settings.user2||'Lucy';
  const currentUserKey=getUserKeyFromEmail(authUser&&authUser.email)||'u1';
  const pendingChallengeCount=challengePendingForUser(challenges,currentUserKey);

  const update=useCallback(fn=>setData(prev=>({...fn(prev)})),[]);

  const forceLibraryUpgrade=useCallback(()=>{
    setData(prev=>{
      if(!prev)return prev;
      const upgraded=upgradeLibraryData(prev);
      const before=(prev.genres||[]).length;
      const after=(upgraded.genres||[]).length;
      alert(`Biblioteca actualizada: ${before} → ${after} géneros. Se han conservado semanas, valoraciones e historial.`);
      return upgraded;
    });
  },[]);

  const activeWeek=useMemo(()=>weeks.find(w=>w.id===activeWeekId),[weeks,activeWeekId]);
  const completedWeeks=useMemo(()=>weeks.filter(w=>w.status==='completed'),[weeks]);
  const families=useMemo(()=>[...new Set(genres.map(g=>g.parentFamily))].sort(),[genres]);

  const filteredGenres=useMemo(()=>genres.filter(g=>{
    const ms=!genreSearch||g.name.toLowerCase().includes(genreSearch.toLowerCase())||g.parentFamily.toLowerCase().includes(genreSearch.toLowerCase());
    const mf=!genreFilter||g.parentFamily===genreFilter;
    return ms&&mf;
  }),[genres,genreSearch,genreFilter]);

  const genreRankings=useMemo(()=>completedWeeks.map(w=>{
    const r=w.rating||{};
    const s1=parseFloat(r.scoreU1);const s2=parseFloat(r.scoreU2);
    const scores=[[s1],[s2]].filter(([s])=>!isNaN(s)).map(([s])=>s);
    const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:null;
    return{weekId:w.id,genreId:w.genreId,name:w.genreName,family:w.genreFamily,scoreU1:s1,scoreU2:s2,avg,weekNum:w.weekNum};
  }).filter(g=>g.avg!==null).sort((a,b)=>b.avg-a.avg),[completedWeeks]);

  const artistRankings=useMemo(()=>{
    const all=[];
    completedWeeks.forEach(w=>(w.artists||[]).forEach(a=>{
      const avg=calcArtistAvg(a);
      if(avg!==null) all.push({name:a.name,genreName:w.genreName,scoreU1:isNaN(parseFloat(a.scoreU1))?null:parseFloat(a.scoreU1),scoreU2:isNaN(parseFloat(a.scoreU2))?null:parseFloat(a.scoreU2),avg});
    }));
    return all.sort((a,b)=>b.avg-a.avg);
  },[completedWeeks]);

  if(authMode==='checking')return <AuthGate mode="checking" message="Comprobando sesión persistente..." onLogin={signIn}/>;
  if(authMode==='signed_out')return <AuthGate mode="signed_out" message="Solo Jonathan y Lucy pueden acceder. La sesión queda iniciada en este navegador." onLogin={signIn}/>;
  if((authMode==='error'||authMode==='firebase_error')&&!data)return <AuthGate mode="error" message={syncMessage} onLogin={signIn} onSignOut={signOutNow}/>;
  if(!data)return <AuthGate mode="loading" message={syncMessage} onLogin={signIn}/>;

  function generateWeek(genreId){
    const genre=genres.find(g=>g.id===genreId);
    if(!genre)return;
    const weekNum=weeks.length+1;
    const artists=[...genre.artists]
      .sort((a,b)=>({core:0,variation:1,wildcard:2}[a.role]||2)-({core:0,variation:1,wildcard:2}[b.role]||2))
      .slice(0,10)
      .map(a=>({
        ...a,
        listened:false,listenedBy:{u1:false,u2:false},scoreU1:'',scoreU2:'',
        commentU1:'',commentU2:'',
        moodU1:'',moodU2:'',situationsU1:'',situationsU2:'',
        replayU1:'',replayU2:'',
        favU1:false,favU2:false,
        listenedSongs:(a.suggestedSongs||[]).map(s=>({...s,listened:false,listenedBy:{u1:false,u2:false},favoriteBy:{u1:false,u2:false}}))
      }));
    const week={id:genId(),weekNum,startDate:new Date().toISOString().split('T')[0],genreId,genreName:genre.name,genreFamily:genre.parentFamily,status:'in_progress',artists,rating:{}};
    update(prev=>({...prev,weeks:[...prev.weeks,week],activeWeekId:week.id}));
    setTab('semana');
  }

  function randomGenre(){
    const used=completedGenreIds||[];
    let available=genres.filter(g=>!used.includes(g.id));
    if(!available.length){
      if(!window.confirm('Ya habéis escuchado todos los géneros. ¿Reiniciar ciclo?'))return;
      update(prev=>({...prev,completedGenreIds:[]}));
      available=[...genres];
    }
    generateWeek(available[Math.floor(Math.random()*available.length)].id);
  }

  function updateArtist(weekId,artId,field,value){
    update(prev=>({...prev,weeks:prev.weeks.map(w=>w.id===weekId?{...w,artists:w.artists.map(a=>a.id===artId?{...a,[field]:value}:a)}:w)}));
  }

  function toggleArtistHeard(weekId,artId,userKey){
    update(prev=>({...prev,weeks:prev.weeks.map(w=>w.id===weekId?{...w,artists:w.artists.map(a=>{
      if(a.id!==artId)return a;
      const current=isHeardBy(a,userKey);
      const listenedBy={...(a.listenedBy||{}),[userKey]:!current};
      return {...a,listenedBy,listened:!!(listenedBy.u1||listenedBy.u2)};
    })}:w)}));
  }

  function toggleSong(weekId,artId,songIdx,userKey){
    update(prev=>({...prev,weeks:prev.weeks.map(w=>w.id===weekId?{...w,artists:w.artists.map(a=>{
      if(a.id!==artId)return a;
      const listenedSongs=(a.listenedSongs||[]).map((s,i)=>{
        if(i!==songIdx)return s;
        const current=isHeardBy(s,userKey||'u1');
        const listenedBy={...(s.listenedBy||{}),[userKey||'u1']:!current};
        return {...s,listenedBy,listened:!!(listenedBy.u1||listenedBy.u2)};
      });
      const listenedBy={...(a.listenedBy||{})};
      ['u1','u2'].forEach(u=>{listenedBy[u]=listenedSongs.some(song=>isHeardBy(song,u));});
      return {...a,listenedSongs,listenedBy,listened:!!(listenedBy.u1||listenedBy.u2)};
    })}:w)}));
  }

  function updateLearningQuiz(weekId,userKey,result){
    update(prev=>({...prev,weeks:prev.weeks.map(w=>w.id===weekId?{...w,learningQuiz:{...(w.learningQuiz||{}),[userKey]:{...result,answeredAt:new Date().toISOString()}}}:w)}));
  }

  function createChallenge(challenge){
    update(prev=>({...prev,challenges:[...(prev.challenges||[]),{...challenge,id:genId(),createdAt:new Date().toISOString()}]}));
  }
  function updateChallenge(id,patch){
    update(prev=>({...prev,challenges:(prev.challenges||[]).map(c=>c.id===id?{...c,...patch,updatedAt:new Date().toISOString()}:c)}));
  }
  function deleteChallenge(id){
    if(!window.confirm('¿Eliminar este reto?'))return;
    update(prev=>({...prev,challenges:(prev.challenges||[]).filter(c=>c.id!==id)}));
  }

  function closeWeek(){
    update(prev=>({
      ...prev,
      weeks:prev.weeks.map(w=>w.id===activeWeek.id?{...w,status:'completed',rating:weekRating}:w),
      activeWeekId:null,
      completedGenreIds:[...(prev.completedGenreIds||[]),activeWeek.genreId]
    }));
    setWeekCloseMode(false);setWeekRating({});setTab('dashboard');
  }

  function deleteWeek(id){
    update(prev=>{
      const w=prev.weeks.find(x=>x.id===id);
      return{...prev,weeks:prev.weeks.filter(x=>x.id!==id),activeWeekId:prev.activeWeekId===id?null:prev.activeWeekId,completedGenreIds:w&&w.status==='completed'?prev.completedGenreIds.filter(g=>g!==w.genreId):prev.completedGenreIds};
    });
    setConfirm(null);
  }

  function clearArtistRatingNow(weekId,artId){
    update(prev=>({...prev,weeks:prev.weeks.map(w=>w.id===weekId?{...w,artists:w.artists.map(a=>a.id===artId?{...a,scoreU1:'',scoreU2:'',commentU1:'',commentU2:'',favU1:false,favU2:false,replay:'',replayU1:'',replayU2:'',moodU1:'',moodU2:'',situationsU1:'',situationsU2:''}:a)}:w)}));
    setConfirm(null);
  }

  function wipeAllNow(){
    const fresh=initData();setData(fresh);saveData(fresh);
    setConfirm(null);
  }

  function exportData(){
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='musiclab_backup.json';a.click();URL.revokeObjectURL(url);
  }

  function importData(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d&&d.settings&&d.genres){setData(upgradeLibraryData(d));alert('✅ Backup importado correctamente.');}
        else alert('❌ Archivo inválido.');
      }catch{alert('❌ Error al parsear el archivo.');}
    };
    reader.readAsText(file);
    e.target.value='';
  }

  function resetAll(){
    setConfirm({type:'wipe'});
  }

  return(
    <div className="app">
      <div className="app-header">
        <div className="app-logo">🎵</div>
        <div>
          <div style={{fontWeight:500,fontSize:17,color:'var(--c2)'}}>Music Discovery Lab</div>
          <div className="muted" style={{fontSize:12}}>{u1} & {u2} · {completedWeeks.length} semanas · {genres.length} géneros</div>
          <div className="secure-session">🔐 Sesión segura con Google · persistencia activada</div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',justifyContent:'flex-end'}}>
          <CloudStatusPill status={syncStatus}/>
          {activeWeek&&<Badge type="in_progress"/>}
          <button className="btn btn-xs" onClick={signOutNow}>Salir</button>
        </div>
      </div>

      {pendingChallengeCount>0&&<div className="challenge-alert" style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        <span>🎯 Tienes {pendingChallengeCount} reto{pendingChallengeCount===1?'':'s'} pendiente{pendingChallengeCount===1?'':'s'}.</span>
        <button className="btn btn-xs" onClick={()=>setTab('retos')}>Ver retos</button>
      </div>}

      <nav className="nav">
        {[
          ['dashboard','🏠 Dashboard'],
          ['semana','🎧 Semana activa'],
          ['rankings','🏆 Rankings'],
          ['historial','📅 Historial'],
          ['biblioteca','📚 Biblioteca'],
          ['retos','🎯 Retos'],
          ['ajustes','⚙ Ajustes'],
        ].map(([id,label])=>(
          <button key={id} className={`nav-btn ${tab===id?'active':''}`} onClick={()=>setTab(id)}>
            {label}
            {id==='retos'&&pendingChallengeCount>0&&<span className="nav-badge">{pendingChallengeCount}</span>}
            {id==='semana'&&activeWeek&&<span style={{marginLeft:5,width:7,height:7,borderRadius:'50%',background:'var(--c1)',display:'inline-block',verticalAlign:'middle'}}/>}
          </button>
        ))}
      </nav>

      <div>
        {tab==='dashboard'&&<DashboardTab weeks={weeks} completedWeeks={completedWeeks} activeWeek={activeWeek} u1={u1} u2={u2} genreRankings={genreRankings} artistRankings={artistRankings} genres={genres} completedGenreIds={completedGenreIds} onGenerate={randomGenre} onGoSemana={()=>setTab('semana')} onManualSelect={()=>{setManualGenreSelect(true);setTab('semana');}}/>}
        {tab==='semana'&&<SemanaTab activeWeek={activeWeek} u1={u1} u2={u2} genres={genres} weeks={weeks} completedGenreIds={completedGenreIds} onGenerate={randomGenre} onManualSelect={()=>setManualGenreSelect(true)} manualGenreSelect={manualGenreSelect} setManualGenreSelect={setManualGenreSelect} onGenreSelect={generateWeek} onUpdateArtist={updateArtist} onToggleArtistHeard={toggleArtistHeard} onToggleSong={toggleSong} onCloseWeek={()=>setWeekCloseMode(true)} weekCloseMode={weekCloseMode} setWeekCloseMode={setWeekCloseMode} weekRating={weekRating} setWeekRating={setWeekRating} onConfirmClose={closeWeek} expandedArtist={expandedArtist} setExpandedArtist={setExpandedArtist} onClearRating={(wId,aId)=>setConfirm({type:'rating',wId,aId})} onSaveLearningQuiz={updateLearningQuiz}/>}
        {tab==='rankings'&&<RankingsTab genreRankings={genreRankings} artistRankings={artistRankings} completedWeeks={completedWeeks} u1={u1} u2={u2}/>}
        {tab==='historial'&&<HistorialTab weeks={weeks} onDelete={id=>setConfirm({type:'week',id})} onView={w=>setViewWeek(w)} u1={u1} u2={u2}/>}
        {tab==='biblioteca'&&<BibliotecaTab genres={genres} filteredGenres={filteredGenres} genreSearch={genreSearch} setGenreSearch={setGenreSearch} genreFilter={genreFilter} setGenreFilter={setGenreFilter} families={families} completedGenreIds={completedGenreIds} challenges={challenges} onGoChallenges={()=>setTab('retos')} onEditGenre={g=>setEditingGenre({...g})} onDeleteGenre={id=>setConfirm({type:'genre',id})} onAddGenre={()=>setNewGenreForm({name:'',parentFamily:'',description:'',originContext:'',moodTags:'',suggestedSituations:'',artists:[]})} onEditArtist={(g,a)=>setEditingArtist({genreId:g.id,artist:{...a}}) } onDeleteArtist={(gId,aId)=>setConfirm({type:'artist',gId,aId})} onAddArtist={g=>setNewArtistForm({genreId:g.id,artist:{name:'',role:'core',shortDescription:'',suggestedSongs:[{title:'',note:'',spotifyUrl:''},{title:'',note:'',spotifyUrl:''}]}})}/>}
        {tab==='retos'&&<RetosTab challenges={challenges} genres={genres} u1={u1} u2={u2} currentUserKey={currentUserKey} onCreateChallenge={createChallenge} onUpdateChallenge={updateChallenge} onDeleteChallenge={deleteChallenge} onGenerateGenreChallenge={(genreId)=>{generateWeek(genreId);setTab('semana');}}/>}
        {tab==='ajustes'&&<AjustesTab settings={settings} onSaveSettings={s=>update(prev=>({...prev,settings:s}))} onExport={exportData} onImport={importData} onReset={resetAll} onForceLibraryUpgrade={forceLibraryUpgrade}/>}
      </div>

      {/* MODALS */}
      {confirm&&confirm.type==='week'&&<ConfirmModal message="¿Eliminar esta semana? Esta acción no se puede deshacer." onConfirm={()=>deleteWeek(confirm.id)} onCancel={()=>setConfirm(null)}/>}
      {confirm&&confirm.type==='genre'&&<ConfirmModal message="¿Eliminar este género de la biblioteca?" onConfirm={()=>{update(prev=>({...prev,genres:prev.genres.filter(g=>g.id!==confirm.id)}));setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
      {confirm&&confirm.type==='artist'&&<ConfirmModal message="¿Eliminar este artista del género?" onConfirm={()=>{update(prev=>({...prev,genres:prev.genres.map(g=>g.id===confirm.gId?{...g,artists:g.artists.filter(a=>a.id!==confirm.aId)}:g)}));setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
      {confirm&&confirm.type==='rating'&&<ConfirmModal message="¿Seguro que quieres eliminar la valoración de este artista? Notas, comentarios y favoritos se borrarán." onConfirm={()=>clearArtistRatingNow(confirm.wId,confirm.aId)} onCancel={()=>setConfirm(null)}/>}
      {confirm&&confirm.type==='wipe'&&<ConfirmModal message="¿Seguro que quieres borrar TODOS los datos? Se eliminarán semanas, valoraciones, historial y la biblioteca volverá a su estado inicial. Esta acción es irreversible." onConfirm={wipeAllNow} onCancel={()=>setConfirm(null)}/>}
      {editingGenre&&<GenreEditModal genre={editingGenre} onSave={g=>{update(prev=>({...prev,genres:prev.genres.map(x=>x.id===g.id?g:x)}));setEditingGenre(null);}} onClose={()=>setEditingGenre(null)}/>}
      {newGenreForm&&<GenreEditModal genre={newGenreForm} isNew onSave={g=>{update(prev=>({...prev,genres:[...prev.genres,{...g,id:genId(),artists:[]}]}));setNewGenreForm(null);}} onClose={()=>setNewGenreForm(null)}/>}
      {editingArtist&&<ArtistEditModal genreId={editingArtist.genreId} artist={editingArtist.artist} onSave={(gId,a)=>{update(prev=>({...prev,genres:prev.genres.map(g=>g.id===gId?{...g,artists:g.artists.map(x=>x.id===a.id?a:x)}:g)}));setEditingArtist(null);}} onClose={()=>setEditingArtist(null)}/>}
      {newArtistForm&&<ArtistEditModal genreId={newArtistForm.genreId} artist={newArtistForm.artist} isNew onSave={(gId,a)=>{update(prev=>({...prev,genres:prev.genres.map(g=>g.id===gId?{...g,artists:[...g.artists,{...a,id:genId()}]}:g)}));setNewArtistForm(null);}} onClose={()=>setNewArtistForm(null)}/>}
      {viewWeek&&<WeekDetailModal week={viewWeek} u1={u1} u2={u2} onClose={()=>setViewWeek(null)}/>}
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
