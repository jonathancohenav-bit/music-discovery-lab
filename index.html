<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Discovery Lab 🎵</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Circular','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased}
:root{
  --green:#1DB954;--green-hover:#1ED760;--green-dark:#169C46;
  --bg:#000;--bg-elev:#121212;--bg-elev2:#181818;--bg-elev3:#242424;--bg-hover:#2a2a2a;
  --text:#fff;--text-sub:#b3b3b3;--text-muted:#6a6a6a;
  --border:#2a2a2a;--card-bg:#181818;--surface:#121212;
  --gradient:linear-gradient(180deg,#1f1f1f 0%,#121212 100%);
  --danger:#f15e6c;--warning:#ffa42b;
  --c1:var(--green);--c2:var(--green);--c3:rgba(29,185,84,.15);--c4:var(--green-dark);
  --success:var(--green);--muted:var(--text-sub);
}
.app{max-width:1280px;margin:0 auto;padding:16px;background:var(--gradient);min-height:100vh}
/* NAV */
.nav{display:flex;gap:8px;padding:6px;background:rgba(0,0,0,.5);backdrop-filter:blur(20px);border-radius:500px;margin-bottom:24px;overflow-x:auto;flex-wrap:wrap;border:1px solid var(--border)}
.nav-btn{padding:10px 20px;border:none;background:transparent;border-radius:500px;cursor:pointer;font-size:14px;color:var(--text-sub);white-space:nowrap;transition:all .2s;font-family:inherit;font-weight:600}
.nav-btn:hover{color:var(--text);transform:scale(1.04)}
.nav-btn.active{background:var(--text);color:#000}
@media (max-width:640px){
  .nav{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;border-radius:32px;padding:10px;overflow:visible}
  .nav-btn{width:100%;padding:12px 10px;text-align:center;font-size:14px;white-space:normal;line-height:1.15;min-height:44px;display:flex;align-items:center;justify-content:center;gap:4px}
}
@media (min-width:641px){
  .nav{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));border-radius:32px;padding:10px;overflow:visible}
  .nav-btn{width:100%;text-align:center}
}
.challenge-alert{background:rgba(255,164,43,.13);border:1px solid rgba(255,164,43,.32);color:#ffd08a;border-radius:12px;padding:12px;margin-bottom:14px;font-size:13px;line-height:1.45}
.nav-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:999px;background:var(--warning);color:#000;font-size:10px;font-weight:900;margin-left:4px;padding:0 5px}
.challenge-genre-panel{background:var(--bg-elev3);border:1px solid var(--border);border-radius:12px;padding:12px;margin:10px 0}
.challenge-track-box{background:rgba(29,185,84,.10);border:1px solid rgba(29,185,84,.25);border-radius:10px;padding:10px;margin:8px 0}

/* CARDS */
.card{background:var(--card-bg);border-radius:8px;padding:20px;margin-bottom:16px;transition:background .2s}
.card:hover{background:var(--bg-elev2)}
.card-sm{padding:14px}
/* GRID */
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
/* METRIC */
.metric{background:var(--bg-elev2);border-radius:8px;padding:18px;text-align:center;transition:background .2s}
.metric:hover{background:var(--bg-elev3)}
.metric-label{font-size:11px;color:var(--text-sub);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;font-weight:700}
.metric-value{font-size:28px;font-weight:700;color:var(--green);letter-spacing:-.5px}

/* PRODUCT INSIGHTS */
.insight-card{background:var(--bg-elev2);border:1px solid var(--border);border-radius:10px;padding:16px;transition:background .2s}
.insight-card:hover{background:var(--bg-elev3)}
.insight-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-.2px}
.insight-value{font-size:30px;font-weight:900;color:var(--green);letter-spacing:-.8px;line-height:1}
.insight-copy{font-size:12px;color:var(--text-sub);line-height:1.45;margin-top:8px}
.progress-large{height:10px;background:var(--bg-elev3);border-radius:999px;overflow:hidden;border:1px solid var(--border)}
.progress-large-fill{height:100%;background:var(--green);border-radius:999px;transition:width .35s ease}
.divergence-row{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:9px 0;border-bottom:.5px solid var(--border)}
.divergence-row:last-child{border-bottom:none}

/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:500px;font-size:10px;font-weight:700;line-height:1.6;text-transform:uppercase;letter-spacing:.5px}
.badge-core{background:rgba(29,185,84,.15);color:var(--green)}
.badge-variation{background:rgba(255,164,43,.15);color:var(--warning)}
.badge-wildcard{background:rgba(186,113,255,.15);color:#ba71ff}
.badge-completed{background:rgba(29,185,84,.15);color:var(--green)}
.badge-planned{background:rgba(179,179,179,.15);color:var(--text-sub)}
.badge-inprogress{background:rgba(70,131,255,.18);color:#7eb0ff}
/* TYPOGRAPHY */
h1{font-size:32px;font-weight:900;margin-bottom:6px;letter-spacing:-1px}
h2{font-size:22px;font-weight:700;margin-bottom:12px;letter-spacing:-.5px}
h3{font-size:16px;font-weight:700;margin-bottom:8px}
.muted{color:var(--text-sub);font-size:14px}
/* BUTTONS */
.btn{padding:10px 22px;border-radius:500px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:14px;transition:all .2s;font-family:inherit;font-weight:700}
.btn:hover{border-color:var(--text);background:var(--bg-hover);transform:scale(1.04)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--green);color:#000;border-color:var(--green)}
.btn-primary:hover{background:var(--green-hover);border-color:var(--green-hover);transform:scale(1.04)}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:rgba(241,94,108,.1)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px}
/* FORMS */
input,select,textarea{padding:10px 14px;border-radius:4px;border:1px solid var(--border);font-size:14px;width:100%;font-family:inherit;background:var(--bg-elev3);color:var(--text)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--text);background:var(--bg-elev3)}
input::placeholder,textarea::placeholder{color:var(--text-muted)}
textarea{resize:vertical}
/* LAYOUT HELPERS */
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:8px}
/* ARTIST CARD */
.artist-card{border-radius:8px;padding:14px;margin-bottom:10px;background:var(--bg-elev2);transition:background .2s}
.artist-card:hover{background:var(--bg-elev3)}
.artist-card.listened{border-left:3px solid var(--green)}
/* TAGS */
.tag{background:var(--bg-elev3);color:var(--text-sub);padding:3px 10px;border-radius:500px;font-size:11px;display:inline-block;margin:2px;font-weight:500}
/* SECTION TITLE */
.section-title{font-size:11px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:1.2px;margin:20px 0 10px}
/* EMPTY STATE */
.empty-state{text-align:center;padding:56px 20px;color:var(--text-sub)}
.empty-state .icon{font-size:48px;margin-bottom:14px;opacity:.5}
/* RANK ITEM */
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:6px;background:var(--bg-elev2);margin-bottom:6px;transition:background .2s}
.rank-item:hover{background:var(--bg-elev3)}
.rank-num{width:28px;height:28px;border-radius:50%;background:rgba(29,185,84,.15);color:var(--green);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* DIVIDER */
.divider{height:1px;background:var(--border);margin:14px 0}
/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--bg-elev2);border-radius:8px;padding:24px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;border:1px solid var(--border)}
/* GENRE FAMILY LABEL */
.genre-family{font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:1px}
/* PROGRESS */
.progress-bar{height:4px;background:var(--bg-elev3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
/* CHECKBOX CIRCLE */
.check-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--text-sub);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:12px;color:#000}
.check-circle:hover{border-color:var(--text)}
.check-circle.checked{background:var(--green);border-color:var(--green)}
/* SONG CHIP */
.song-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:500px;font-size:12px;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--bg-elev2);color:var(--text-sub);user-select:none;font-weight:500}
.song-chip:hover{background:var(--bg-elev3);color:var(--text);border-color:var(--text-sub)}
.song-chip.heard{background:rgba(29,185,84,.15);border-color:var(--green);color:var(--green)}
.spotify-btn{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:1px solid rgba(29,185,84,.45);background:rgba(29,185,84,.12);color:var(--green);font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;flex-shrink:0;text-decoration:none}
.spotify-btn:hover{background:var(--green);color:#000;border-color:var(--green);transform:scale(1.05)}
.spotify-btn:active{transform:scale(.96)}
/* HISTORY ROW */
.history-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:6px;background:var(--bg-elev2);margin-bottom:6px;flex-wrap:wrap;transition:background .2s}
.history-row:hover{background:var(--bg-elev3)}
/* SCORE INPUT */
.score-box{display:flex;flex-direction:column;align-items:center;gap:4px}
.score-box label{font-size:10px;color:var(--text-sub);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.score-box input{width:68px;text-align:center;padding:6px 4px}
/* SUB-NAV TABS */
.sub-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.sub-tab{padding:6px 14px;border-radius:500px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--text-sub);font-family:inherit;transition:all .2s;font-weight:600}
.sub-tab:hover{color:var(--text);border-color:var(--text-sub)}
.sub-tab.active{background:var(--text);color:#000;border-color:var(--text)}
/* HEADER */
.app-header{display:flex;align-items:center;gap:14px;padding:12px 4px;margin-bottom:18px}
.app-logo{width:48px;height:48px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;color:#000}
/* SCROLLBAR */
::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:6px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#4a4a4a}

/* AUTH / CLOUD SYNC */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top,#1f1f1f 0%,#000 70%)}
.auth-card{max-width:460px;width:100%;background:var(--card-bg);border:1px solid var(--border);border-radius:18px;padding:28px;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,.45)}
.auth-icon{width:72px;height:72px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:34px;color:#000}
.auth-title{font-size:28px;font-weight:900;margin-bottom:8px;letter-spacing:-.8px}
.auth-copy{color:var(--text-sub);font-size:14px;line-height:1.55;margin-bottom:18px}
.auth-warning{background:rgba(255,164,43,.12);border:1px solid rgba(255,164,43,.35);color:#ffd08a;border-radius:10px;padding:12px;font-size:12px;text-align:left;margin:14px 0}
.sync-pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.sync-saved{background:rgba(29,185,84,.16);color:var(--green)}
.sync-saving,.sync-loading,.sync-checking{background:rgba(70,131,255,.18);color:#8db8ff}
.sync-error{background:rgba(241,94,108,.18);color:#ff8793}
.secure-session{font-size:11px;color:var(--text-sub);margin-top:2px}

/* LEARNING / QUIZ */
.learning-card{background:var(--bg-elev2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.learning-kicker{font-size:11px;color:var(--green);font-weight:800;text-transform:uppercase;letter-spacing:1.1px;margin-bottom:6px}
.learning-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-top:12px}
.learning-box{background:var(--bg-elev3);border:1px solid var(--border);border-radius:8px;padding:12px}
.learning-box-title{font-size:11px;color:var(--text-sub);font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.quiz-question{background:var(--bg-elev3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.quiz-option{display:flex;gap:8px;align-items:flex-start;padding:7px 0;font-size:13px;color:var(--text-sub);cursor:pointer}
.quiz-result{border-radius:10px;padding:12px;margin-top:12px;background:rgba(29,185,84,.12);border:1px solid rgba(29,185,84,.35);color:var(--text)}

/* USER-SPECIFIC LISTENING / FAVORITES */
.user-progress-card{background:var(--bg-elev2);border:1px solid var(--border);border-radius:10px;padding:14px;min-width:0}
.user-progress-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
.user-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;font-size:11px;font-weight:800;border:1px solid var(--border);background:var(--bg-elev3);color:var(--text-sub)}
.user-chip.u1{border-color:rgba(29,185,84,.45);color:var(--green);background:rgba(29,185,84,.10)}
.user-chip.u2{border-color:rgba(126,176,255,.45);color:#8db8ff;background:rgba(70,131,255,.12)}
.user-checks{display:inline-flex;align-items:center;gap:5px;flex-wrap:wrap}
.mini-toggle{border:1px solid var(--border);background:var(--bg-elev3);color:var(--text-sub);border-radius:999px;padding:3px 8px;font-size:10px;font-weight:800;cursor:pointer;transition:all .15s}
.mini-toggle:hover{border-color:var(--text-sub);color:var(--text)}
.mini-toggle.active.u1{background:rgba(29,185,84,.18);border-color:var(--green);color:var(--green)}
.mini-toggle.active.u2{background:rgba(70,131,255,.18);border-color:#8db8ff;color:#8db8ff}
.challenge-card{background:var(--bg-elev2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.challenge-card.pending{border-left:3px solid var(--warning)}
.challenge-card.completed{border-left:3px solid var(--green)}
.challenge-type{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;background:rgba(255,164,43,.13);color:#ffd08a;border:1px solid rgba(255,164,43,.25)}
.challenge-meta{font-size:11px;color:var(--text-sub);line-height:1.45}
.challenge-result{background:rgba(29,185,84,.10);border:1px solid rgba(29,185,84,.28);border-radius:10px;padding:10px;margin-top:10px}


</style>
</head>

function normalizeLibraryName(value){
  return String(value||'')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/&/g,'and')
    .replace(/[^a-z0-9]+/g,' ')
    .trim();
}
function mergeGenreArtistLists(existingArtists, additions){
  const current=Array.isArray(existingArtists)?existingArtists:[];
  const seenIds=new Set(current.map(a=>(a&&a.id)||''));
  const seenNames=new Set(current.map(a=>normalizeLibraryName(a&&a.name)).filter(Boolean));
  const merged=[...current];
  (additions||[]).forEach(a=>{
    const id=a&&a.id;
    const nameKey=normalizeLibraryName(a&&a.name);
    if(id&&!seenIds.has(id)&&nameKey&&!seenNames.has(nameKey)){
      merged.push(a);
      seenIds.add(id);
      seenNames.add(nameKey);
    }
  });

function upgradeLibraryData(data){
  if(!data||!Array.isArray(data.genres))return data;
  const upgradedGenres=data.genres.map(g=>{
    const additions=[...(PHASE3_ARTIST_TOPUPS_BY_GENRE[g.id]||[]),...(PHASE3_ARTIST_TOPUPS_BY_GENRE_EXTRA[g.id]||[]),...(PHASE3_ARTIST_TOPUPS_BY_GENRE_EXTRA2[g.id]||[]),...(PHASE3_ARTIST_TOPUPS_BY_GENRE_EXTRA3[g.id]||[]),...(PHASE3_ARTIST_TOPUPS_BY_GENRE_EXTRA4[g.id]||[]),...(PHASE3_ARTIST_TOPUPS_BY_GENRE_EXTRA5[g.id]||[])];
    if(!additions.length)return g;
    return {...g,artists:mergeGenreArtistLists(g.artists,additions)};
  });
  const existingIds=new Set(upgradedGenres.map(g=>g&&g.id).filter(Boolean));
  const existingNames=new Set(upgradedGenres.map(g=>normalizeLibraryName(g&&g.name)).filter(Boolean));
  [...PHASE3_NEW_GENRES,...PHASE3_NEW_GENRES_B2,...PHASE3_NEW_GENRES_B3].forEach(g=>{
    const id=g&&g.id;
    const nameKey=normalizeLibraryName(g&&g.name);
    if(id&&!existingIds.has(id)&&nameKey&&!existingNames.has(nameKey)){
      upgradedGenres.push(g);
      existingIds.add(id);
      existingNames.add(nameKey);
    }
  });
  return {...data,genres:upgradedGenres,challenges:Array.isArray(data.challenges)?data.challenges:[]};
}

function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d=JSON.parse(raw);
      if(d&&d.settings&&d.genres) return upgradeLibraryData(d);
    }
  }catch(e){console.warn('Error loading localStorage:',e);}
  return null;
}

function saveData(data){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({...data,updatedAt:new Date().toISOString()}));
  }catch(e){console.warn('Error saving localStorage:',e);}
}

function genId(){return Math.random().toString(36).substr(2,9);}

function calcArtistAvg(a){
  const s1=parseFloat(a.scoreU1);
  const s2=parseFloat(a.scoreU2);
  const v=[];
  if(!isNaN(s1)&&s1>=0)v.push(s1);
  if(!isNaN(s2)&&s2>=0)v.push(s2);
  if(!v.length)return null;
  return v.reduce((a,b)=>a+b,0)/v.length;
}
function hasArtistUserEval(a,user){
  const suf=user==='u1'?'U1':'U2';
  return !!(a['score'+suf]||a['comment'+suf]||a['fav'+suf]||a['replay'+suf]||a['mood'+suf]||a['situations'+suf]);
}
function replayLabel(v){
  return {si:'Sí',tal_vez:'Tal vez',no:'No'}[v]||'';
}
function buildSpotifySearchUrl(artistName,songTitle){
  const query=[artistName,songTitle].filter(Boolean).join(' ').trim();
  return `https://open.spotify.com/search/${encodeURIComponent(query||'')}`;
}
function getSpotifyUrl(artistName,song){
  const direct=(song&&song.spotifyUrl||'').trim();
  if(direct)return direct;
  return buildSpotifySearchUrl(artistName,(song&&song.title)||'');
}
function openSpotifyForSong(artistName,song,event){
  if(event){event.preventDefault();event.stopPropagation();}
  const url=getSpotifyUrl(artistName,song);
  if(!url)return;
  /* Same-tab navigation avoids the annoying about:blank tab on iOS/Chrome.
     Spotify universal links normally hand off to the Spotify app when installed. */
  window.location.assign(url);
}

function isHeardBy(item,userKey){
  if(item&&item.listenedBy&&typeof item.listenedBy==='object'&&Object.prototype.hasOwnProperty.call(item.listenedBy,userKey)) return !!item.listenedBy[userKey];
  return !!(item&&item.listened);
}
function isFavoriteBy(item,userKey){
  if(item&&item.favoriteBy&&typeof item.favoriteBy==='object'&&Object.prototype.hasOwnProperty.call(item.favoriteBy,userKey)) return !!item.favoriteBy[userKey];
  return !!(item&&item['fav'+(userKey==='u1'?'U1':'U2')]);
}
function getWeekUserProgress(week,userKey){
  const artists=(week&&week.artists)||[];
  let totalSongs=0, heardSongs=0;
  artists.forEach(a=>((a.listenedSongs)||[]).forEach(song=>{
    totalSongs++;
    if(isHeardBy(song,userKey)) heardSongs++;
  }));
  const totalArtists=artists.length;
  const heardArtists=artists.filter(a=>isHeardBy(a,userKey)||((a.listenedSongs)||[]).some(song=>isHeardBy(song,userKey))).length;
  const completedArtists=artists.filter(a=>{
    const songs=(a.listenedSongs)||[];
    return songs.length?songs.every(song=>isHeardBy(song,userKey)):isHeardBy(a,userKey);
  }).length;
  const favoriteSongs=artists.filter(a=>!!a['fav'+(userKey==='u1'?'U1':'U2')]).length;
  const pct=totalSongs?Math.round((heardSongs/totalSongs)*100):0;
  const artistPct=totalArtists?Math.round((completedArtists/totalArtists)*100):0;
  return {totalSongs,heardSongs,favoriteSongs,totalArtists,heardArtists,completedArtists,pct,artistPct};
}

function getLearningQuizRows(weeks){
  const rows=[];
  (weeks||[]).forEach(w=>{
    const q=w.learningQuiz||{};
    ['u1','u2'].forEach(u=>{
      const r=q[u];
      if(r&&typeof r.score!=='undefined'){
        rows.push({weekId:w.id,weekNum:w.weekNum,genreName:w.genreName,genreId:w.genreId,userKey:u,score:Number(r.score)||0,correct:Number(r.correct)||0,total:Number(r.total)||0,answeredAt:r.answeredAt||r.timestamp||''});
      }
    });
  });
  return rows;
}
function calcQuizStats(weeks){
  const rows=getLearningQuizRows(weeks);
  const byUser={u1:{n:0,score:0,correct:0,total:0,wins:0},u2:{n:0,score:0,correct:0,total:0,wins:0},ties:0,rows};
  rows.forEach(r=>{byUser[r.userKey].n++;byUser[r.userKey].score+=r.score;byUser[r.userKey].correct+=r.correct;byUser[r.userKey].total+=r.total;});
  const byWeek={};
  rows.forEach(r=>{byWeek[r.weekId]=byWeek[r.weekId]||{};byWeek[r.weekId][r.userKey]=r;});
  Object.values(byWeek).forEach(x=>{
    if(x.u1&&x.u2){
      if(x.u1.score>x.u2.score)byUser.u1.wins++;
      else if(x.u2.score>x.u1.score)byUser.u2.wins++;
      else byUser.ties++;
    }
  });
  return byUser;
}
function challengeTypeLabel(type){return {song:'Canción',artist:'Artista',genre:'Género',mood:'Mood'}[type]||'Reto';}
function qualitativeLabel(v){return {love:'Me encantó',like:'Me gustó',neutral:'Me dejó indiferente',hard:'Me costó',nope:'No me gustó'}[v]||v||'';}
function challengeRequiresSenderTrack(type){return type==='song';}
function challengeAllowsGuess(type){return type==='song'||type==='artist'||type==='genre';}
function challengePendingForUser(challenges,userKey){return (challenges||[]).filter(c=>c.status!=='completed'&&c.to===userKey).length;}

function getWeekSongProgress(week){
  const artists=(week&&week.artists)||[];
  let totalSongs=0, listenedSongs=0;
  artists.forEach(a=>((a.listenedSongs)||[]).forEach(song=>{
    totalSongs++;
    if(song.listened||isHeardBy(song,'u1')||isHeardBy(song,'u2'))listenedSongs++;
  }));
  const listenedArtists=artists.filter(a=>a.listened||isHeardBy(a,'u1')||isHeardBy(a,'u2')).length;
  const totalArtists=artists.length;
  return {totalSongs,listenedSongs,totalArtists,listenedArtists,songPct:totalSongs?Math.round((listenedSongs/totalSongs)*100):0,artistPct:totalArtists?Math.round((listenedArtists/totalArtists)*100):0};
}
function getCurrentStreak(completedWeeks){
  const nums=[...new Set((completedWeeks||[]).map(w=>Number(w.weekNum)).filter(n=>!isNaN(n)))].sort((a,b)=>b-a);
  if(!nums.length)return 0;
  let streak=1;
  for(let i=1;i<nums.length;i++){
    if(nums[i]===nums[i-1]-1)streak++; else break;
  }
  return streak;
}
function getComparisonInsights(completedWeeks){
  const artistPairs=[];
  (completedWeeks||[]).forEach(w=>((w.artists)||[]).forEach(a=>{
    const s1=parseFloat(a.scoreU1); const s2=parseFloat(a.scoreU2);
    if(!isNaN(s1)&&!isNaN(s2)) artistPairs.push({type:'artist',name:a.name,context:w.genreName,u1:s1,u2:s2,diff:Math.abs(s1-s2)});
  }));
  const genrePairs=[];
  (completedWeeks||[]).forEach(w=>{
    const r=w.rating||{}; const s1=parseFloat(r.scoreU1); const s2=parseFloat(r.scoreU2);
    if(!isNaN(s1)&&!isNaN(s2)) genrePairs.push({type:'genre',name:w.genreName,context:`Semana ${w.weekNum}`,u1:s1,u2:s2,diff:Math.abs(s1-s2)});
  });
  const allPairs=[...artistPairs,...genrePairs];
  const agreement=allPairs.length?Math.round((allPairs.filter(x=>x.diff<=1.5).length/allPairs.length)*100):null;
  const avgDiff=allPairs.length?allPairs.reduce((sum,x)=>sum+x.diff,0)/allPairs.length:null;
  const divergences=[...allPairs].sort((a,b)=>b.diff-a.diff).slice(0,5);
  const closeMatches=[...allPairs].filter(x=>x.diff<=1).sort((a,b)=>a.diff-b.diff).slice(0,5);
  return {agreement,avgDiff,divergences,closeMatches,totalPairs:allPairs.length};
}

function getGenreLearning(genre){
  if(!genre)return null;
  const artistNames=(genre.artists||[]).slice(0,4).map(a=>a.name).join(', ');
  const coreArtist=(genre.artists||[]).find(a=>a.role==='core')||(genre.artists||[])[0]||{};
  const wildcardArtist=(genre.artists||[]).find(a=>a.role==='wildcard')||(genre.artists||[]).slice(-1)[0]||{};
  const firstSong=(coreArtist.suggestedSongs||[])[0]||{};
  const moods=(genre.moodTags||[]).slice(0,3).join(', ');
  const situations=(genre.suggestedSituations||[]).slice(0,3).join(', ');
  const base={
    birthplace:genre.originContext||'Origen no documentado todavía.',
    era:genre.originContext||'Etapa histórica pendiente de completar.',
    whatDefinesIt:genre.description||`Un sonido dentro de la familia ${genre.parentFamily}.`,
    howToRecognizeIt:[
      moods?`Sensación habitual: ${moods}.`:`Fíjate en la energía, la instrumentación y la producción.`,
      artistNames?`Compara cómo lo interpretan artistas como ${artistNames}.`:`Escucha varios artistas del género para detectar patrones.`,
      situations?`Suele encajar en contextos como ${situations}.`:`Piensa en qué situación lo pondríais vosotros.`
    ],
    curiousFact:wildcardArtist.name?`La wildcard propuesta, ${wildcardArtist.name}, sirve para ver una cara menos obvia del género.`:`La mejor forma de entenderlo es comparar un artista core con una variación más rara.`,
    keyListening:firstSong.title&&coreArtist.name?`Empieza por “${firstSong.title}” de ${coreArtist.name} y luego compara con una wildcard.`:`Empieza por los artistas core y deja la wildcard para el final.`,
    quiz:[
      {question:`¿Cuál es la familia musical de ${genre.name}?`,options:[genre.parentFamily,'Pop','Electrónica','Jazz'].filter((v,i,a)=>v&&a.indexOf(v)===i),correct:genre.parentFamily,explanation:`${genre.name} está clasificado dentro de ${genre.parentFamily}.`},
      {question:`¿Qué artista de la selección representa mejor el núcleo del género?`,options:[coreArtist.name,wildcardArtist.name,'Artista no relacionado','Ninguno'].filter((v,i,a)=>v&&a.indexOf(v)===i),correct:coreArtist.name,explanation:`${coreArtist.name} aparece como artista core en este género.`},
      {question:`¿Qué deberíais intentar reconocer al escucharlo?`,options:['Sus rasgos de sonido, mood y contexto','Solo si es famoso en TikTok','El país del cantante únicamente','El nombre del sello discográfico'],correct:'Sus rasgos de sonido, mood y contexto',explanation:'El objetivo es aprender a reconocer patrones musicales, sensación y contexto, no memorizar datos sueltos.'}
    ]
  };
  const curated=CURATED_LEARNING_BY_GENRE[genre.id]||{};
  return {...base,...(genre.learning||{}),...curated,quiz:(curated.quiz&&curated.quiz.length?curated.quiz:(genre.learning&&genre.learning.quiz&&genre.learning.quiz.length?genre.learning.quiz:base.quiz))};
}

function DashboardTab({weeks,completedWeeks,activeWeek,u1,u2,genreRankings,artistRankings,genres,completedGenreIds,onGenerate,onGoSemana,onManualSelect}){
  const avgU1=useMemo(()=>{
    const v=completedWeeks.filter(w=>!isNaN(parseFloat(w.rating?.scoreU1))).map(w=>parseFloat(w.rating.scoreU1));
    return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;
  },[completedWeeks]);
  const avgU2=useMemo(()=>{
    const v=completedWeeks.filter(w=>!isNaN(parseFloat(w.rating?.scoreU2))).map(w=>parseFloat(w.rating.scoreU2));
    return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;

    </div>

}

                  <div className="card card-sm" style={{background:'var(--bg-elev2)'}}>

                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>¿Lo volverías a escuchar?</label>
                    <select value={artist.replayU1||artist.replay||''} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'replayU1',e.target.value)} style={{fontSize:12,marginBottom:8}}>
                      <option value="">—</option><option value="si">Sí</option><option value="tal_vez">Tal vez</option><option value="no">No</option>

                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>Mood / sensación {u1}</label>
                    <input value={artist.moodU1||''} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'moodU1',e.target.value)} placeholder="energía, nostalgia, calma..." style={{fontSize:12,marginBottom:8}}/>
                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>¿En qué situación lo pondrías?</label>

                      <input type="checkbox" checked={!!artist.favU1} onChange={e=>onUpdateArtist(activeWeek.id,artist.id,'favU1',e.target.checked)} style={{width:'auto'}}/> ⭐ Favorito {u1}

                  <div className="card card-sm" style={{background:'var(--bg-elev2)'}}>

                    <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:3}}>¿En qué situación lo pondrías?</label>

}

function RankingsTab({genreRankings,artistRankings,completedWeeks,u1,u2}){
  const [rt,setRt]=useState('genres');
  if(!completedWeeks.length) return<div className="empty-state"><div className="icon">🏆</div><div style={{fontWeight:500}}>Sin rankings todavía</div><p className="muted">Completad vuestra primera semana para ver los rankings.</p></div>;

  const artU1=[...artistRankings].filter(a=>a.scoreU1!==null).sort((a,b)=>b.scoreU1-a.scoreU1);
  const artU2=[...artistRankings].filter(a=>a.scoreU2!==null).sort((a,b)=>b.scoreU2-a.scoreU2);
  const divisiveGenres=[...genreRankings].filter(g=>!isNaN(g.scoreU1)&&!isNaN(g.scoreU2)).sort((a,b)=>Math.abs(b.scoreU1-b.scoreU2)-Math.abs(a.scoreU1-a.scoreU2));
  const famMap={};completedWeeks.forEach(w=>{const f=w.genreFamily||'';if(!famMap[f])famMap[f]={sum:0,n:0};const r=w.rating||{};[parseFloat(r.scoreU1),parseFloat(r.scoreU2)].forEach(s=>{if(!isNaN(s)){famMap[f].sum+=s;famMap[f].n++;}});});
  const famRank=Object.entries(famMap).filter(([,v])=>v.n>0).sort((a,b)=>(b[1].sum/b[1].n)-(a[1].sum/a[1].n));
  const comparison=getComparisonInsights(completedWeeks);
  const quizStats=calcQuizStats(completedWeeks);
  const quizRows=quizStats.rows||[];

  return(
    <div>
      <h1 style={{marginBottom:10}}>Rankings</h1>
      <div className="sub-tabs">
        {[['genres','🎵 Géneros'],['artists','🎤 Artistas'],['families','🗂 Familias'],['divisive','⚡ Divisivos'],['match','🤝 Coincidencias'],['quiz','🧠 Tests']].map(([id,l])=>(
          <button key={id} className={`sub-tab ${rt===id?'active':''}`} onClick={()=>setRt(id)}>{l}</button>
        ))}
      </div>

      {rt==='genres'&&(
        <div className="card">
          <h2 style={{marginBottom:10}}>Géneros por nota media</h2>
          {genreRankings.length===0&&<p className="muted">Completad semanas con valoraciones para ver rankings.</p>}
          {genreRankings.map((g,i)=>(
            <div key={g.weekId} className="rank-item">
              <div className="rank-num">{i+1}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:500,fontSize:13}}>{g.name}</div>
                <div className="muted" style={{fontSize:11}}>{g.family} · Semana {g.weekNum}</div>
              </div>
              <div style={{textAlign:'right',fontSize:12}}>
                {!isNaN(g.scoreU1)&&<div style={{color:'var(--c2)'}}>{u1}: {g.scoreU1.toFixed(1)}</div>}
                {!isNaN(g.scoreU2)&&<div style={{color:'var(--success)'}}>{u2}: {g.scoreU2.toFixed(1)}</div>}
                {g.avg!==null&&<div style={{fontWeight:500,fontSize:14}}>Ø {g.avg.toFixed(1)}</div>}
              </div>
            </div>
          ))}
        </div>
      )}

      {rt==='artists'&&(
        <div className="grid2">
          <div className="card">
            <h2 style={{marginBottom:10}}>Top {u1}</h2>
            {artU1.slice(0,12).map((a,i)=>(
              <div key={i} className="rank-item">
                <div className="rank-num">{i+1}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{a.name}</div><div className="muted" style={{fontSize:11}}>{a.genreName}</div></div>
                <span style={{fontWeight:500,color:'var(--c2)'}}>{a.scoreU1.toFixed(1)}</span>
              </div>
            ))}
            {!artU1.length&&<p className="muted">Sin valoraciones de {u1} todavía.</p>}
          </div>
          <div className="card">
            <h2 style={{marginBottom:10}}>Top {u2}</h2>
            {artU2.slice(0,12).map((a,i)=>(
              <div key={i} className="rank-item">
                <div className="rank-num">{i+1}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{a.name}</div><div className="muted" style={{fontSize:11}}>{a.genreName}</div></div>
                <span style={{fontWeight:500,color:'var(--success)'}}>{a.scoreU2.toFixed(1)}</span>
              </div>
            ))}
            {!artU2.length&&<p className="muted">Sin valoraciones de {u2} todavía.</p>}
          </div>
          <div className="card">
            <h2 style={{marginBottom:10}}>Top conjunto</h2>
            {artistRankings.slice(0,12).map((a,i)=>(
              <div key={i} className="rank-item">
                <div className="rank-num">{i+1}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{a.name}</div><div className="muted" style={{fontSize:11}}>{a.genreName}</div></div>
                <span style={{fontWeight:500,color:'var(--c2)'}}>{a.avg.toFixed(1)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {rt==='families'&&(
        <div className="card">
          <h2 style={{marginBottom:10}}>Familias por nota media</h2>
          {famRank.map(([name,v],i)=>(
            <div key={name} className="rank-item">
              <div className="rank-num">{i+1}</div>
              <div style={{flex:1}}><div style={{fontWeight:500,fontSize:13}}>{name}</div></div>
              <span style={{fontWeight:500,color:'var(--c2)'}}>{(v.sum/v.n).toFixed(1)}</span>
            </div>
          ))}
          {!famRank.length&&<p className="muted">Necesitáis valoraciones de géneros para ver esto.</p>}
        </div>
      )}

      {rt==='divisive'&&(
        <div className="card">
          <h2 style={{marginBottom:4}}>Géneros más divisivos</h2>
          <p className="muted" style={{fontSize:12,marginBottom:10}}>Mayor diferencia entre {u1} y {u2}</p>
          {divisiveGenres.map((g,i)=>(
            <div key={g.weekId} className="rank-item">
              <div className="rank-num">{i+1}</div>
              <div style={{flex:1}}><div style={{fontWeight:500,fontSize:13}}>{g.name}</div></div>
              <div style={{textAlign:'right',fontSize:12}}>
                <div>{u1}: {g.scoreU1.toFixed(1)}</div>
                <div>{u2}: {g.scoreU2.toFixed(1)}</div>
                <div style={{fontWeight:500,color:'var(--danger)'}}>Δ {Math.abs(g.scoreU1-g.scoreU2).toFixed(1)}</div>
              </div>
            </div>
          ))}
          {!divisiveGenres.length&&<p className="muted">Necesitáis que ambos valoréis géneros para ver esto.</p>}
        </div>
      )}

      {rt==='match'&&(
        <div className="grid2">
          <div className="card">
            <h2 style={{marginBottom:6}}>🤝 Coincidencias</h2>
            <p className="muted" style={{fontSize:12,marginBottom:12}}>Valoraciones con diferencia de 1 punto o menos.</p>
            {comparison.closeMatches.map((x,i)=>(
              <div key={i} className="divergence-row">
                <div style={{minWidth:0}}><div style={{fontWeight:700,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.name}</div><div className="muted" style={{fontSize:11}}>{x.context}</div></div>
                <div style={{fontSize:12,textAlign:'right',flexShrink:0}}>{u1} {x.u1} · {u2} {x.u2}</div>
              </div>
            ))}
            {!comparison.closeMatches.length&&<p className="muted">Aún no hay coincidencias suficientes.</p>}
          </div>
          <div className="card">
            <h2 style={{marginBottom:6}}>⚡ Diferencias</h2>
            <p className="muted" style={{fontSize:12,marginBottom:12}}>Lo que más os separa musicalmente.</p>
            {comparison.divergences.map((x,i)=>(
              <div key={i} className="divergence-row">
                <div style={{minWidth:0}}><div style={{fontWeight:700,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.name}</div><div className="muted" style={{fontSize:11}}>{x.context}</div></div>
                <div style={{fontSize:12,textAlign:'right',flexShrink:0}}><div>{u1} {x.u1} · {u2} {x.u2}</div><div style={{color:'var(--danger)',fontWeight:800}}>Δ {x.diff.toFixed(1)}</div></div>
              </div>
            ))}
            {!comparison.divergences.length&&<p className="muted">Aún no hay diferencias suficientes.</p>}
          </div>
        </div>
      )}

      {rt==='quiz'&&(
        <div className="grid2">
          <div className="card">
            <h2>🧠 Competencia de tests</h2>
            <p className="muted" style={{fontSize:12,marginBottom:12}}>Resultados guardados de los tests Aprende por género y usuario.</p>
            <div className="grid2">
              {['u1','u2'].map(u=>{
                const st=quizStats[u];
                const name=u==='u1'?u1:u2;
                const avg=st.n?(st.score/st.n).toFixed(1):'—';
                const pct=st.total?Math.round((st.correct/st.total)*100):0;
                return <div key={u} className="metric">
                  <div className="metric-label">{name}</div>
                  <div className="metric-value">{avg}</div>
                  <div className="muted" style={{fontSize:11}}>Media test · {pct}% acierto · {st.wins} victorias</div>
                </div>;
              })}
            </div>
            <div className="divider"/>
            <div className="muted" style={{fontSize:12}}>Marcador: {u1} {quizStats.u1.wins} · {u2} {quizStats.u2.wins} · Empates {quizStats.ties}</div>
          </div>
          <div className="card">
            <h2>Historial de tests</h2>
            {quizRows.slice().reverse().map((r,i)=>(
              <div key={i} className="rank-item">
                <div className="rank-num">{r.score}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700}}>{r.genreName}</div>
                  <div className="muted" style={{fontSize:11}}>Semana {r.weekNum} · {r.userKey==='u1'?u1:u2} · {r.correct}/{r.total}</div>
                </div>
              </div>
            ))}
            {!quizRows.length&&<p className="muted">Todavía no hay tests completados.</p>}
          </div>
        </div>
      )}
    </div>
  );
}

function HistorialTab({weeks,onDelete,onView,u1,u2}){
  const sorted=[...weeks].sort((a,b)=>b.weekNum-a.weekNum);
  if(!weeks.length) return<div className="empty-state"><div className="icon">📅</div><div style={{fontWeight:500}}>Sin historial todavía</div><p className="muted">Aquí apareceran todas vuestras semanas musicales.</p></div>;
  return(
    <div>
      <h1 style={{marginBottom:12}}>Historial</h1>
      {sorted.map(w=>{
        const r=w.rating||{};
        const s1=parseFloat(r.scoreU1);const s2=parseFloat(r.scoreU2);
        const avg=!isNaN(s1)&&!isNaN(s2)?(s1+s2)/2:(!isNaN(s1)?s1:(!isNaN(s2)?s2:null));
        const listenedCount=(w.artists||[]).filter(a=>a.listened).length;
        return(
          <div key={w.id} className="history-row">
            <div style={{width:28,height:28,background:'var(--c3)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:500,fontSize:12,color:'var(--c2)',flexShrink:0}}>{w.weekNum}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:500,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{w.genreName}</div>
              <div className="muted" style={{fontSize:11}}>{w.startDate} · {w.genreFamily} · {listenedCount}/{(w.artists||[]).length} escuchados</div>
            </div>
            <Badge type={w.status}/>
            {avg!==null&&<span style={{fontWeight:500,color:'var(--c2)',minWidth:30,textAlign:'right'}}>{avg.toFixed(1)}</span>}
            <div className="row" style={{gap:4,flexShrink:0}}>
              <button className="btn btn-sm" onClick={()=>onView(w)}>Ver</button>
              <button className="btn btn-sm btn-danger" onClick={()=>onDelete(w.id)}>✕</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

            <div style={{marginTop:10,borderTop:'0.5px solid var(--border)',paddingTop:10}}>
              <p style={{fontSize:12,color:'var(--muted)',marginBottom:6}}>{genre.description}</p>
              <div style={{marginBottom:8}}>
                {(genre.moodTags||[]).map(t=><span key={t} className="tag">#{t}</span>)}
              </div>
              <LearningSummaryCard genre={genre}/>
              <div className="row" style={{justifyContent:'space-between',marginBottom:8}}>
                <div className="muted" style={{fontSize:11}}>Artistas ({genre.artists?.length||0})</div>
                <button className="btn btn-xs" onClick={()=>onAddArtist(genre)}>+ Añadir artista</button>
              </div>
              {(genre.artists||[]).map(a=>(
                <div key={a.id} style={{padding:'6px 0',borderBottom:'0.5px solid var(--border)'}}>
                  <div className="row" style={{justifyContent:'space-between'}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div className="row" style={{gap:4,flexWrap:'wrap'}}>
                        <span style={{fontSize:12,fontWeight:500}}>{a.name}</span>
                        <Badge type={a.role}/>
                      </div>
                      <div className="muted" style={{fontSize:11}}>{a.shortDescription}</div>
                      <div style={{fontSize:11,color:'var(--muted)'}}>
                        {(a.suggestedSongs||[]).map((s,i)=><span key={i} style={{marginRight:8,display:'inline-flex',alignItems:'center',gap:4}}>🎵 {s.title}<button className="spotify-btn" type="button" title={`Abrir en Spotify: ${a.name} - ${s.title}`} aria-label={`Abrir en Spotify ${a.name} ${s.title}`} onClick={e=>openSpotifyForSong(a.name,s,e)}>▶</button></span>)}
                      </div>
                    </div>
                    <div className="row" style={{gap:4,flexShrink:0}}>
                      <button className="btn btn-xs" onClick={()=>onEditArtist(genre,a)}>Editar</button>
                      <button className="btn btn-xs btn-danger" onClick={()=>onDeleteArtist(genre.id,a.id)}>✕</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}


function RetosTab({challenges,genres,u1,u2,currentUserKey,onCreateChallenge,onUpdateChallenge,onDeleteChallenge,onGenerateGenreChallenge}){
  const [form,setForm]=useState({from:currentUserKey||'u1',to:(currentUserKey||'u1')==='u1'?'u2':'u1',type:'song',artistName:'',songTitle:'',genreId:'',description:'',guessMode:'score',senderScore:'',senderQualitative:'like',deadline:''});
  const names={u1,u2};
  const pending=(challenges||[]).filter(c=>c.status!=='completed');
  const completed=(challenges||[]).filter(c=>c.status==='completed');
  const pendingForMe=pending.filter(c=>c.to===currentUserKey);
  const sentByMe=pending.filter(c=>c.from===currentUserKey);
  const otherPending=pending.filter(c=>c.to!==currentUserKey&&c.from!==currentUserKey);
  function resetForm(type=form.type,from=form.from){
    const to=from==='u1'?'u2':'u1';
    setForm({from,to,type,artistName:'',songTitle:'',genreId:'',description:'',guessMode:type==='mood'?'none':'score',senderScore:'',senderQualitative:'like',deadline:''});
  }
  function submit(){
    if(form.from===form.to){alert('El reto debe enviarse al otro usuario.');return;}
    if(form.type==='genre'&&!form.genreId){alert('Selecciona un género para el reto.');return;}
    if(form.type==='song'&&(!form.artistName||!form.songTitle)){alert('Indica artista y canción.');return;}
    if(form.type==='artist'&&!form.artistName){alert('Indica artista.');return;}
    // Mood challenge: the receiver must provide the song and artist, so creator does not fill them.
    const genre=genres.find(g=>g.id===form.genreId);
    const cleanGuessMode=challengeAllowsGuess(form.type)?form.guessMode:'none';
    onCreateChallenge({...form,guessMode:cleanGuessMode,genreName:genre?genre.name:'',status:'pending'});
    resetForm('song',form.from);
  }
  function toggleGenreProgress(c,artistId,songIdx){
    const current=c.response||{};
    const gp={...(current.genreProgress||{})};
    const key=`${artistId}__${songIdx}`;
    gp[key]=!gp[key];
    onUpdateChallenge(c.id,{response:{...current,genreProgress:gp}});
  }
  function genreProgressStats(c,genre){
    const gp=(c.response&&c.response.genreProgress)||{};
    let total=0,done=0;
    (genre?.artists||[]).slice(0,8).forEach(a=>(a.suggestedSongs||[]).slice(0,3).forEach((song,i)=>{total++;if(gp[`${a.id}__${i}`])done++;}));
    return {total,done,pct:total?Math.round(done/total*100):0};
  }
  function ChallengeCard({c}){
    const [local,setLocal]=useState(c.response||{});
    const genre=genres.find(g=>g.id===c.genreId);
    const isSongLike=c.type==='song'||(c.type==='mood'&&(c.response?.artistName&&c.response?.songTitle||local.artistName&&local.songTitle));
    const displayArtist=c.type==='mood'?(c.response?.artistName||local.artistName||'Canción propuesta por el retado'):c.artistName;
    const displaySong=c.type==='mood'?(c.response?.songTitle||local.songTitle||'Pendiente de elegir'):c.songTitle;
    const title=c.type==='genre'?(c.genreName||genre?.name||'Género'):(c.type==='artist'?c.artistName:`${displayArtist} — ${displaySong}`);
    const canAnswer=!currentUserKey||c.to===currentUserKey||c.from===currentUserKey;
    return <div className={`challenge-card ${c.status==='completed'?'completed':'pending'}`}>
      <div className="row" style={{justifyContent:'space-between',gap:8,marginBottom:8}}>
        <div style={{minWidth:0}}>
          <span className="challenge-type">{challengeTypeLabel(c.type)}</span>
          <h3 style={{marginTop:6,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis'}}>{title}</h3>
          <div className="challenge-meta">{names[c.from]} reta a {names[c.to]} · {c.status==='completed'?'Completado':'Pendiente'}</div>
          {c.deadline&&<div className="challenge-meta">Plazo: {c.deadline}</div>}
        </div>
        <div className="row" style={{gap:6,flexShrink:0}}>
          {isSongLike&&displayArtist&&displaySong&&displaySong!=='Pendiente de elegir'&&<button className="spotify-btn" type="button" title="Abrir en Spotify" onClick={e=>openSpotifyForSong(displayArtist,{title:displaySong,spotifyUrl:c.spotifyUrl||''},e)}>▶</button>}
          <button className="btn btn-xs btn-danger" onClick={()=>onDeleteChallenge(c.id)}>✕</button>
        </div>
      </div>
      {c.description&&<p className="muted" style={{fontSize:12,marginBottom:8}}>{c.description}</p>}
      {c.type==='mood'&&<div className="learning-box" style={{marginBottom:8}}><div className="learning-box-title">Reto mood</div><div style={{fontSize:13}}>El retado debe elegir una canción y artista que describan su mood. Después podrá abrirla en Spotify y valorarla si quiere.</div></div>}
      {c.guessMode==='score'&&<div className="muted" style={{fontSize:12,marginBottom:8}}>Objetivo opcional: adivinar la valoración de {names[c.from]} en puntos.</div>}
      {c.guessMode==='qualitative'&&<div className="muted" style={{fontSize:12,marginBottom:8}}>Objetivo opcional: adivinar el calificativo de {names[c.from]}: de “me encantó” a “no me gustó”.</div>}
      {c.type==='genre'&&genre&&<div className="challenge-genre-panel">
        {(()=>{const st=genreProgressStats(c,genre);return <>
          <div className="row" style={{justifyContent:'space-between',marginBottom:6}}><strong>🎧 Género de reto: {genre.name}</strong><span className="muted" style={{fontSize:11}}>{st.done}/{st.total} canciones · {st.pct}%</span></div>
          <div className="progress-bar" style={{marginBottom:8}}><div className="progress-fill" style={{width:`${st.pct}%`}}/></div>
        </>;})()}
        <p className="muted" style={{fontSize:12,marginBottom:8}}>{genre.description}</p>
        {(genre.artists||[]).slice(0,8).map(a=><div key={a.id} style={{fontSize:12,padding:'7px 0',borderTop:'0.5px solid var(--border)'}}>
          <strong>{a.name}</strong> <span className="muted">· {a.role}</span>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:4}}>{(a.suggestedSongs||[]).slice(0,3).map((song,i)=>{
            const checked=!!(c.response?.genreProgress||{})[`${a.id}__${i}`];
            return <span key={i} className={`song-chip ${checked?'heard':''}`} style={{fontSize:11}}>
              <button className={`mini-toggle ${checked?'active u1':''}`} type="button" onClick={()=>toggleGenreProgress(c,a.id,i)}>✓</button>
              {song.title}<button className="spotify-btn" type="button" onClick={e=>openSpotifyForSong(a.name,song,e)}>▶</button>
            </span>;
          })}</div>
        </div>)}
      </div>}
      {c.status!=='completed'?<div className="grid2">
        {c.type==='mood'&&<>
          <div><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>Artista elegido por {names[c.to]}</label><input value={local.artistName||''} onChange={e=>setLocal(p=>({...p,artistName:e.target.value}))} placeholder="Artista"/></div>
          <div><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>Canción elegida por {names[c.to]}</label><input value={local.songTitle||''} onChange={e=>setLocal(p=>({...p,songTitle:e.target.value}))} placeholder="Canción"/></div>
          {(local.artistName&&local.songTitle)&&<div style={{gridColumn:'1/-1'}} className="challenge-track-box"><strong>{local.artistName} — {local.songTitle}</strong> <button className="spotify-btn" type="button" onClick={e=>openSpotifyForSong(local.artistName,{title:local.songTitle},e)}>▶</button></div>}
        </>}
        <div>
          <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>Valoración del retado</label>
          <input type="number" min="0" max="10" value={local.rating||''} onChange={e=>setLocal(p=>({...p,rating:e.target.value}))} placeholder="0-10 opcional"/>
        </div>
        {c.guessMode==='score'?<div>
          <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>Adivina nota de {names[c.from]}</label>
          <input type="number" min="0" max="10" value={local.guessScore||''} onChange={e=>setLocal(p=>({...p,guessScore:e.target.value}))} placeholder="0-10"/>
        </div>:c.guessMode==='qualitative'?<div>
          <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>Adivina calificativo de {names[c.from]}</label>
          <select value={local.guessQualitative||''} onChange={e=>setLocal(p=>({...p,guessQualitative:e.target.value}))}>
            <option value="">—</option><option value="love">Me encantó</option><option value="like">Me gustó</option><option value="neutral">Indiferente</option><option value="hard">Me costó</option><option value="nope">No me gustó</option>
          </select>
        </div>:null}
        {c.type==='mood'&&<div style={{gridColumn:'1/-1'}}><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>Mood descrito por {names[c.to]}</label><textarea rows={2} value={local.mood||''} onChange={e=>setLocal(p=>({...p,mood:e.target.value}))} placeholder="oscuro, nostálgico, eufórico..."/></div>}
        <div style={{gridColumn:'1/-1'}}><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:3}}>Comentario</label><textarea rows={2} value={local.comment||''} onChange={e=>setLocal(p=>({...p,comment:e.target.value}))} placeholder="Qué te ha parecido..."/></div>
        <button className="btn btn-primary" onClick={()=>onUpdateChallenge(c.id,{status:'completed',completedAt:new Date().toISOString(),response:{...(c.response||{}),...local}})}>Completar reto</button>
      </div>:<div className="challenge-result">
        <div style={{fontWeight:800,marginBottom:5}}>Resultado</div>
        {c.type==='mood'&&c.response?.artistName&&c.response?.songTitle&&<div style={{fontSize:12,marginBottom:4}}>Canción mood: <strong>{c.response.artistName} — {c.response.songTitle}</strong> <button className="spotify-btn" type="button" onClick={e=>openSpotifyForSong(c.response.artistName,{title:c.response.songTitle},e)}>▶</button></div>}
        <div className="muted" style={{fontSize:12}}>Valoración de {names[c.to]}: {c.response?.rating||'—'}</div>
        {c.guessMode==='score'&&<div className="muted" style={{fontSize:12}}>Adivinó: {c.response?.guessScore||'—'} · Nota real de {names[c.from]}: {c.senderScore||'—'}</div>}
        {c.guessMode==='qualitative'&&<div className="muted" style={{fontSize:12}}>Adivinó: {qualitativeLabel(c.response?.guessQualitative)||'—'} · Real: {qualitativeLabel(c.senderQualitative)||'—'}</div>}
        {c.response?.mood&&<div className="muted" style={{fontSize:12}}>Mood: {c.response.mood}</div>}
        {c.response?.comment&&<div style={{fontSize:12,marginTop:5}}>{c.response.comment}</div>}
      </div>}
    </div>;
  }
  return <div>
    <h1>🎯 Retos musicales</h1>
    <p className="muted" style={{marginBottom:12}}>Retos con objetivo, respuesta y componente competitivo opcional. No son recomendaciones pasivas.</p>
    {!!pendingForMe.length&&<div className="challenge-alert">Tienes {pendingForMe.length} reto{pendingForMe.length===1?'':'s'} pendiente{pendingForMe.length===1?'':'s'} para ti. Entra aquí para completarlos.</div>}
    <div className="card">
      <h2>Crear reto</h2>
      <div className="grid2">
        <div><label style={{fontSize:12,color:'var(--muted)'}}>De</label><select value={form.from} onChange={e=>resetForm(form.type,e.target.value)}><option value="u1">{u1}</option><option value="u2">{u2}</option></select></div>
        <div><label style={{fontSize:12,color:'var(--muted)'}}>Para</label><select value={form.to} onChange={e=>setForm(p=>({...p,to:e.target.value}))}><option value="u1">{u1}</option><option value="u2">{u2}</option></select></div>
        <div><label style={{fontSize:12,color:'var(--muted)'}}>Tipo</label><select value={form.type} onChange={e=>resetForm(e.target.value,form.from)}><option value="song">Canción</option><option value="artist">Artista</option><option value="genre">Género</option><option value="mood">Mood con canción</option></select></div>
        {challengeAllowsGuess(form.type)&&<div><label style={{fontSize:12,color:'var(--muted)'}}>Modo de adivinanza</label><select value={form.guessMode} onChange={e=>setForm(p=>({...p,guessMode:e.target.value}))}><option value="none">Sin adivinanza</option><option value="score">Adivinar puntuación</option><option value="qualitative">Adivinar calificativo</option></select></div>}
        {form.type==='genre'?<div style={{gridColumn:'1/-1'}}><label style={{fontSize:12,color:'var(--muted)'}}>Género</label><select value={form.genreId} onChange={e=>setForm(p=>({...p,genreId:e.target.value}))}><option value="">— Selecciona —</option>{genres.map(g=><option key={g.id} value={g.id}>{g.name} · {g.parentFamily}</option>)}</select></div>:form.type==='mood'?<div style={{gridColumn:'1/-1'}} className="learning-box"><div className="learning-box-title">Mood con canción</div><div style={{fontSize:13}}>No tienes que meter canción ahora: el retado elegirá artista y canción para describir su mood.</div></div>:<>
          <div><label style={{fontSize:12,color:'var(--muted)'}}>Artista</label><input value={form.artistName} onChange={e=>setForm(p=>({...p,artistName:e.target.value}))} placeholder="Artista"/></div>
          {form.type!=='artist'&&<div><label style={{fontSize:12,color:'var(--muted)'}}>Canción</label><input value={form.songTitle} onChange={e=>setForm(p=>({...p,songTitle:e.target.value}))} placeholder="Canción"/></div>}
        </>}
        {form.guessMode==='score'&&challengeAllowsGuess(form.type)?<div><label style={{fontSize:12,color:'var(--muted)'}}>Tu valoración real</label><input type="number" min="0" max="10" value={form.senderScore} onChange={e=>setForm(p=>({...p,senderScore:e.target.value}))} placeholder="0-10"/></div>:form.guessMode==='qualitative'&&challengeAllowsGuess(form.type)?<div><label style={{fontSize:12,color:'var(--muted)'}}>Tu calificativo real</label><select value={form.senderQualitative} onChange={e=>setForm(p=>({...p,senderQualitative:e.target.value}))}><option value="love">Me encantó</option><option value="like">Me gustó</option><option value="neutral">Indiferente</option><option value="hard">Me costó</option><option value="nope">No me gustó</option></select></div>:null}
        <div><label style={{fontSize:12,color:'var(--muted)'}}>Plazo opcional</label><input type="date" value={form.deadline} onChange={e=>setForm(p=>({...p,deadline:e.target.value}))}/></div>
        <div style={{gridColumn:'1/-1'}}><label style={{fontSize:12,color:'var(--muted)'}}>Instrucciones del reto</label><textarea rows={2} value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="Ej.: completa este género antes del domingo, intenta adivinar si me gustó..."/></div>
      </div>
      <button className="btn btn-primary" style={{marginTop:12}} onClick={submit}>Crear reto</button>
    </div>
    <h2>Para ti</h2>
    {pendingForMe.map(c=><ChallengeCard key={c.id} c={c}/>) }
    {!pendingForMe.length&&<p className="muted" style={{marginBottom:12}}>No tienes retos pendientes.</p>}
    <h2>Enviados por ti</h2>
    {sentByMe.map(c=><ChallengeCard key={c.id} c={c}/>) }
    {!sentByMe.length&&<p className="muted" style={{marginBottom:12}}>No has enviado retos pendientes.</p>}
    {!!otherPending.length&&<><h2>Otros pendientes</h2>{otherPending.map(c=><ChallengeCard key={c.id} c={c}/>)}</>}
    <h2>Completados</h2>
    {completed.map(c=><ChallengeCard key={c.id} c={c}/>) }
    {!completed.length&&<p className="muted">Todavía no hay retos completados.</p>}
  </div>;
}

function AjustesTab({settings,onSaveSettings,onExport,onImport,onReset,onForceLibraryUpgrade}){
  const [form,setForm]=useState({...settings});
  useEffect(()=>setForm({...settings}),[settings]);
  return(
    <div>
      <h1 style={{marginBottom:16}}>Ajustes</h1>
      <div className="card" style={{marginBottom:12}}>
        <h2 style={{marginBottom:12}}>Nombres de usuario</h2>
        <div className="grid2" style={{marginBottom:12}}>
          <div><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:4}}>Usuario 1</label><input value={form.user1||''} onChange={e=>setForm(p=>({...p,user1:e.target.value}))}/></div>
          <div><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:4}}>Usuario 2</label><input value={form.user2||''} onChange={e=>setForm(p=>({...p,user2:e.target.value}))}/></div>
        </div>
        <button className="btn btn-primary" onClick={()=>onSaveSettings(form)}>Guardar nombres</button>
      </div>

      <div className="card" style={{marginBottom:12}}>
        <h2 style={{marginBottom:6}}>Backup y datos</h2>
        <p className="muted" style={{fontSize:12,marginBottom:12}}>
          Los datos se guardan automáticamente en la nube y también en localStorage del navegador como respaldo.<br/>
          Exporta un backup JSON para no perder nada si limpias el navegador.
        </p>
        <div className="row">
          <button className="btn" onClick={onExport}>⬇ Exportar backup JSON</button>
          <label className="btn" style={{cursor:'pointer'}}>
            ⬆ Importar backup
            <input type="file" accept=".json" style={{display:'none'}} onChange={onImport}/>
          </label>
        </div>
      </div>

      <div className="card" style={{marginBottom:12}}>
        <h2 style={{marginBottom:6}}>Biblioteca</h2>
        <p className="muted" style={{fontSize:12,marginBottom:12}}>
          Si ves menos géneros de los esperados en este navegador, fuerza la migración segura. Añade los géneros, artistas, canciones y fichas Aprende que falten sin borrar semanas, valoraciones ni historial.
        </p>
        <button className="btn btn-primary" onClick={onForceLibraryUpgrade}>Actualizar biblioteca a la última versión</button>
      </div>

      <div className="card">
        <h2 style={{marginBottom:6,color:'var(--danger)'}}>⚠ Zona de peligro</h2>
        <p className="muted" style={{fontSize:12,marginBottom:12}}>El reset eliminará TODOS los datos: semanas, valoraciones e historial. La biblioteca volverá a su estado inicial.</p>
        <button className="btn btn-danger" onClick={onReset}>Reset total (doble confirmación)</button>
      </div>
    </div>
  );
}


function CloudStatusPill({status}){
  const labels={checking:'Verificando',loading:'Cargando nube',saving:'Guardando',saved:'Nube OK',error:'Error nube',offline:'Sin sesión'};
  const icon={checking:'🔐',loading:'☁️',saving:'☁️',saved:'☁️',error:'⚠️',offline:'🔒'};
  return <span className={`sync-pill sync-${status||'checking'}`}>{icon[status]||'☁️'} {labels[status]||status}</span>;
}

function AuthGate({mode,message,onLogin,onSignOut}){
  const isError=mode==='error'||mode==='firebase_error';
  return(
    <div className="auth-screen">
      <div className="auth-card">
        <div className="auth-icon">🎵</div>
        <div className="auth-title">Music Discovery Lab</div>
        <div className="auth-copy">
          Acceso privado. Inicia sesión con Google para cargar la biblioteca, semanas, valoraciones, rankings e historial compartido.
        </div>
        <div className="auth-warning">
          Seguridad: la app no recibe ni almacena vuestra contraseña. El inicio de sesión ocurre directamente con Google/Firebase Auth.
        </div>
        {message&&<div className={`auth-warning`} style={isError?{borderColor:'rgba(241,94,108,.45)',color:'#ff9aa5',background:'rgba(241,94,108,.12)'}:{}}>{message}</div>}
        {mode==='signed_out'&&<button className="btn btn-primary" onClick={onLogin} style={{width:'100%',justifyContent:'center'}}>Entrar con Google</button>}
        {(mode==='checking'||mode==='loading')&&<div className="muted">Verificando sesión segura…</div>}
        {isError&&<div className="row" style={{justifyContent:'center'}}><button className="btn btn-primary" onClick={onLogin}>Reintentar login</button>{onSignOut&&<button className="btn" onClick={onSignOut}>Salir</button>}</div>}
      </div>
    </div>
  );
}
